function buildAgenda(){
  const calFecha = state._calFecha ? isoToDate(state._calFecha) : new Date();
  const y = calFecha.getFullYear(), m = calFecha.getMonth();
  const dias_count = daysInMonth(y,m);
  const primer_dia = new Date(y,m,1).getDay();
  const offset = primer_dia===0?6:primer_dia-1;
  const hoy = todayISO();
  const selDay = state._selDay||hoy;

  const getEvsDia = (iso)=>({feriado:FERIADOS.find(f=>f.fecha===iso), evs:state.eventos.filter(e=>e.fecha===iso)});

  const celdas = Array.from({length:offset},(_,i)=>`<div></div>`).join('') +
    Array.from({length:dias_count},(_,i)=>{
      const d=i+1;
      const iso=`${y}-${p2(m+1)}-${p2(d)}`;
      const isHoy=iso===hoy, isSel=iso===selDay;
      const {feriado,evs}=getEvsDia(iso);
      const dot = (feriado||evs.length)?`<div style="width:5px;height:5px;border-radius:50%;background:${isSel?'rgba(255,255,255,.7)':feriado?'#e74c3c':'var(--accent)'};margin:2px auto 0"></div>`:'';
      return `<div onclick="selDay('${iso}')" style="text-align:center;padding:6px 2px;border-radius:10px;cursor:pointer;background:${isSel?'var(--accent)':isHoy?'#eff3ff':'transparent'};color:${isSel?'#fff':isHoy?'var(--accent)':'#333'};font-weight:${isHoy||isSel?800:400}">${d}${dot}</div>`;
    }).join('');

  const {feriado:ferSel, evs:evsSel} = getEvsDia(selDay);
  const {evs:evsHoy} = getEvsDia(hoy);
  const {evs:evsManana} = getEvsDia(addDays(hoy,1));

  let evsHtml = '';
  if(ferSel) evsHtml+=`<div style="background:#fff0f0;border-left:4px solid #e74c3c;border-radius:12px;padding:12px 14px;margin-bottom:10px"><div style="font-weight:700;color:#c0392b;font-size:14px">${esc(ferSel.nombre)}</div><div style="font-size:12px;color:#e74c3c">FERIADO NACIONAL</div></div>`;
  if(!ferSel&&!evsSel.length) evsHtml+=`<div style="text-align:center;padding:30px 20px;color:#ccc"><div style="font-size:36px">📅</div><div style="margin-top:10px;font-size:14px">Sin eventos este día</div></div>`;
  evsSel.forEach(ev=>{
    evsHtml+=`<div style="background:#fff;border-left:4px solid ${ev.color||'var(--accent)'};border-radius:12px;padding:12px 14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div style="font-weight:700;color:var(--primary);font-size:14px">${esc(ev.titulo)}</div>
        ${ev.hora?`<div style="font-size:12px;color:#888">${esc(ev.hora)}${ev.lugar?' · '+esc(ev.lugar):''}</div>`:''}
        ${ev.etiqueta?`<span style="background:${ev.color||'var(--accent)'};color:#fff;font-size:10px;font-weight:700;border-radius:6px;padding:2px 8px;display:inline-block;margin-top:4px">${esc(ev.etiqueta)}</span>`:''}
      </div>
      <div style="display:flex;gap:8px">
        <button onclick="editEvento('${ev.id}')" style="background:none;border:none;color:#888">${ICONS.edit}</button>
        <button onclick="borrarEvento('${ev.id}')" style="background:none;border:none;color:#e74c3c">${ICONS.trash}</button>
      </div>
    </div>`;
  });

  const prev = m===0?`${y-1}-12-15`:`${y}-${p2(m)}-15`;
  const next = m===11?`${y+1}-01-15`:`${y}-${p2(m+2)}-15`;

  return `<div class="screen">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div><div style="font-weight:900;font-size:28px;color:var(--primary);letter-spacing:-1px">${MESES[m].toUpperCase()}</div><div style="font-size:14px;color:var(--accent);font-weight:700">${y}</div></div>
      <div style="display:flex;gap:8px">
        <button onclick="setCalFecha('${hoy}');selDay('${hoy}')" style="background:#eff3ff;border:none;border-radius:12px;padding:0 12px;height:40px;color:var(--accent);font-weight:700;font-size:12px">Hoy</button>
        <button onclick="setCalFecha('${prev}')" style="background:#fff;border:none;border-radius:12px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.1)">${ICONS.chevL}</button>
        <button onclick="setCalFecha('${next}')" style="background:#fff;border:none;border-radius:12px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.1)">${ICONS.chevR}</button>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:14px">
      <div class="card" style="flex:1;margin-bottom:0">
        <div style="font-size:11px;color:#888;font-weight:700">EVENTOS DE HOY</div>
        <div style="font-size:24px;color:var(--primary);font-weight:900;margin-top:4px">${evsHoy.length}</div>
      </div>
      <div class="card" style="flex:1;margin-bottom:0">
        <div style="font-size:11px;color:#888;font-weight:700">EVENTOS DE MAÑANA</div>
        <div style="font-size:24px;color:var(--primary);font-weight:900;margin-top:4px">${evsManana.length}</div>
      </div>
    </div>
    <div class="card">
      <div style="display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:8px">${DIAS_CORTOS.map(d=>`<div style="text-align:center;font-size:12px;font-weight:700;color:#888;padding:4px">${d}</div>`).join('')}</div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">${celdas}</div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="font-size:13px;color:#888;font-weight:600">${selDay}</span>
      <button onclick="openModal('evento')" style="background:var(--accent);border:none;border-radius:10px;padding:7px 14px;color:#fff;font-weight:700;font-size:13px">+ Añadir</button>
    </div>
    ${evsHtml}
  </div>`;
}

function buildNotas(){
  const orden = state._notasOrden||'fecha';
  const search = normalizeDia(state._notasSearch||'');
  let notas = [...state.notas]
    .filter(n=>{
      const text = normalizeDia(`${n.titulo||''} ${n.contenido||''}`);
      if(search && !text.includes(search)) return false;
      if(state._notasOnlyImportant && !(n.importante || n.destacada || n.fija)) return false;
      return true;
    });
  notas.sort((a,b)=>{
    if(!!b.fija !== !!a.fija) return (b.fija?1:0) - (a.fija?1:0);
    if(orden==='fecha') return (b.fechaCreada||'').localeCompare(a.fechaCreada||'');
    if(orden==='importancia') return (b.importancia||0)-(a.importancia||0);
    return (a.color||'').localeCompare(b.color||'');
  });

  const notasHtml = notas.map(n=>`
    <div style="background:#fff;border-left:4px solid ${n.color||'var(--accent)'};border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 1px 5px rgba(0,0,0,.06)">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="flex:1">
          ${n.titulo?`<div style="font-weight:800;color:var(--primary);font-size:14px;margin-bottom:4px">${esc(n.titulo)}</div>`:''}
          <div style="font-size:13px;color:#555;line-height:1.5">${esc(n.contenido)}</div>
          <div style="display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap">
            <span style="font-size:11px;color:#aaa">📅 ${n.fechaCreada?new Date(n.fechaCreada).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}):''}</span>
            ${n.importancia?`<span>${'⭐'.repeat(Math.min(n.importancia,3))}</span>`:''}
            ${n.destacada?`<span style="font-size:10px;background:#fff3cd;color:#e67e22;border-radius:6px;padding:2px 6px;font-weight:700">EN INICIO</span>`:''}
            ${n.importante?`<span style="font-size:10px;background:#fff0f0;color:#c0392b;border-radius:6px;padding:2px 6px;font-weight:700">IMPORTANTE</span>`:''}
            ${n.fija?`<span style="font-size:10px;background:#eff3ff;color:var(--accent);border-radius:6px;padding:2px 6px;font-weight:700">FIJA</span>`:''}
          </div>
        </div>
        <div style="display:flex;gap:6px;margin-left:10px">
          <button onclick="toggleNotaFija('${n.id}')" style="background:none;border:none;color:${n.fija?'var(--accent)':'#bbb'};font-size:16px">📌</button>
          <button onclick="editNota('${n.id}')" style="background:none;border:none;color:#888">${ICONS.edit}</button>
          <button onclick="borrarNota('${n.id}')" style="background:none;border:none;color:#e74c3c">${ICONS.trash}</button>
        </div>
      </div>
    </div>`).join('');

  return `<div class="screen">
    <div style="font-weight:900;font-size:22px;color:var(--primary);margin-bottom:16px">NOTAS</div>
    <div class="card" style="margin-bottom:16px">
      <textarea id="notaRapida" rows="3" placeholder="Escribí algo importante..." style="width:100%;border:none;outline:none;font-size:14px;resize:none;color:#333"></textarea>
      <div style="display:flex;justify-content:flex-end;margin-top:8px">
        <button onclick="guardarNotaRapida()" style="background:var(--accent);border:none;border-radius:10px;padding:8px 16px;color:#fff;font-weight:700;font-size:13px">Guardar</button>
      </div>
    </div>
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;gap:8px;align-items:center">
        <input class="inp" value="${esc(state._notasSearch||'')}" placeholder="Buscar nota" oninput="setNotasSearch(this.value)" style="flex:1"/>
        <button onclick="toggleNotasImportantes()" style="background:${state._notasOnlyImportant?'#fff8e1':'#f0f0f0'};border:none;border-radius:10px;padding:10px 12px;color:${state._notasOnlyImportant?'#e67e22':'#666'};font-weight:700;font-size:12px;white-space:nowrap">Importantes</button>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">
      <button onclick="openModal('nota')" style="background:var(--accent);border:none;border-radius:10px;padding:8px 14px;color:#fff;font-weight:700;font-size:12px;white-space:nowrap">+ Nota completa</button>
      <select onchange="setNotasOrden(this.value)" style="padding:8px 12px;border-radius:10px;border:1px solid #e0e0e0;font-size:12px;background:#fff">
        <option value="fecha" ${orden==='fecha'?'selected':''}>Por fecha</option>
        <option value="importancia" ${orden==='importancia'?'selected':''}>Por importancia</option>
        <option value="color" ${orden==='color'?'selected':''}>Por color</option>
      </select>
    </div>
    ${!notas.length?`<div style="text-align:center;padding:40px 20px;color:#aaa"><div style="font-size:40px">📝</div><div style="margin-top:12px;font-size:14px">No hay notas todavía</div></div>`:notasHtml}
  </div>`;
}

function buildModal(){
  const m = state.modal;
  const d = state.modalData||{};
  let content = '';

  if(m==='evento') content = buildModalEvento(d);
  else if(m==='nota') content = buildModalNota(d);
  else if(m==='curso'||m==='cursoEdit') content = buildModalCurso(d);
  else if(m==='lista') content = buildModalLista(d);
  else if(m==='acapFechas') content = buildModalAcapFechas(d);
  else if(m==='acapCopy') content = buildModalAcapCopy(d);
  else if(m==='acapPasteMulti') content = buildModalAcapPasteMulti(d);
  else if(m==='horario') content = buildModalHorario(d);
  else if(m==='horasInst') content = buildModalHorasInstitucion();
  else if(m==='horarioCopy') content = buildModalHorarioCopy(d);
  else if(m==='changePassword') content = buildModalChangePassword();
  else if(m==='premiumPlan') content = buildModalPremiumPlan();

  return `<div class="modal-overlay" onclick="closeModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <span style="font-weight:700;font-size:17px;color:var(--primary)">${modalTitle(m,d)}</span>
        <button onclick="closeModal()" style="background:none;border:none;color:#666;padding:4px">${ICONS.x}</button>
      </div>
      ${content}
    </div>
  </div>`;
}

function modalTitle(m,d){
  if(m==='evento') return d.id?'Editar evento':'Nuevo evento';
  if(m==='nota') return d.id?'Editar nota':'Nueva nota';
  if(m==='curso'||m==='cursoEdit') return d.id?'Editar curso':'Nuevo curso';
  if(m==='lista') return 'Nueva lista';
  if(m==='acapFechas') return 'ACAP por fechas';
  if(m==='acapCopy') return 'Copiar fechas ACAP';
  if(m==='acapPasteMulti') return 'Pegar en varios alumnos';
  if(m==='horario') return `${getHorasInstitucion()[d.hora]||''} · ${d.dia||''}`;
  if(m==='horasInst') return 'Horas de la institución';
  if(m==='horarioCopy') return 'Copiar horario';
  if(m==='changePassword') return 'Cambiar contraseña';
  if(m==='premiumPlan') return 'Preceptor Pro Premium';
  return '';
}

function colorPicker(selected, onchange){
  return `<div style="display:flex;gap:8px;flex-wrap:wrap">${COLORES.map(c=>`<div onclick="${onchange}('${c}')" class="color-dot ${selected===c?'sel':''}" style="background:${c}"></div>`).join('')}</div>`;
}

function sendFirebaseVerificationEmail(user){
  const targetUser = firebaseAuth?.currentUser || user || null;
  if(!(firebaseEnabled && firebaseAuth && targetUser && typeof targetUser.getIdToken === 'function')){
    return Promise.reject(new Error('auth/no-current-user'));
  }
  console.log('sendEmailVerification:start', {
    email: targetUser.email || '',
    emailVerified: targetUser.emailVerified === true
  });
  return Promise.resolve(typeof targetUser.reload === 'function' ? targetUser.reload() : null)
    .then(()=>{
      const refreshedUser = firebaseAuth?.currentUser || targetUser;
      console.log('sendEmailVerification:afterReload', {
        email: refreshedUser.email || '',
        emailVerified: refreshedUser.emailVerified === true
      });
      if(refreshedUser.emailVerified === true){
        throw new Error('auth/already-verified');
      }
      return refreshedUser.getIdToken(true);
    })
    .then(idToken=>fetch(`https://identitytoolkit.googleapis.com/v1/accounts:sendOobCode?key=${firebaseConfig.apiKey}`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        requestType: 'VERIFY_EMAIL',
        idToken
      })
    }))
    .then(async response=>{
      let data = {};
      try{ data = await response.json(); }catch{}
      if(!response.ok){
        const message = data?.error?.message || 'verification-email-failed';
        throw new Error(message);
      }
      console.log('sendEmailVerification:success', {
        email: (firebaseAuth?.currentUser || targetUser)?.email || ''
      });
      return true;
    })
    .catch(error=>{
      console.error('sendEmailVerification:error', error);
      throw error;
    });
}
function verificationEmailErrorMessage(error){
  const raw = String(error?.code || error?.message || '').toUpperCase();
  if(raw.includes('AUTH/ALREADY-VERIFIED')) return 'Tu email ya está verificado';
  if(raw.includes('AUTH/NO-CURRENT-USER')) return 'Iniciá sesión para reenviar';
  if(raw.includes('TOO_MANY_ATTEMPTS_TRY_LATER') || raw.includes('AUTH/TOO-MANY-REQUESTS')) return 'Esperá unos minutos antes de reenviar';
  if(raw.includes('USER_TOKEN_EXPIRED') || raw.includes('TOKEN_EXPIRED')) return 'La sesión expiró. Volvé a iniciar sesión.';
  if(raw.includes('NETWORK_REQUEST_FAILED')) return 'Error de conexión.';
  if(raw.includes('USER_DISABLED')) return 'No se pudo enviar el email de verificación.';
  return 'No se pudo enviar el email de verificación.';
}

function registrarUsuario(){
  const nombre = document.getElementById('auth_nombre')?.value?.trim();
  const email = (document.getElementById('auth_email')?.value||'').trim().toLowerCase();
  const password = document.getElementById('auth_pass')?.value || '';
  if(!nombre || !email || !password){
    alert('Completá nombre, email y contraseña');
    return;
  }
  if(firebaseEnabled && firebaseAuth){
    firebaseAuth.createUserWithEmailAndPassword(email, password)
      .then((userCredential)=>{
        const user = userCredential?.user || firebaseAuth?.currentUser || null;
        if(!user) throw new Error('firebase-user-not-available');
        return Promise.resolve(user?.updateProfile ? user.updateProfile({displayName:nombre}) : null).then(()=>user);
      })
      .then((user)=>{
        migrateLegacyDataToUser({uid:user.uid, email});
        state.plan = 'free';
        S.set('pp_plan', state.plan);
        state.userProfile = {nombre, email, uid: user.uid || firebaseAuth?.currentUser?.uid || ''};
        state.perfil = {...(state.perfil||{}), nombre: (!String(state?.perfil?.nombre||'').trim() || isPlaceholderProfileName(state?.perfil?.nombre)) ? nombre : state.perfil.nombre};
        const saveUserDoc = getUserDocRef(user.uid || firebaseAuth?.currentUser?.uid)?.set({
          uid: user.uid || firebaseAuth?.currentUser?.uid || '',
          plan: 'free',
          email,
          nombre,
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        }, {merge:true});
        return Promise.resolve(saveUserDoc)
          .then(()=>sendFirebaseVerificationEmail(user));
      })
      .then(()=>{
        showToast('Email enviado. Revisá también spam o correo no deseado.');
        alert('Email enviado. Revisá también spam o correo no deseado.');
        render();
      })
      .catch(err=>{
        console.error(err);
        alert(firebaseAuthError(err));
      });
    return;
  }
  const users = getStoredUsers();
  if(users.some(u=>u.email===email)){
    alert('Ya existe un usuario con ese email');
    return;
  }
  const nuevo = {id:uid(), nombre, email, password};
  try{ localStorage.setItem(AUTH_USERS_KEY, JSON.stringify([...users, nuevo])); }catch{}
  if(!users.length) migrateLegacyDataToUser({uid:nuevo.id, email});
  state.plan = 'free';
  S.set('pp_plan', state.plan);
  setActiveUser({uid:nuevo.id, id:nuevo.id, nombre:nuevo.nombre, email:nuevo.email});
  window.location.reload();
}

function iniciarSesion(){
  const email = (document.getElementById('auth_login_email')?.value||'').trim().toLowerCase();
  const password = document.getElementById('auth_login_pass')?.value || '';
  const remember = document.getElementById('auth_remember')?.checked !== false;
  if(firebaseEnabled && firebaseAuth){
    const persistence = remember ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION;
    setAuthPersistencePreference(remember);
    state._rememberLogin = remember;
    firebaseAuth.setPersistence(persistence)
      .then(()=>firebaseAuth.signInWithEmailAndPassword(email, password))
      .then((cred)=>{
        if(cred?.user && cred.user.emailVerified===false){
          showToast('Tu cuenta no está verificada');
          alert('Tu cuenta no está verificada. Revisá tu email o reenviá la verificación desde la app.');
        }
      })
      .catch(err=>{
        alert(firebaseAuthError(err));
      });
    return;
  }
  const user = getStoredUsers().find(u=>u.email===email && u.password===password);
  if(!user){
    alert('Email o contraseña incorrectos');
    return;
  }
  setAuthPersistencePreference(remember);
  state._rememberLogin = remember;
  setActiveUser({uid:user.id, id:user.id, nombre:user.nombre, email:user.email}, remember);
  window.location.reload();
}

function recuperarContrasena(){
  if(!(firebaseEnabled && firebaseAuth)){
    alert('La recuperación de contraseña requiere Firebase Authentication.');
    return;
  }
  const inputEmail = (document.getElementById('auth_login_email')?.value||'').trim().toLowerCase();
  const email = (inputEmail || prompt('Ingresá tu email para recuperar la contraseña:') || '').trim().toLowerCase();
  if(!email){
    alert('Ingresá un email válido.');
    return;
  }
  firebaseAuth.sendPasswordResetEmail(email)
    .then(()=>{
      alert('Se envió un email para recuperar la contraseña');
    })
    .catch(err=>{
      const code = err?.code || '';
      if(code==='auth/user-not-found' || code==='auth/invalid-credential'){
        alert('Email no registrado');
        return;
      }
      alert(code==='auth/invalid-email' ? 'Ingresá un email válido.' : 'Error al enviar el correo');
    });
}
function reenviarEmailVerificacion(){
  const user = firebaseAuth?.currentUser || null;
  if(!(firebaseEnabled && firebaseAuth && user)){
    showToast('Iniciá sesión para reenviar');
    return;
  }
  if(user.emailVerified===true){
    showToast('Tu email ya está verificado');
    return;
  }
  sendFirebaseVerificationEmail(user)
    .then(()=>{
      showToast('Email de verificación enviado. Revisá spam o promociones.');
    })
    .catch((error)=>{
      console.error('Error reenviando verificación:', error);
      showToast(verificationEmailErrorMessage(error));
    });
}

function cerrarSesion(){

      clearActiveUser();
      window.location.reload();
    });
    return;
  }
  clearActiveUser();

}
function firebaseAuthError(err){
  const code = err?.code || '';
  if(code==='auth/email-already-in-use') return 'Ese email ya está registrado.';
  if(code==='auth/invalid-email') return 'El email no es válido.';
  if(code==='auth/weak-password') return 'La contraseña es demasiado débil.';
  if(code==='auth/user-not-found' || code==='auth/wrong-password' || code==='auth/invalid-credential') return 'Email o contraseña incorrectos.';
  if(code==='auth/network-request-failed') return 'No se pudo conectar con Firebase. Revisá tu conexión.';
  return err?.message || 'No se pudo completar la autenticación.';
}

function isTemporaryProfilePhotoUrl(url){
  const value = String(url||'').trim();
  return value.startsWith('blob:') || value.startsWith('data:');
}
function withProfilePhotoCacheBuster(url, stamp){
  const value = String(url||'').trim();
  if(!value || isTemporaryProfilePhotoUrl(value)) return value;
  const clean = value.replace(/([?&])t=\d+/g,'').replace(/[?&]$/,'');
  const ts = stamp ? new Date(stamp).getTime() : Date.now();
  return `${clean}${clean.includes('?') ? '&' : '?'}t=${ts}`;
}
function stripProfilePhotoCacheBuster(url){
  return String(url||'').trim().replace(/([?&])t=\d+/g,'').replace(/[?&]$/,'');
}
function setProfilePhotoPreview(url, isObjectUrl=false){
  if(profilePhotoPreviewObjectUrl && profilePhotoPreviewObjectUrl!==url){
    try{ URL.revokeObjectURL(profilePhotoPreviewObjectUrl); }catch{}
  }
  profilePhotoPreviewUrl = url || '';
  profilePhotoPreviewObjectUrl = isObjectUrl ? (url || '') : '';
}
function readFileAsDataURL(file){
  return new Promise((resolve, reject)=>{
    try{
      const reader = new FileReader();
      reader.onload = ()=>resolve(String(reader.result||''));
      reader.onerror = ()=>reject(new Error('file-read-error'));
      reader.readAsDataURL(file);
    }catch(err){
      reject(err);
    }
  });
}
function loadImageElement(src){
  return new Promise((resolve, reject)=>{
    try{
      const img = new Image();
      img.onload = ()=>resolve(img);
      img.onerror = ()=>reject(new Error('image-load-error'));
      img.src = src;
    }catch(err){
      reject(err);
    }
  });
}
async function compressProfileImage(file){
  const dataUrl = await readFileAsDataURL(file);
  const img = await loadImageElement(dataUrl);
  const maxSize = 512;
  const ratio = Math.min(1, maxSize / Math.max(img.width || 1, img.height || 1));
  const width = Math.max(1, Math.round((img.width || 1) * ratio));
  const height = Math.max(1, Math.round((img.height || 1) * ratio));
  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext('2d');
  if(!ctx) throw new Error('canvas-context-error');
  ctx.drawImage(img, 0, 0, width, height);
  const outputType = typeof canvas.toDataURL === 'function' && canvas.toDataURL('image/webp').startsWith('data:image/webp')
    ? 'image/webp'
    : 'image/jpeg';
  const blob = await new Promise((resolve, reject)=>{
    canvas.toBlob(result=>{
      if(result) resolve(result);
      else reject(new Error('image-compress-error'));
    }, outputType, 0.8);
  });
  return blob;
}
function seleccionarFotoPerfil(){

}

function subirFotoPerfil(event){
  const input = event?.target;
  const file = input?.files?.[0];
  if(!file) return;
  const done = ()=>{ if(input) input.value = ''; };
  const isValidType = String(file.type||'').startsWith('image/');
  if(!isValidType){
    showToast('Seleccioná un archivo de imagen');
    done();
    return;
  }
  if(file.size > 10 * 1024 * 1024){
    showToast('La imagen es demasiado grande. Elegí una menor a 10 MB.');
    done();
    return;
  }
  const previewUrl = URL.createObjectURL(file);
  setProfilePhotoPreview(previewUrl, true);
  render();
  if(!(firebaseEnabled && storageEnabled && storageDb && activeUser?.uid)){
    showToast('No se pudo sincronizar la foto. Iniciá sesión para subirla.');
    done();
    return;
  }

  setCloudStatus('syncing');
  const ref = storageDb.ref().child(`users/${activeUser.uid}/profile.jpg`);
  compressProfileImage(file)
    .then(blob=>ref.put(blob, {contentType:blob.type || 'image/jpeg', cacheControl:'public,max-age=3600'}))
    .then(()=>ref.getDownloadURL())
    .then(url=>{
      if(!url) throw new Error('no-url');
      const stamp = new Date().toISOString();
      console.log('Foto subida Storage URL:', url);
      state.perfil = {
        ...(state.perfil||{}),
        foto: String(url||'').trim(),
        fotoUpdatedAt: stamp
      };
      console.log('Foto guardada en perfil.foto:', state.perfil.foto);
      resetProfilePhotoPreview();
      save();
      render();
      showToast('Foto actualizada correctamente');
    })
    .catch(err=>{
      console.error('Profile photo upload error', err);
      setCloudStatus((typeof navigator!=='undefined' && !navigator.onLine) ? 'offline' : 'local');
      render();
      showToast('Error al subir la imagen');
    })
    .finally(done);
}

function cambiarContrasena(){
  const actual = document.getElementById('pwd_actual')?.value || '';
  const nueva = document.getElementById('pwd_nueva')?.value || '';
  const repetir = document.getElementById('pwd_repetir')?.value || '';
  if(!actual || !nueva || !repetir){
    alert('Completá todos los campos');
    return;
  }
  if(nueva.length < 6){
    alert('La nueva contraseña debe tener al menos 6 caracteres');
    return;
  }
  if(nueva !== repetir){
    alert('Las contraseñas no coinciden');
    return;
  }
  if(!(firebaseEnabled && firebaseAuth?.currentUser)){
    alert('Error al actualizar contraseña');
    return;
  }
  const user = firebaseAuth.currentUser;
  const email = user.email || activeUser?.email || '';
  if(!email){
    alert('Error al actualizar contraseña');
    return;
  }
  const credential = firebase.auth.EmailAuthProvider.credential(email, actual);
  user.reauthenticateWithCredential(credential)
    .then(()=>user.updatePassword(nueva))
    .then(()=>{
      alert('Contraseña actualizada correctamente');
      closeModal();
    })
    .catch(err=>{
      const code = err?.code || '';
      if(code==='auth/wrong-password' || code==='auth/invalid-credential'){
        alert('La contraseña actual no es correcta');
        return;
      }
      if(code==='auth/weak-password'){
        alert('La nueva contraseña debe tener al menos 6 caracteres');
        return;
      }
      alert('Error al actualizar contraseña');
    });
}

function saveAcap(cursoId, alumnoId){
  const f = state._acapFecha||todayISO();
  const horario = document.getElementById(`acap_h_${alumnoId}`)?.value||'';
  const empresa = document.getElementById(`acap_e_${alumnoId}`)?.value||'';
  upsertAcapRecord(cursoId, alumnoId, f, empresa, horario, false);
  if(horario||empresa){
    setAsist(cursoId,alumnoId,f,'AC');
    const alumno = (state.alumnos[cursoId]||[]).find(a=>a.id===alumnoId);
    logAcapHistory('Guardar ACAP', alumno?.nombre||'');
  }
  save(); render();
}
function clearAcap(cursoId, alumnoId){
  if(!confirm('¿Seguro que querés borrar este registro?')) return;
  const f = state._acapFecha||todayISO();
  const k=`${cursoId}_${alumnoId}_${f}`;
  delete state.acaps[k];
  setAsist(cursoId,alumnoId,f,null);
  const alumno = (state.alumnos[cursoId]||[]).find(a=>a.id===alumnoId);
  logAcapHistory('Borrar ACAP', alumno?.nombre||'');
  save(); render();
}
function updateAcap(cursoId, alumnoId, field, val){
  // kept for compatibility
  const f = state._acapFecha||todayISO();
  const k=`${cursoId}_${alumnoId}_${f}`;
  const prev = state.acaps[k]||{};
  state.acaps[k] = {...prev,[field]:val};
  if(state.acaps[k].empresa||state.acaps[k].horario){
    setAsist(cursoId,alumnoId,f,'AC');
  }
  save();
}

  const hasta = document.getElementById('af_hasta')?.value || '';

    .split('\n')
    .map(parseFechaInput)

    upsertAcapRecord(d.cursoId, d.alumnoId, fecha, empresa, horario, true);
  });

function cargarAcapMesCompleto(){
  const d = state.modalData || {};
  const empresa = document.getElementById('af_empresa')?.value?.trim() || '';
  const desde = document.getElementById('af_desde')?.value || '';
  const hasta = document.getElementById('af_hasta')?.value || '';
  const horario = buildHorario(desde, hasta);
  const mes = document.getElementById('af_mes')?.value || '';
  if(!d.cursoId || !d.alumnoId || !mes || !empresa || !horario) return;

  const [year, month] = mes.split('-').map(Number);
  const totalDias = daysInMonth(year, month-1);
  for(let dia=1; dia<=totalDias; dia++){
    const fecha = `${year}-${p2(month)}-${p2(dia)}`;
    upsertAcapRecord(d.cursoId, d.alumnoId, fecha, empresa, horario, true);
  }

  const alumno = (state.alumnos[d.cursoId]||[]).find(a=>a.id===d.alumnoId);
  logAcapHistory(`Cargar mes completo ${mes}`, alumno?.nombre||'');
  save();
  closeModal();
}

function duplicarAcapMes(){
  const d = state.modalData || {};
  const origen = document.getElementById('af_dup_origen')?.value || '';
  const destino = document.getElementById('af_dup_destino')?.value || '';
  if(!d.cursoId || !d.alumnoId || !origen || !destino || origen===destino) return;

  const [originYear, originMonth] = origen.split('-').map(Number);
  const [destYear, destMonth] = destino.split('-').map(Number);
  let copied = 0;

  guardarBackupAcapMasivo();
  Object.entries(state.acaps).forEach(([key, value])=>{
    if(!key.startsWith(`${d.cursoId}_${d.alumnoId}_`)) return;
    const fecha = key.split('_').slice(-1)[0];
    const fechaObj = isoToDate(fecha);
    if(fechaObj.getFullYear()!==originYear || fechaObj.getMonth()!==(originMonth-1)) return;

    const day = fechaObj.getDate();
    if(day > daysInMonth(destYear, destMonth-1)) return;
    const destFecha = `${destYear}-${p2(destMonth)}-${p2(day)}`;
    const destKey = `${d.cursoId}_${d.alumnoId}_${destFecha}`;
    if(state.acaps[destKey]) return;

    state.acaps[destKey] = {...value};
    setAsistValue(d.cursoId, d.alumnoId, destFecha, 'AC');
    copied++;
  });

  const alumno = (state.alumnos[d.cursoId]||[]).find(a=>a.id===d.alumnoId);
  logAcapHistory(`Duplicar fechas ${origen} -> ${destino}`, alumno?.nombre||'');
  save();
  render();
  alert(`Se duplicaron ${copied} fecha${copied===1?'':'s'}`);
}
function duplicarAcapFecha(){
  const d = state.modalData || {};
  const src = document.getElementById('af_dup_single_src')?.value || '';
  const dest = document.getElementById('af_dup_single_dest')?.value || '';
  if(!d.cursoId || !d.alumnoId || !src || !dest || src===dest) return;
  const srcKey = `${d.cursoId}_${d.alumnoId}_${src}`;
  const destKey = `${d.cursoId}_${d.alumnoId}_${dest}`;

  state.acaps[destKey] = {...state.acaps[srcKey]};

  save();
  render();
}

function copiarAcapAlPortapapeles(cursoId, alumnoId){
  const alumno = (state.alumnos[cursoId]||[]).find(a=>a.id===alumnoId);
  const registros = Object.entries(state.acaps)
    .filter(([key, value])=>key.startsWith(`${cursoId}_${alumnoId}_`) && value)
    .map(([key, value])=>({
      fecha: key.split('_').slice(-1)[0],
      data: {...value},
    }));

  state._acapClipboard = {
    cursoId,
    alumnoId,
    alumnoNombre: alumno?.nombre || '',
    registros,
  };
  render();
  alert(registros.length ? 'Fechas copiadas al portapapeles' : 'El alumno no tiene fechas ACAP para copiar');
}
function pegarAcapDesdePortapapeles(cursoId, alumnoId){
  const clipboard = state._acapClipboard;
  if(!clipboard || !clipboard.registros?.length){
    alert('No hay fechas copiadas en el portapapeles');
    return;
  }

  let copied = 0;
  clipboard.registros.forEach(item=>{
    const destKey = `${cursoId}_${alumnoId}_${item.fecha}`;
    if(state.acaps[destKey]) return;
    state.acaps[destKey] = {...item.data};
    setAsistValue(cursoId, alumnoId, item.fecha, 'AC');
    copied++;
  });

  const alumno = (state.alumnos[cursoId]||[]).find(a=>a.id===alumnoId);
  logAcapHistory(`Pegar desde portapapeles (${copied})`, alumno?.nombre||'');
  save();
  render();
  alert(copied ? 'Fechas pegadas correctamente' : 'No había fechas nuevas para pegar');
}

function guardarEvento(){
  const titulo = document.getElementById('ev_titulo')?.value?.trim();
  if(!titulo) return;
  const fechaBase = document.getElementById('ev_fecha')?.value||todayISO();
  const repeat = document.getElementById('ev_repeat')?.value || 'none';
  const repeatCount = Math.max(1, parseInt(document.getElementById('ev_repeat_count')?.value||1,10) || 1);
  const ev = {
    titulo,
    fecha:fechaBase,
    hora:document.getElementById('ev_hora')?.value||'',
    lugar:document.getElementById('ev_lugar')?.value||'',
    etiqueta:document.getElementById('ev_etiqueta')?.value||'',
    descripcion:document.getElementById('ev_descripcion')?.value||'',
    color:document.getElementById('ev_color')?.value||COLORES[0],
    repeat,
    repeatCount,
  };
  const id = document.getElementById('ev_id')?.value;
  if(id){ state.eventos=state.eventos.map(e=>e.id===id?{...ev,id}:e); }
  else {
    const eventosNuevos = [{...ev,id:uid()}];
    for(let i=1;i<repeatCount;i++){
      const base = isoToDate(fechaBase);
      if(repeat==='weekly') base.setDate(base.getDate()+(7*i));
      else if(repeat==='monthly') base.setMonth(base.getMonth()+i);
      else break;
      eventosNuevos.push({...ev,id:uid(),fecha:toISO(base)});
    }
    state.eventos=[...eventosNuevos,...state.eventos];
  }
  save(); closeModal();
}

function normalizeImportedAppState(data){
  const source = data?.state && typeof data.state === 'object' ? data.state : data;
  const next = {
    ...state,
    ...deepCopy(PERSIST_DEFAULTS),
    ...(source && typeof source === 'object' ? source : {})
  };
  if(!next._listaCols) next._listaCols = ['','',''];
  if(typeof next._listaModo === 'undefined') next._listaModo = 'curso';
  if(!next._acapOpen) next._acapOpen = {};
  if(!next._acapClipboard) next._acapClipboard = null;
  if(typeof next._acapSearch === 'undefined') next._acapSearch = '';
  if(typeof next._acapDesde === 'undefined') next._acapDesde = '';
  if(typeof next._acapHasta === 'undefined') next._acapHasta = '';
  if(typeof next._asistSearch === 'undefined') next._asistSearch = '';
  if(typeof next._asistInitial === 'undefined') next._asistInitial = '';
  if(typeof next._asistLimit === 'undefined') next._asistLimit = 40;
  if(typeof next._asistOnlyAcap === 'undefined') next._asistOnlyAcap = false;
  if(!next._asistSelected) next._asistSelected = {};
  if(!next.asistObs) next.asistObs = {};
  if(!next.horasInstitucion) next.horasInstitucion = HORAS;
  if(typeof next.fastMode === 'undefined') next.fastMode = false;
  if(typeof next._lastModified === 'undefined') next._lastModified = '';
  if(!next.acapHistorial) next.acapHistorial = [];
  if(typeof next._notasSearch === 'undefined') next._notasSearch = '';
  if(typeof next._notasOnlyImportant === 'undefined') next._notasOnlyImportant = false;
  if(!next.listasGlobales) next.listasGlobales = [];
  if(typeof next._authMode === 'undefined') next._authMode = 'login';
  if(!next.userProfile) next.userProfile = {nombre:activeUser?.nombre||'', email:activeUser?.email||'', uid:activeUser?.uid||''};
  if(!next.plan) next.plan = 'free';
  next.notas = (next.notas||[]).map(n=>({importante:false,fija:false,...n}));
  if(typeof next.modal === 'undefined') next.modal = null;
  if(typeof next.modalData === 'undefined') next.modalData = {};
  return next;
}

async function subirEstadoActualANubeEstricto(successMessage='Datos subidos a la nube correctamente'){
  if(!(firestoreEnabled && firestoreDb && activeUser?.uid)){
    const code = 'firestore/not-available';
    const message = 'No hay una sesión con Firestore disponible para sincronizar.';
    console.error(code, message);
    showToast(`${code}: ${message}`);
    return false;
  }
  try{
    const payload = getCurrentStatePayload();
    const ref = getFirestoreDocRef('main');
    const userRef = getUserDocRef(activeUser.uid);
    await Promise.all([
      ref.set({
        state: payload,
        meta: {
          updatedAt: state._lastModified || new Date().toISOString(),
          dataKeys: APP_DATA_KEYS
        }
      }, {merge:true}),
      userRef.set({
        plan: state.plan === 'premium' ? 'premium' : 'free',
        email: activeUser?.email || '',
        nombre: getVisibleUserName(),
        perfil: buildSyncedProfilePayload(),
        updatedAt: state._lastModified || new Date().toISOString()
      }, {merge:true})
    ]);
    console.log('Datos guardados en Firestore', payload);
    setCloudStatus('synced');
    showToast(successMessage);
    return true;
  }catch(err){
    console.error('Emergency Firestore sync error', err);
    const code = err?.code || 'firestore/error';
    const message = err?.message || 'Error desconocido al guardar en Firestore.';
    showToast(`${code}: ${message}`);
    return false;
  }
}

      state = normalizeImportedAppState(data);
      state._lastModified = new Date().toISOString();
      persistLocalState();

      clearTimeout(toastTimer);
      toastTimer = null;
    }
    const toast = document.createElement('div');
    toast.id = 'global-toast';
    toast.textContent = text;
    toast.style.position = 'fixed';
    toast.style.left = '50%';
    toast.style.bottom = '24px';
    toast.style.transform = 'translateX(-50%) translateY(16px)';
    toast.style.background = 'rgba(17, 24, 39, 0.94)';
    toast.style.color = '#fff';
    toast.style.padding = '12px 16px';
    toast.style.borderRadius = '14px';
    toast.style.fontSize = '13px';
    toast.style.fontWeight = '700';
    toast.style.lineHeight = '1.4';
    toast.style.textAlign = 'center';
    toast.style.maxWidth = 'min(92vw, 420px)';
    toast.style.width = 'max-content';
    toast.style.boxShadow = '0 10px 28px rgba(0,0,0,.22)';
    toast.style.zIndex = '5000';
    toast.style.opacity = '0';
    toast.style.transition = 'opacity .25s ease, transform .25s ease';
    toast.style.pointerEvents = 'none';
    document.body.appendChild(toast);
    requestAnimationFrame(()=>{
      toast.style.opacity = '1';
      toast.style.transform = 'translateX(-50%) translateY(0)';
    });
    toastTimer = setTimeout(()=>{
      toast.style.opacity = '0';
      toast.style.transform = 'translateX(-50%) translateY(12px)';
      setTimeout(()=>{
        if(toast.parentNode) toast.remove();
      }, 250);
      toastTimer = null;
    }, 3000);
  }catch(err){
    try{
      alert(message);
    }catch{}
  }
}

// ============================================================
// INIT
// ============================================================
applyColors();
splashMaxTimer = setTimeout(()=>hideSplashScreen(), 2000);
ensureAutoAcapForDate(todayISO());
window.addEventListener('online', ()=>{
  state._online=true;
  if(activeUser?.uid && firestoreEnabled){
    hydrateFromFirestoreInBackground();
  } else {
    setCloudStatus('local');
    render();
  }
});
window.addEventListener('offline', ()=>{
  state._online=false;
  setCloudStatus('offline');
  render();
});
setInterval(()=>{
  if(state.screen==='home' && !state.modal) render();
}, 60000);
  if(initFirebaseAuth() && firebaseAuth){
  firebaseAuth.onAuthStateChanged(user=>{
    const finalizeAuth = async (resolvedUser)=>{
      resetScopedState();
      syncActiveUserFromFirebase(resolvedUser);
      if(resolvedUser){
        await ensureUserDirectoryDoc(resolvedUser);
        reloadScopedLocalState();
        authReady = true;
        if(firestoreEnabled && (typeof navigator==='undefined' || navigator.onLine)){
          setCloudStatus('syncing');
          loadDataFromFirestore()
            .then(()=>{
              render();
              setCloudStatus('synced');
            })
            .catch(err=>{
              console.error('Initial Firestore load error', err);
              setCloudStatus((typeof navigator!=='undefined' && !navigator.onLine) ? 'offline' : 'local');
              render();
            });
          return;
        }
        render();
        return;
      }
      setCloudStatus('local');
      authReady = true;
      render();
    };
    if(user?.reload){
      user.reload()
        .then(()=>finalizeAuth(firebaseAuth.currentUser || user))
        .catch(()=>finalizeAuth(firebaseAuth.currentUser || user));
      return;
    }
    finalizeAuth(user);
  });
} else {
  setCloudStatus('local');
  authReady = true;
  render();
}
</script>
