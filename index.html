<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0"/>
<title>Preceptor Pro</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#f4f6fb;min-height:100vh;}
  button{cursor:pointer;font-family:inherit;}
  input,textarea,select{font-family:inherit;}
  textarea{resize:vertical;}
  :root{
    --primary:#1a1a2e;
    --accent:#4361ee;
    --bg:#f4f6fb;
  }
  .app{max-width:500px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;}
  .screen{padding:16px 16px 90px;}
  /* Bottom Nav */
  .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;background:#fff;border-top:1px solid #f0f0f0;display:flex;z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,.08);}
  .nav-btn{flex:1;background:none;border:none;padding:12px 4px;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;font-weight:700;color:#999;}
  .nav-btn.active{color:var(--accent);}
  .nav-btn svg{display:block;}
  /* Cards */
  .card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.07);margin-bottom:14px;}
  /* Buttons */
  .btn-primary{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:13px;font-weight:800;font-size:15px;width:100%;}
  .btn-ghost{background:#f0f0f0;border:none;border-radius:12px;padding:13px;font-weight:700;font-size:14px;width:100%;}
  /* Inputs */
  .inp{width:100%;padding:11px 13px;border-radius:10px;border:1px solid #e0e0e0;font-size:14px;}
  .inp:focus{outline:2px solid var(--accent);border-color:transparent;}
  /* Modal */
  .modal-overlay{position:fixed;inset:0;z-index:1000;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.5);}
  .modal-box{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding:20px 16px 32px;}
  /* Tabs */
  .tabs{display:flex;background:#ebebf0;border-radius:12px;padding:4px;gap:2px;margin-bottom:14px;}
  .tab-btn{flex:1;padding:8px 4px;border-radius:9px;border:none;font-weight:700;font-size:11px;background:transparent;color:#888;transition:all .2s;}
  .tab-btn.active{background:#fff;color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.1);}
  /* Vista selector */
  .vista-sel{display:flex;background:#ebebf0;border-radius:12px;padding:4px;gap:2px;margin-bottom:16px;}
  .vista-btn{flex:1;padding:8px 4px;border-radius:9px;border:none;font-weight:700;font-size:12px;background:transparent;color:#888;}
  .vista-btn.active{background:#fff;color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.1);}
  /* Fab */
  .fab{position:fixed;bottom:80px;right:calc(50% - 240px);width:52px;height:52px;border-radius:50%;background:var(--accent);border:none;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(67,97,238,.4);z-index:200;color:#fff;font-size:28px;font-weight:300;}
  /* Notif cards */
  .notif{border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:10px;}
  /* Asistencia buttons */
  .asist-btn{width:34px;height:34px;border-radius:9px;border:2px solid #e0e0e0;background:#fff;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;}
  .asist-btn.active-P{background:#27ae60;border-color:#27ae60;color:#fff;}
  .asist-btn.active-A{background:#e74c3c;border-color:#e74c3c;color:#fff;}
  .asist-btn.active-J{background:#2980b9;border-color:#2980b9;color:#fff;}
  .asist-btn.active-S{background:#1a1a2e;border-color:#1a1a2e;color:#fff;}
  .asist-btn.active-AC{background:#e67e22;border-color:#e67e22;color:#fff;}
  .asist-btn.active-T{background:#8e44ad;border-color:#8e44ad;color:#fff;}
  /* Expandable asist row */
  .asist-expand{display:none;flex-wrap:wrap;gap:6px;padding:10px 0 4px;}
  .asist-expand.open{display:flex;}
  .asist-main-btn{padding:8px 14px;border-radius:10px;border:2px solid #e0e0e0;background:#fff;font-weight:800;font-size:13px;color:#888;}
  /* Back btn */
  .back-btn{background:#fff;border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.1);flex-shrink:0;}
  /* Scrollable table */
  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  table{border-collapse:collapse;}
  th,td{padding:8px 6px;text-align:center;}
  /* Color dots */
  .color-dot{width:30px;height:30px;border-radius:8px;cursor:pointer;border:2px solid transparent;display:inline-block;}
  .color-dot.sel{border-color:#333;transform:scale(1.15);}
  label{display:block;font-size:12px;font-weight:700;color:#888;margin-bottom:5px;}
  /* Importance stars */
  .imp-btn{flex:1;padding:8px;border-radius:10px;border:2px solid #e0e0e0;background:#fff;font-weight:700;font-size:13px;}
  .imp-btn.sel{border-color:var(--accent);background:#eff3ff;color:var(--accent);}
  /* Notification bell badge */
  .badge{background:#e74c3c;color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;}
  @media(max-width:400px){.fab{right:20px;}}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- Rendered by JS -->
</div>

<script>
// ============================================================
// DATA & STORAGE
// ============================================================
const FERIADOS = [
  {fecha:"2026-01-01",nombre:"Año Nuevo"},
  {fecha:"2026-02-16",nombre:"Carnaval"},
  {fecha:"2026-02-17",nombre:"Carnaval"},
  {fecha:"2026-03-24",nombre:"Día de la Memoria"},
  {fecha:"2026-04-02",nombre:"Día del Veterano de Malvinas"},
  {fecha:"2026-04-03",nombre:"Viernes Santo"},
  {fecha:"2026-05-01",nombre:"Día del Trabajador"},
  {fecha:"2026-05-25",nombre:"Revolución de Mayo"},
  {fecha:"2026-06-15",nombre:"Paso a la Inmortalidad del Gral. Güemes"},
  {fecha:"2026-06-20",nombre:"Paso a la Inmortalidad del Gral. Belgrano"},
  {fecha:"2026-07-09",nombre:"Día de la Independencia"},
  {fecha:"2026-08-17",nombre:"Paso a la Inmortalidad del Gral. San Martín"},
  {fecha:"2026-10-12",nombre:"Día del Respeto a la Diversidad Cultural"},
  {fecha:"2026-11-20",nombre:"Día de la Soberanía Nacional"},
  {fecha:"2026-12-08",nombre:"Inmaculada Concepción de María"},
  {fecha:"2026-12-25",nombre:"Navidad"},

const COLORES = ["#6C63FF","#E74C3C","#27AE60","#F39C12","#2980B9","#8E44AD","#16A085","#D35400","#E91E63","#1a1a2e"];
const DIAS = ["Lunes","Martes","Miércoles","Jueves","Viernes"];
const HORAS = ["12:30 - 13:10","13:10 - 13:50","13:50 - 14:30","14:40 - 15:20","15:20 - 16:00","16:00 - 16:40","16:50 - 17:30","17:30 - 18:10","CONTRATURNO"];

const DIAS_CORTOS = ["D","L","M","X","J","V","S"];

const S = {
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

// ---- State ----
let state = {
  perfil: S.get('pp_perfil', {nombre:'Preceptor/a', escuela:'Mi Escuela', turno:'Mañana'}),
  cursos: S.get('pp_cursos', [
    {id:'c1',nombre:'5° A BOEA',orientacion:'Economía y Administración',color:'#6C63FF'},
    {id:'c2',nombre:'5° B BOEA',orientacion:'Economía y Administración',color:'#C0392B'},
    {id:'c3',nombre:'5° A BOI',orientacion:'Orientación Informática',color:'#2980B9'},
  ]),
  alumnos: S.get('pp_alumnos', {
    c1:[
      {id:'a1',nombre:'BARBERIS, Santino Ezequiel'},
      {id:'a2',nombre:'BARRONE, Pilar'},
      {id:'a3',nombre:'BENITEZ, Thiago Nicolas'},
      {id:'a4',nombre:'BENITEZ BAEZ, Francisco Ramón'},
      {id:'a5',nombre:'CASANOVA, Uma Taina'},
      {id:'a6',nombre:'CRISTALDO NAYAR, Tiziana Ornella'},
      {id:'a7',nombre:'DIAZ, Nerea Selene'},
      {id:'a8',nombre:'ETCHEZAR, Martina Oriana'},
      {id:'a9',nombre:'FERNÁNDEZ GARAYO, Yanina'},
      {id:'a10',nombre:'FLEITAS ARGAÑARAZ, Karim Tobías'},
      {id:'a11',nombre:'GEREZ, Valentina Alejandra'},
      {id:'a12',nombre:'GIMENEZ, Victoria Alejandra'},
      {id:'a13',nombre:'GONZALEZ, Bianca Magali'},
      {id:'a14',nombre:'GONZÁLEZ, Oriana Beatriz'},
    ],
    c2:[{id:'b1',nombre:'ALMIRON, Facundo'},{id:'b2',nombre:'BAZAN, Lucía'},{id:'b3',nombre:'CAMPOS, Rodrigo'}],
    c3:[{id:'c01',nombre:'ACOSTA, Tomás'},{id:'c02',nombre:'BORDON, Milagros'},{id:'c03',nombre:'CASTRO, Nicolás'}],
  }),
  asistencia: S.get('pp_asist', {}),
  acaps: S.get('pp_acaps', {}),
  horarios: S.get('pp_hor', {}),
  eventos: S.get('pp_eventos', []),
  notas: S.get('pp_notas', []),
  listas: S.get('pp_listas', {}),
  colors: S.get('pp_colors', {primary:'#1a1a2e', accent:'#4361ee', bg:'#f4f6fb'}),
  // Nav
  screen: 'home', // home | curso | perfil | config
  tab: 'cursos',  // cursos | horarios | agenda | notas
  cursoActivo: null,
  cursoTab: 'asistencia',
  fechaAsist: toISO(new Date()),
  vistaAsist: 'dia',
  _listaActiva: null,
  _listaCols: ['','',''],
  // Modals
  modal: null,
  modalData: {},
};

function save(){
  S.set('pp_perfil',state.perfil);
  S.set('pp_cursos',state.cursos);
  S.set('pp_alumnos',state.alumnos);
  S.set('pp_asist',state.asistencia);
  S.set('pp_acaps',state.acaps);
  S.set('pp_hor',state.horarios);
  S.set('pp_eventos',state.eventos);
  S.set('pp_notas',state.notas);
  S.set('pp_listas',state.listas);
  S.set('pp_colors',state.colors);
}

// ============================================================
// UTILS
// ============================================================
function toISO(d){return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function p2(n){return String(n).padStart(2,'0');}
function addDays(iso,n){const d=new Date(iso);d.setDate(d.getDate()+n);return toISO(d);}
function isoToDate(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function fmtFecha(iso){const d=isoToDate(iso);const days=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];return `${days[d.getDay()]}, ${d.getDate()} de ${MESES[d.getMonth()]} de ${d.getFullYear()}`;}
function startOfWeek(iso){const d=isoToDate(iso);const day=d.getDay();const diff=day===0?-6:1-day;d.setDate(d.getDate()+diff);return toISO(d);}
function daysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function todayISO(){return toISO(new Date());}
function saludo(){const h=new Date().getHours();if(h<12)return'¡Buenos días';if(h<20)return'¡Buenas tardes';return'¡Buenas noches';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function uid(){return '_'+Math.random().toString(36).slice(2);}

function getAsist(cursoId,alumnoId,fecha){return (state.asistencia[`${cursoId}_${alumnoId}_${fecha}`])||null;}
function setAsist(cursoId,alumnoId,fecha,val){
  const k=`${cursoId}_${alumnoId}_${fecha}`;
  if(val===null)delete state.asistencia[k];
  else state.asistencia[k]=val;
  save();
}
function getAcap(cursoId,alumnoId,fecha){return state.acaps[`${cursoId}_${alumnoId}_${fecha}`]||null;}

function applyColors(){
  document.documentElement.style.setProperty('--primary',state.colors.primary);
  document.documentElement.style.setProperty('--accent',state.colors.accent);
  document.documentElement.style.setProperty('--bg',state.colors.bg);
}

// ============================================================
// RENDER ENGINE
// ============================================================
function render(){
  applyColors();
  const app = document.getElementById('app');
  app.innerHTML = buildApp();
  attachEvents();
}

function buildApp(){
  let html = '';
  if(state.screen==='perfil') html = buildPerfil();
  else if(state.screen==='config') html = buildConfig();
  else if(state.screen==='curso') html = buildCurso();
  else if(state.tab==='horarios') html = buildHorarios();
  else if(state.tab==='agenda') html = buildAgenda();
  else if(state.tab==='notas') html = buildNotas();
  else html = buildHome();

  const showNav = state.screen!=='perfil' && state.screen!=='config' && state.screen!=='curso';
  const showFab = showNav && state.tab==='cursos';

  return `
    <div>
      ${html}
      ${showNav ? buildBottomNav() : ''}
      ${showFab ? `<button class="fab" onclick="openModal('curso')">+</button>` : ''}
      ${state.modal ? buildModal() : ''}
    </div>
  `;
}

// ============================================================
// ICONS
// ============================================================
const ICONS = {
  home:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
  clock:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
  calendar:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
  notes:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  back:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>`,
  trash:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`,
  edit:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  chevR:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>`,
  chevL:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>`,
  user:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
  settings:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`,
  check:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`,
  x:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
};

// ============================================================
// BOTTOM NAV
// ============================================================
function buildBottomNav(){
  const tabs = [
    {id:'cursos',icon:'home',label:'CURSOS'},
    {id:'horarios',icon:'clock',label:'HORARIOS'},
    {id:'agenda',icon:'calendar',label:'AGENDA'},
    {id:'notas',icon:'notes',label:'NOTAS'},
  ];
  return `<nav class="bottom-nav">${tabs.map(t=>`
    <button class="nav-btn ${state.tab===t.id&&state.screen==='home'?'active':''}" onclick="navTo('${t.id}')">
      ${ICONS[t.icon]}<span>${t.label}</span>
    </button>`).join('')}</nav>`;
}

// ============================================================
// HOME
// ============================================================
function buildHome(){
  const hoy = todayISO();
  const h = new Date().getHours();
  const emoji = h<12?'🌅':h<20?'☀️':'🌙';
  const ferHoy = FERIADOS.find(f=>f.fecha===hoy);
  const evsHoy = state.eventos.filter(e=>e.fecha===hoy);
  const acapsHoy = Object.keys(state.acaps).filter(k=>k.endsWith('_'+hoy)&&state.acaps[k]);
  const proxEvs = state.eventos.filter(e=>{
    const d=isoToDate(e.fecha)-new Date();
    return d>0 && d<7*86400000;
  }).sort((a,b)=>a.fecha.localeCompare(b.fecha));
  const notasDest = state.notas.filter(n=>n.destacada);

  let notifs = '';
  if(ferHoy) notifs += `<div class="notif" style="background:#fff0f0;border-left:4px solid #e74c3c"><span style="font-size:22px">🎉</span><div><div style="font-weight:700;color:#c0392b;font-size:14px">HOY · ${esc(ferHoy.nombre)}</div><div style="font-size:12px;color:#e74c3c">Feriado Nacional · Sin actividad escolar</div></div></div>`;
  evsHoy.forEach(ev=>{notifs+=`<div class="notif" style="background:#f0f4ff;border-left:4px solid ${ev.color||'var(--accent)'}"><span style="font-size:22px">📌</span><div><div style="font-weight:700;color:var(--primary);font-size:14px">HOY · ${esc(ev.titulo)}</div>${ev.hora?`<div style="font-size:12px;color:#666">${esc(ev.hora)}${ev.lugar?' · '+esc(ev.lugar):''}</div>`:''}</div></div>`;});
  if(acapsHoy.length) notifs+=`<div class="notif" style="background:#fff8e1;border-left:4px solid #f39c12"><span style="font-size:22px">💼</span><div><div style="font-weight:700;color:#e67e22;font-size:14px">ACAP · ${acapsHoy.length} alumno${acapsHoy.length>1?'s':''} en pasantía hoy</div></div></div>`;
  proxEvs.slice(0,2).forEach(ev=>{
    const diff=Math.round((isoToDate(ev.fecha)-new Date())/86400000);
    notifs+=`<div class="notif" style="background:#f8f9fa;border-left:4px solid ${ev.color||'#aaa'}"><span style="font-size:22px">🔔</span><div><div style="font-weight:700;color:var(--primary);font-size:14px">${diff===1?'MAÑANA':'EN '+diff+' DÍAS'} · ${esc(ev.titulo)}</div>${ev.hora?`<div style="font-size:12px;color:#666">${esc(ev.hora)}</div>`:''}</div></div>`;
  });
  notasDest.slice(0,2).forEach(n=>{notifs+=`<div class="notif" style="background:#fff;border-left:4px solid ${n.color||'var(--accent)'};box-shadow:0 1px 6px rgba(0,0,0,.07)"><span style="font-size:22px">⭐</span><div><div style="font-weight:700;color:var(--primary);font-size:14px">${esc(n.titulo||n.contenido.slice(0,40))}</div><div style="font-size:12px;color:#888">Nota importante</div></div></div>`;});

  let cursosHtml = state.cursos.map(c=>{
    const als = state.alumnos[c.id]||[];
    const presentes = als.filter(a=>{const e=getAsist(c.id,a.id,hoy);return e==='P'||e==='AC'||e==='T';}).length;
    const ausentes = als.filter(a=>getAsist(c.id,a.id,hoy)==='A').length;
    return `<div class="card" style="border-left:5px solid ${c.color};cursor:pointer" onclick="goCurso('${c.id}')">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div><div style="font-weight:800;font-size:17px;color:var(--primary)">${esc(c.nombre)}</div><div style="font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px">${esc(c.orientacion)}</div></div>
        <span style="color:#ccc">${ICONS.chevR}</span>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <div style="background:#f4f6fb;border-radius:10px;padding:8px 14px;text-align:center"><div style="font-size:10px;color:#888;font-weight:600">ALUMNOS</div><div style="font-size:22px;font-weight:900;color:var(--primary)">${als.length}</div></div>
        <div style="background:#f0fff4;border-radius:10px;padding:8px 14px;text-align:center"><div style="font-size:10px;color:#27ae60;font-weight:600">PRESENTES</div><div style="font-size:22px;font-weight:900;color:#27ae60">${presentes}</div></div>
        <div style="background:#fff5f5;border-radius:10px;padding:8px 14px;text-align:center"><div style="font-size:10px;color:#e74c3c;font-weight:600">AUSENTES</div><div style="font-size:22px;font-weight:900;color:#e74c3c">${ausentes}</div></div>
      </div>
    </div>`;
  }).join('');

  return `<div class="screen">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px">
      <div>
        <div style="font-size:12px;color:#888;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px">${fmtFecha(hoy)}</div>
        <div style="font-size:26px;font-weight:900;color:var(--primary);letter-spacing:-.5px">PRECEPTOR<span style="color:var(--accent)">PRO</span></div>
        <div style="font-size:15px;color:#555;margin-top:4px">${saludo()}, <strong>${esc(state.perfil.nombre)}</strong>! ${emoji}</div>
      </div>
      <div style="display:flex;gap:8px;padding-top:4px">
        <button style="background:none;border:none;padding:4px" onclick="goScreen('config')">${ICONS.settings}</button>
        <button style="background:none;border:none;padding:4px" onclick="goScreen('perfil')">${ICONS.user}</button>
      </div>
    </div>
    ${notifs}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;margin-top:8px">
      <div><div style="font-weight:800;font-size:18px;color:var(--primary)">Mis Cursos</div><div style="font-size:12px;color:#888">Gestión de asistencia y novedades</div></div>
      <button style="background:none;border:none;color:var(--accent);font-weight:700;font-size:13px" onclick="openModal('curso')">+ Nuevo</button>
    </div>
    ${cursosHtml}
    <div style="font-weight:800;font-size:16px;color:var(--primary);margin-bottom:12px;margin-top:4px">Accesos Rápidos</div>
    <div style="display:flex;gap:12px">
      ${[['agenda','calendar','Agenda'],['notas','notes','Notas'],['horarios','clock','Horarios']].map(([t,i,l])=>`<button onclick="navTo('${t}')" style="flex:1;background:#fff;border:none;border-radius:14px;padding:14px 10px;box-shadow:0 1px 6px rgba(0,0,0,.07);display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--accent);font-size:12px;font-weight:600">${ICONS[i]}<span style="color:#555">${l}</span></button>`).join('')}
    </div>
  </div>`;
}

// ============================================================
// CURSO
// ============================================================
function buildCurso(){
  const c = state.cursos.find(x=>x.id===state.cursoActivo);
  if(!c) return '';
  let content = '';
  if(state.cursoTab==='asistencia') content = buildAsistencia(c);
  else if(state.cursoTab==='acap') content = buildAcap(c);
  else if(state.cursoTab==='listas') content = buildListas(c);
  else if(state.cursoTab==='editar') content = buildEditar(c);

  return `<div>
    <div style="padding:16px 16px 0;position:sticky;top:0;background:var(--bg);z-index:10">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:12px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:1px">${fmtFecha(todayISO()).split(',')[0]}</span>
        <span style="font-weight:900;color:var(--accent);font-size:13px">PRECEPTOR<span style="color:var(--primary)">PRO</span></span>
      </div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
        <button class="back-btn" onclick="goHome()">${ICONS.back}</button>
        <span style="font-weight:800;font-size:20px;color:var(--primary)">${esc(c.nombre)}</span>
      </div>
      <div class="tabs">
        ${['asistencia','acap','listas','editar'].map(t=>`<button class="tab-btn ${state.cursoTab===t?'active':''}" onclick="setCursoTab('${t}')">${t.toUpperCase()}</button>`).join('')}
      </div>
    </div>
    <div style="padding:0 16px 90px">${content}</div>
  </div>`;
}

// ---- ASISTENCIA ----
function buildAsistencia(c){
  const als = state.alumnos[c.id]||[];
  const vista = state.vistaAsist;
  const fecha = state.fechaAsist;

  let vistaHtml = '';
  if(vista==='dia') vistaHtml = buildVistaDia(c, als, fecha);
  else if(vista==='semana') vistaHtml = buildVistaSemana(c, als, fecha);
  else vistaHtml = buildVistaMes(c, als, fecha);

  return `
    <div class="vista-sel">
      ${['dia','semana','mes'].map(v=>`<button class="vista-btn ${vista===v?'active':''}" onclick="setVista('${v}')">${v.toUpperCase()}</button>`).join('')}
    </div>
    ${vistaHtml}`;
}

function buildVistaDia(c, als, fecha){
  const alsOrd = [...als].sort((a,b)=>a.nombre.localeCompare(b.nombre));
  const colores = {P:'#27ae60',A:'#e74c3c',J:'#2980b9',S:'#1a1a2e',T:'#8e44ad',AC:'#e67e22'};
  const labels = {P:'Presente',A:'Ausente',J:'Justificado',S:'Suspendido',T:'Tarde',AC:'ACAP'};

  let rows = alsOrd.map((a,i)=>{
    const acap = getAcap(c.id,a.id,fecha);
    const cur = getAsist(c.id,a.id,fecha);
    const bg = acap ? '#fff8e1' : '#fff';
    const border = acap ? '1px solid #f39c12' : '1px solid transparent';
    const col = cur ? colores[cur]||'#888' : '#ccc';
    const estadoLabel = cur ? labels[cur]||cur : '—';
    const rowId = `row_${c.id}_${a.id}`;
    // Expandable buttons
    const btns = ['P','A','J','S','T','AC'].map(e=>{
      const isActive = cur===e;
      return `<button class="asist-btn ${isActive?'active-'+e:''}" onclick="toggleAsist('${c.id}','${a.id}','${fecha}','${e}');toggleAsistRow('${rowId}')" title="${labels[e]}">${e}</button>`;
    }).join('');
    return `<div id="${rowId}" style="background:${bg};border-radius:14px;padding:12px 14px;margin-bottom:10px;box-shadow:0 1px 5px rgba(0,0,0,.06);border:${border}">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="flex:1;min-width:0">
          <span style="font-weight:700;font-size:13px;color:${acap?'#e67e22':'var(--primary)'}">${i+1}. ${esc(a.nombre)}</span>
          ${acap?`<div style="font-size:11px;color:#e67e22">💼 ACAP: ${esc(acap.empresa||'')} ${esc(acap.horario||'')}</div>`:''}
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          ${cur?`<span style="font-size:12px;font-weight:800;color:${col};background:${col}18;border-radius:8px;padding:4px 10px">${estadoLabel}</span>`:''}
          <button onclick="toggleAsistRow('${rowId}')" style="background:${cur?col:'#f0f0f0'};border:none;border-radius:10px;padding:6px 12px;font-weight:800;font-size:13px;color:${cur?'#fff':'#888'};min-width:44px">
            ${cur||'·'}
          </button>
        </div>
      </div>
      <div class="asist-expand" id="exp_${rowId}">
        ${btns}
        ${cur?`<button onclick="toggleAsist('${c.id}','${a.id}','${fecha}',null);toggleAsistRow('${rowId}')" style="padding:6px 12px;border-radius:9px;border:1.5px solid #e0e0e0;background:#fff;font-size:11px;font-weight:700;color:#999">Limpiar</button>`:''}
      </div>
    </div>`;
  }).join('');

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-size:11px;color:#888;font-weight:600">Tocá el botón para marcar</div>
      <div style="display:flex;align-items:center;gap:6px">
        <button onclick="setFechaAsist('${addDays(fecha,-1)}')" style="background:#fff;border:none;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.1)">${ICONS.chevL}</button>
        <span style="font-size:13px;font-weight:700;color:var(--primary);min-width:90px;text-align:center">${p2(isoToDate(fecha).getDate())}/${p2(isoToDate(fecha).getMonth()+1)}/${isoToDate(fecha).getFullYear()}</span>
        <button onclick="setFechaAsist('${addDays(fecha,1)}')" style="background:#fff;border:none;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.1)">${ICONS.chevR}</button>
      </div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
      ${Object.entries(colores).map(([k,v])=>`<span style="font-size:11px;font-weight:700;color:${v};background:${v}18;border-radius:6px;padding:3px 8px">${k}=${labels[k]}</span>`).join('')}
    </div>
    ${rows}`;
}

function buildVistaSemana(c, als, fecha){
  const lunes = startOfWeek(fecha);
  const dias = Array.from({length:5},(_,i)=>addDays(lunes,i));
  const colores = {P:'#27ae60',A:'#e74c3c',J:'#2980b9',S:'#1a1a2e',T:'#8e44ad',AC:'#e67e22'};
  const alsOrd = [...als].sort((a,b)=>a.nombre.localeCompare(b.nombre));
  const hoy = todayISO();

  const thead = `<tr style="background:#f4f6fb"><th style="text-align:left;font-size:11px;color:#888;padding:8px;min-width:120px">ALUMNO</th>${dias.map(d=>`<th style="font-size:11px;color:${d===hoy?'#fff':'#888'};background:${d===hoy?'var(--accent)':'transparent'};border-radius:6px;padding:6px 8px;min-width:44px">${p2(isoToDate(d).getDate())}/${p2(isoToDate(d).getMonth()+1)}</th>`).join('')}</tr>`;
  const tbody = alsOrd.map((a,i)=>{
    const celdas = dias.map(d=>{
      const est = getAsist(c.id,a.id,d);
      const col = est ? colores[est]||'#aaa' : '#ccc';
      return `<td style="padding:8px;text-align:center"><span style="font-weight:800;color:${col};font-size:14px">${est||'—'}</span></td>`;
    }).join('');
    return `<tr style="border-bottom:1px solid #f0f0f0"><td style="padding:8px 6px;font-size:11px;font-weight:600;color:var(--primary)">${i+1}. ${esc(a.nombre)}</td>${celdas}</tr>`;
  }).join('');

  const lunesD = isoToDate(lunes);
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <button onclick="setFechaAsist('${addDays(lunes,-7)}')" style="background:#fff;border:none;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.1)">${ICONS.chevL}</button>
      <span style="font-size:13px;font-weight:700;color:var(--primary)">Semana ${lunesD.getDate()}/${lunesD.getMonth()+1}</span>
      <button onclick="setFechaAsist('${addDays(lunes,7)}')" style="background:#fff;border:none;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.1)">${ICONS.chevR}</button>
    </div>
    <div class="tbl-wrap"><table>${thead}<tbody>${tbody}</tbody></table></div>`;
}

function buildVistaMes(c, als, fecha){
  const d = isoToDate(fecha);
  const y = d.getFullYear(), m = d.getMonth();
  const dias = daysInMonth(y,m);
  const colores = {P:'#27ae60',A:'#e74c3c',J:'#2980b9',S:'#1a1a2e',T:'#8e44ad',AC:'#e67e22'};
  const alsOrd = [...als].sort((a,b)=>a.nombre.localeCompare(b.nombre));
  const hoy = todayISO();

  const thead = `<tr style="background:#f4f6fb"><th style="text-align:left;font-size:10px;color:#888;padding:6px;min-width:90px">ALUMNO</th>${Array.from({length:dias},(_,i)=>`<th style="font-size:10px;padding:4px;min-width:22px;color:${`${y}-${p2(m+1)}-${p2(i+1)}`===hoy?'var(--accent)':'#888'};font-weight:${`${y}-${p2(m+1)}-${p2(i+1)}`===hoy?800:400}">${i+1}</th>`).join('')}</tr>`;
  const tbody = alsOrd.map((a,i)=>{
    const celdas = Array.from({length:dias},(_,j)=>{
      const iso=`${y}-${p2(m+1)}-${p2(j+1)}`;
      const est=getAsist(c.id,a.id,iso);
      const col=est?colores[est]:'#e0e0e0';
      return `<td style="padding:3px;text-align:center;background:${est==='A'?'#fff5f5':'transparent'}"><span style="font-weight:800;color:${col};font-size:11px">${est||'—'}</span></td>`;
    }).join('');
    return `<tr style="border-bottom:1px solid #f0f0f0"><td style="padding:6px;font-size:11px;font-weight:600;color:var(--primary);white-space:nowrap">${i+1}. ${esc(a.nombre.split(',')[0])}</td>${celdas}</tr>`;
  }).join('');

  const prev = m===0?`${y-1}-12-01`:`${y}-${p2(m)}-01`;
  const next = m===11?`${y+1}-01-01`:`${y}-${p2(m+2)}-01`;

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <button onclick="setFechaAsist('${prev}')" style="background:#fff;border:none;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.1)">${ICONS.chevL}</button>
      <span style="font-size:13px;font-weight:700;color:var(--primary)">${MESES[m]} ${y}</span>
      <button onclick="setFechaAsist('${next}')" style="background:#fff;border:none;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.1)">${ICONS.chevR}</button>
    </div>
    <div class="tbl-wrap"><table>${thead}<tbody>${tbody}</tbody></table></div>`;
}

function buildAcap(c){
  const als = state.alumnos[c.id]||[];
  const f = state._acapFecha||todayISO();
  if(!state._acapFecha) state._acapFecha = todayISO();

  const rows = als.map((a,i)=>{
    const acap = getAcap(c.id,a.id,f)||{};
    const tiene = !!(acap.empresa||acap.horario);
    return `<div style="background:${tiene?'#fff8e1':'#fff'};border-radius:14px;padding:12px 14px;margin-bottom:10px;box-shadow:0 1px 5px rgba(0,0,0,.06);border:${tiene?'1px solid #f39c12':'1px solid transparent'}">
      <div style="font-weight:700;font-size:13px;color:${tiene?'#e67e22':'var(--primary)'};margin-bottom:10px">${i+1}. ${esc(a.nombre)}</div>
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <input id="acap_h_${a.id}" class="inp" placeholder="Horario (ej: 14 a 16)" value="${esc(acap.horario||'')}" style="flex:1;font-size:12px;padding:8px 10px"/>
        <input id="acap_e_${a.id}" class="inp" placeholder="Lugar / Empresa" value="${esc(acap.empresa||'')}" style="flex:1;font-size:12px;padding:8px 10px"/>
      </div>
      <div style="display:flex;gap:8px">
        <button onclick="saveAcap('${c.id}','${a.id}')" style="flex:1;background:var(--accent);border:none;border-radius:10px;padding:8px;color:#fff;font-weight:700;font-size:12px">Guardar</button>
        ${tiene?`<button onclick="clearAcap('${c.id}','${a.id}')" style="background:#fff0f0;border:1px solid #e74c3c;border-radius:10px;padding:8px 12px;color:#e74c3c;font-weight:700;font-size:12px">Borrar</button>`:''}
      </div>
    </div>`;
  }).join('');

  return `
    <div style="background:#eff3ff;border-radius:12px;padding:12px 14px;margin-bottom:16px">
      <div style="font-weight:700;color:var(--accent);font-size:13px;margin-bottom:4px">¿CÓMO FUNCIONA?</div>
      <div style="font-size:12px;color:#555">Cargá empresa y horario por alumno. Al guardar se marca automáticamente como AC en asistencia.</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
      <button onclick="setAcapFecha('${addDays(f,-1)}')" style="background:#fff;border:none;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.1)">${ICONS.chevL}</button>
      <input type="date" value="${f}" class="inp" style="flex:1;font-weight:600" onchange="setAcapFecha(this.value)"/>
      <button onclick="setAcapFecha('${addDays(f,1)}')" style="background:#fff;border:none;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.1)">${ICONS.chevR}</button>
    </div>
    ${rows}`;
}

// ---- LISTAS TAB ----
function buildListas(c){
  // Fix: use undefined check properly
  if(state._listaActiva !== null && state._listaActiva !== undefined){
    return buildListaDetalle(c);
  }
  const lsts = state.listas[c.id]||[];
  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <span style="font-weight:700;font-size:15px;color:var(--primary)">Listas personalizadas</span>
    <button style="background:var(--accent);border:none;border-radius:10px;padding:8px 14px;color:#fff;font-weight:700;font-size:13px" onclick="openModal('lista')">+ Nueva</button>
  </div>`;
  if(!lsts.length) html+=`<div style="text-align:center;padding:40px 20px;color:#aaa"><div style="font-size:40px">📋</div><div style="margin-top:12px;font-size:14px">No hay listas todavía</div><div style="font-size:12px;margin-top:4px">Tocá + Nueva para crear una</div></div>`;
  lsts.forEach((l,i)=>{
    const totalChecks = Object.values(l.checks||{}).filter(Boolean).length;
    const totalPosibles = (state.alumnos[c.id]||[]).length * (l.columnas||[]).length;
    html+=`<div class="card" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center" onclick="setListaActiva(${i})">
      <div style="flex:1">
        <div style="font-weight:700;color:var(--primary);font-size:14px">${esc(l.nombre)}</div>
        <div style="font-size:12px;color:#888;margin-top:2px">${(l.columnas||[]).join(' · ')}</div>
        <div style="font-size:11px;color:var(--accent);margin-top:4px;font-weight:600">${totalChecks} / ${totalPosibles} marcados</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button onclick="event.stopPropagation();borrarLista(${i})" style="background:none;border:none;color:#e74c3c;padding:6px">${ICONS.trash}</button>
        <span style="color:#ccc">${ICONS.chevR}</span>
      </div>
    </div>`;
  });
  return html;
}

function buildListaDetalle(c){
  const i = state._listaActiva;
  const lista = (state.listas[c.id]||[])[i];
  if(!lista) return '';
  const als = state.alumnos[c.id]||[];
  const thead = `<tr style="background:#f4f6fb"><th style="text-align:left;padding:8px;font-size:11px;color:#888;font-weight:700">ALUMNO</th>${(lista.columnas||[]).map(col=>`<th style="padding:8px;text-align:center;font-size:11px;color:#888;font-weight:700;min-width:80px">${esc(col)}</th>`).join('')}</tr>`;
  const tbody = als.map((a,ai)=>{
    const celdas = (lista.columnas||[]).map((_,ci)=>{
      const k=`${a.id}_${ci}`;
      const checked=(lista.checks||{})[k];
      return `<td style="padding:10px 8px;text-align:center"><button onclick="toggleCheck('${c.id}',${i},'${k}')" style="width:26px;height:26px;border-radius:6px;border:2px solid ${checked?'#27ae60':'#ccc'};background:${checked?'#27ae60':'#fff'};display:flex;align-items:center;justify-content:center;margin:0 auto;color:#fff">${checked?ICONS.check:''}</button></td>`;
    }).join('');
    return `<tr style="border-bottom:1px solid #f0f0f0"><td style="padding:10px 8px;font-size:13px;font-weight:600;color:var(--primary)">${ai+1}. ${esc(a.nombre)}</td>${celdas}</tr>`;
  }).join('');

  return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
    <button class="back-btn" onclick="setListaActiva(null)">${ICONS.back}</button>
    <span style="font-weight:800;font-size:16px;color:var(--primary)">${esc(lista.nombre)}</span>
  </div>
  <div class="tbl-wrap"><table>${thead}<tbody>${tbody}</tbody></table></div>`;
}

// ---- EDITAR TAB ----
function buildEditar(c){
  const als = state.alumnos[c.id]||[];
  const rows = [...als].sort((a,b)=>a.nombre.localeCompare(b.nombre)).map((a,i)=>`

function buildHorarios(){
  if(state._horCurso){
    return buildHorarioGrilla();
  }
  const cards = state.cursos.map(c=>`
    <div class="card" style="border-left:5px solid ${c.color};cursor:pointer;display:flex;justify-content:space-between;align-items:center" onclick="setHorCurso('${c.id}')">
      <span style="font-weight:800;font-size:17px;color:var(--primary)">${esc(c.nombre)}</span>
      ${ICONS.chevR}
    </div>`).join('');

  return `<div class="screen">
    <div style="font-weight:900;font-size:22px;color:var(--primary);margin-bottom:20px">HORARIOS ESCOLARES</div>
    ${cards}
  </div>`;
}

function buildHorarioGrilla(){
  const c = state.cursos.find(x=>x.id===state._horCurso);
  if(!c) return '';
  const hor = state.horarios[c.id]||{};
  const thead = `<tr><th style="padding:8px 10px;background:#f4f6fb;font-size:12px;color:#888;font-weight:700;text-align:left;min-width:100px">HORA</th>${DIAS.map(d=>`<th style="padding:8px 6px;background:#f4f6fb;font-size:11px;color:#888;font-weight:700;min-width:80px">${d}</th>`).join('')}</tr>`;
  const tbody = HORAS.map((hora,hi)=>{
    const isContra = hora==='CONTRATURNO';
    const celdas = DIAS.map(dia=>{
      const cell = hor[`${hi}_${dia}`]||{};
      return `<td style="padding:6px;cursor:pointer" onclick="openHorModal('${c.id}',${hi},'${dia}')">
        ${cell.materia?`<div style="background:${isContra?'#fff0cc':'#f4f6fb'};border-radius:8px;padding:6px 4px;font-size:11px"><div style="font-weight:700;color:var(--primary)">${esc(cell.materia)}</div><div style="color:#888;font-size:10px">${esc(cell.profesor||'')}</div></div>`:`<div style="color:#ddd;font-size:18px;text-align:center">···</div>`}
      </td>`;
    }).join('');
    return `<tr style="background:${isContra?'#fff8e1':'#fff'};border-bottom:1px solid #f0f0f0">
      <td style="padding:8px 10px;font-size:${isContra?13:12}px;font-weight:${isContra?800:600};color:${isContra?'#e67e22':'var(--primary)'};white-space:nowrap">${hora}</td>
      ${celdas}
    </tr>`;
  }).join('');

  return `<div class="screen">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
      <button class="back-btn" onclick="setHorCurso(null)">${ICONS.back}</button>
      <span style="font-weight:800;font-size:20px;color:var(--primary)">${esc(c.nombre)}</span>
    </div>
    <div class="tbl-wrap"><table>${thead}<tbody>${tbody}</tbody></table></div>
    <div style="margin-top:12px;font-size:12px;color:#aaa;text-align:center">Tocá una celda para editar</div>
  </div>`;
}

// ============================================================
// AGENDA
// ============================================================
function buildAgenda(){
  const calFecha = state._calFecha ? isoToDate(state._calFecha) : new Date();
  const y = calFecha.getFullYear(), m = calFecha.getMonth();
  const dias_count = daysInMonth(y,m);
  const primer_dia = new Date(y,m,1).getDay();
  const offset = primer_dia===0?6:primer_dia-1;
  const hoy = todayISO();
  const selDay = state._selDay||hoy;

  const getEvsDia = (iso)=>({feriado:FERIADOS.find(f=>f.fecha===iso), evs:state.eventos.filter(e=>e.fecha===iso)});

  const celdas = Array.from({length:offset},(_,i)=>`<div></div>`).join('') +
    Array.from({length:dias_count},(_,i)=>{
      const d=i+1;
      const iso=`${y}-${p2(m+1)}-${p2(d)}`;
      const isHoy=iso===hoy, isSel=iso===selDay;
      const {feriado,evs}=getEvsDia(iso);
      const dot = (feriado||evs.length)?`<div style="width:5px;height:5px;border-radius:50%;background:${isSel?'rgba(255,255,255,.7)':feriado?'#e74c3c':'var(--accent)'};margin:2px auto 0"></div>`:'';
      return `<div onclick="selDay('${iso}')" style="text-align:center;padding:6px 2px;border-radius:10px;cursor:pointer;background:${isSel?'var(--accent)':isHoy?'#eff3ff':'transparent'};color:${isSel?'#fff':isHoy?'var(--accent)':'#333'};font-weight:${isHoy||isSel?800:400}">${d}${dot}</div>`;
    }).join('');

  const {feriado:ferSel, evs:evsSel} = getEvsDia(selDay);

  let evsHtml = '';
  if(ferSel) evsHtml+=`<div style="background:#fff0f0;border-left:4px solid #e74c3c;border-radius:12px;padding:12px 14px;margin-bottom:10px"><div style="font-weight:700;color:#c0392b;font-size:14px">${esc(ferSel.nombre)}</div><div style="font-size:12px;color:#e74c3c">FERIADO NACIONAL</div></div>`;
  if(!ferSel&&!evsSel.length) evsHtml+=`<div style="text-align:center;padding:30px 20px;color:#ccc"><div style="font-size:36px">📅</div><div style="margin-top:10px;font-size:14px">Sin eventos este día</div></div>`;
  evsSel.forEach(ev=>{
    evsHtml+=`<div style="background:#fff;border-left:4px solid ${ev.color||'var(--accent)'};border-radius:12px;padding:12px 14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div style="font-weight:700;color:var(--primary);font-size:14px">${esc(ev.titulo)}</div>
        ${ev.hora?`<div style="font-size:12px;color:#888">${esc(ev.hora)}${ev.lugar?' · '+esc(ev.lugar):''}</div>`:''}
        ${ev.etiqueta?`<span style="background:${ev.color||'var(--accent)'};color:#fff;font-size:10px;font-weight:700;border-radius:6px;padding:2px 8px;display:inline-block;margin-top:4px">${esc(ev.etiqueta)}</span>`:''}
      </div>
      <div style="display:flex;gap:8px">
        <button onclick="editEvento('${ev.id}')" style="background:none;border:none;color:#888">${ICONS.edit}</button>
        <button onclick="borrarEvento('${ev.id}')" style="background:none;border:none;color:#e74c3c">${ICONS.trash}</button>
      </div>
    </div>`;
  });

  const prev = m===0?`${y-1}-12-15`:`${y}-${p2(m)}-15`;
  const next = m===11?`${y+1}-01-15`:`${y}-${p2(m+2)}-15`;

  return `<div class="screen">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div><div style="font-weight:900;font-size:28px;color:var(--primary);letter-spacing:-1px">${MESES[m].toUpperCase()}</div><div style="font-size:14px;color:var(--accent);font-weight:700">${y}</div></div>
      <div style="display:flex;gap:8px">
        <button onclick="setCalFecha('${prev}')" style="background:#fff;border:none;border-radius:12px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.1)">${ICONS.chevL}</button>
        <button onclick="setCalFecha('${next}')" style="background:#fff;border:none;border-radius:12px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.1)">${ICONS.chevR}</button>
      </div>
    </div>
    <div class="card">
      <div style="display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:8px">${DIAS_CORTOS.map(d=>`<div style="text-align:center;font-size:12px;font-weight:700;color:#888;padding:4px">${d}</div>`).join('')}</div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">${celdas}</div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="font-size:13px;color:#888;font-weight:600">${selDay}</span>
      <button onclick="openModal('evento')" style="background:var(--accent);border:none;border-radius:10px;padding:7px 14px;color:#fff;font-weight:700;font-size:13px">+ Añadir</button>
    </div>
    ${evsHtml}
  </div>`;
}

      <div style="display:flex;justify-content:flex-end;margin-top:8px">

    <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">
      <button onclick="openModal('nota')" style="background:var(--accent);border:none;border-radius:10px;padding:8px 14px;color:#fff;font-weight:700;font-size:12px;white-space:nowrap">+ Nota completa</button>
      <select onchange="setNotasOrden(this.value)" style="padding:8px 12px;border-radius:10px;border:1px solid #e0e0e0;font-size:12px;background:#fff">
        <option value="fecha" ${orden==='fecha'?'selected':''}>Por fecha</option>
        <option value="importancia" ${orden==='importancia'?'selected':''}>Por importancia</option>
        <option value="color" ${orden==='color'?'selected':''}>Por color</option>

    </div>
    ${!notas.length?`<div style="text-align:center;padding:40px 20px;color:#aaa"><div style="font-size:40px">📝</div><div style="margin-top:12px;font-size:14px">No hay notas todavía</div></div>`:notasHtml}

// ============================================================
function buildModal(){
  const m = state.modal;
  const d = state.modalData||{};
  let content = '';

  if(m==='evento') content = buildModalEvento(d);
  else if(m==='nota') content = buildModalNota(d);
  else if(m==='curso'||m==='cursoEdit') content = buildModalCurso(d);
  else if(m==='lista') content = buildModalLista(d);
  else if(m==='horario') content = buildModalHorario(d);

  return `<div class="modal-overlay" onclick="closeModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <span style="font-weight:700;font-size:17px;color:var(--primary)">${modalTitle(m,d)}</span>
        <button onclick="closeModal()" style="background:none;border:none;color:#666;padding:4px">${ICONS.x}</button>
      </div>
      ${content}
    </div>
  </div>`;
}

function modalTitle(m,d){
  if(m==='evento') return d.id?'Editar evento':'Nuevo evento';
  if(m==='nota') return d.id?'Editar nota':'Nueva nota';
  if(m==='curso'||m==='cursoEdit') return d.id?'Editar curso':'Nuevo curso';
  if(m==='lista') return 'Nueva lista';
  if(m==='horario') return `${HORAS[d.hora]||''} · ${d.dia||''}`;
  return '';
}

function colorPicker(selected, onchange){
  return `<div style="display:flex;gap:8px;flex-wrap:wrap">${COLORES.map(c=>`<div onclick="${onchange}('${c}')" class="color-dot ${selected===c?'sel':''}" style="background:${c}"></div>`).join('')}</div>`;
}

    <div style="margin-bottom:12px"><label>NOMBRE DEL CURSO *</label><input class="inp" id="c_nombre" value="${esc(d.nombre||'')}" placeholder="Ej: 5° A BOEA"/></div>
    <div style="margin-bottom:12px"><label>ORIENTACIÓN</label><input class="inp" id="c_orientacion" value="${esc(d.orientacion||'')}" placeholder="Ej: Economía y Administración"/></div>
    <div style="margin-bottom:16px"><label>COLOR DEL CURSO</label><div id="cursoColorPicker">${colorPicker(d.color||COLORES[0],'setCursoColor')}</div></div>
    <input type="hidden" id="c_color" value="${d.color||COLORES[0]}"/>
    <input type="hidden" id="c_id" value="${d.id||''}"/>
    <button onclick="guardarCurso()" class="btn-primary">${d.id?'Guardar cambios':'Crear curso'}</button>`;
}

function buildModalLista(d){
  const cols = state._listaCols||['','',''];
  return `
    <div style="margin-bottom:12px"><label>NOMBRE DE LA LISTA *</label><input class="inp" id="lista_nombre" placeholder="Ej: Salida al museo"/></div>
    <div style="margin-bottom:12px"><label>COLUMNAS (una por check)</label>
      <div id="listaCols">${cols.map((c,i)=>`<div style="display:flex;gap:8px;margin-bottom:8px"><input class="inp lista-col" placeholder="Ej: Autorización" value="${esc(c)}"/>${cols.length>1?`<button onclick="removeCol(${i})" style="background:none;border:none;color:#e74c3c;padding:4px">${ICONS.x}</button>`:''}</div>`).join('')}</div>
      <button onclick="addCol()" style="background:#f0f0f0;border:none;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600;color:#555">+ Agregar columna</button>
    </div>
    <button onclick="guardarLista()" class="btn-primary" style="margin-top:8px">Crear lista</button>`;
}

function buildModalHorario(d){
  const cell = (state.horarios[d.cursoId]||{})[`${d.hora}_${d.dia}`]||{};
  return `
    <div style="margin-bottom:12px"><label>MATERIA</label><input class="inp" id="h_materia" value="${esc(cell.materia||'')}" placeholder="Ej: Matemáticas"/></div>
    <div style="margin-bottom:16px"><label>PROFESOR/A</label><input class="inp" id="h_profesor" value="${esc(cell.profesor||'')}" placeholder="Ej: García, Juan"/></div>
    <div style="display:flex;gap:10px">
      <button onclick="borrarCeldaHorario()" style="flex:1;background:#fff0f0;border:1px solid #e74c3c;border-radius:12px;padding:12px;color:#e74c3c;font-weight:700;font-size:14px">Borrar</button>
      <button onclick="guardarCeldaHorario()" style="flex:2;background:var(--accent);border:none;border-radius:12px;padding:12px;color:#fff;font-weight:800;font-size:14px">Guardar</button>
    </div>`;
}

// ============================================================
// EVENT HANDLERS
// ============================================================
function attachEvents(){ /* All handlers are inline onclick */ }

function setState(updates, skipRender){
  Object.assign(state, updates);
  if(!skipRender) render();
}

// Nav
function navTo(tab){ setState({tab, screen:'home', _listaActiva:undefined, _horCurso:null}); }
function goHome(){ setState({screen:'home', tab:'cursos', _listaActiva:undefined, _horCurso:null}); }
function goScreen(s){ setState({screen:s}); }
function goCurso(id){ setState({screen:'curso', cursoActivo:id, cursoTab:'asistencia', fechaAsist:todayISO(), vistaAsist:'dia', _acapFecha:todayISO(), _listaActiva:undefined}); }
function setCursoTab(t){ setState({cursoTab:t}); }
function setVista(v){ setState({vistaAsist:v}); }
function setFechaAsist(f){ setState({fechaAsist:f}); }
function setAcapFecha(f){ state._acapFecha=f; render(); }
function setHorCurso(id){ state._horCurso=id; render(); }
function setCalFecha(f){ state._calFecha=f; render(); }
function selDay(iso){ state._selDay=iso; render(); }
function setNotasOrden(v){ state._notasOrden=v; render(); }
function setListaActiva(i){ state._listaActiva = (i===null||i===undefined) ? null : i; render(); }

// Modals
function openModal(type, extra){
  state._listaCols=['','',''];
  if(type==='cursoEdit'){
    const c=state.cursos.find(x=>x.id===extra);
    setState({modal:'cursoEdit', modalData:c||{}});
  } else if(type==='evento'){
    setState({modal:'evento', modalData:{fecha:state._selDay||todayISO()}});
  } else {
    setState({modal:type, modalData:{}});
  }
}
function closeModal(){ setState({modal:null, modalData:{}}); }

function openHorModal(cursoId, hora, dia){
  setState({modal:'horario', modalData:{cursoId, hora, dia}});
}

// Color pickers
function setEvColor(c){ document.getElementById('ev_color').value=c; document.getElementById('evColorPicker').innerHTML=colorPicker(c,'setEvColor'); }
function setNotaColor(c){ document.getElementById('n_color').value=c; document.getElementById('notaColorPicker').innerHTML=colorPicker(c,'setNotaColor'); }
function setCursoColor(c){ document.getElementById('c_color').value=c; document.getElementById('cursoColorPicker').innerHTML=colorPicker(c,'setCursoColor'); }

// Asistencia
function toggleAsist(cursoId, alumnoId, fecha, estado){
  const cur = getAsist(cursoId,alumnoId,fecha);
  const nuevo = (estado === 'null' || estado === null || cur===estado) ? null : estado;
  setAsist(cursoId, alumnoId, fecha, nuevo);
  render();
}

// ACAP
function saveAcap(cursoId, alumnoId){
  const f = state._acapFecha||todayISO();
  const k=`${cursoId}_${alumnoId}_${f}`;
  const horario = document.getElementById(`acap_h_${alumnoId}`)?.value||'';
  const empresa = document.getElementById(`acap_e_${alumnoId}`)?.value||'';
  state.acaps[k]={horario,empresa};
  if(horario||empresa){
    setAsist(cursoId,alumnoId,f,'AC');
  }
  save(); render();
}
function clearAcap(cursoId, alumnoId){
  const f = state._acapFecha||todayISO();
  const k=`${cursoId}_${alumnoId}_${f}`;
  delete state.acaps[k];
  setAsist(cursoId,alumnoId,f,null);
  save(); render();
}
function updateAcap(cursoId, alumnoId, field, val){
  // kept for compatibility
  const f = state._acapFecha||todayISO();
  const k=`${cursoId}_${alumnoId}_${f}`;
  const prev = state.acaps[k]||{};
  state.acaps[k] = {...prev,[field]:val};
  if(state.acaps[k].empresa||state.acaps[k].horario){
    setAsist(cursoId,alumnoId,f,'AC');
  }
  save();
}

// Toggle expand asistencia row
function toggleAsistRow(rowId){
  const exp = document.getElementById('exp_'+rowId);
  if(exp) exp.classList.toggle('open');
}

// Alumnos
function agregarAlumno(cursoId){
  const inp = document.getElementById('newAlumnoInput');
  const nombre = inp?.value?.trim();
  if(!nombre) return;
  const a = {id:uid(), nombre:nombre.toUpperCase()};
  state.alumnos[cursoId]=[...(state.alumnos[cursoId]||[]),a];
  save();
  render();
}
function borrarAlumno(cursoId, alumnoId){
  if(!confirm('¿Borrar alumno?')) return;
  state.alumnos[cursoId]=(state.alumnos[cursoId]||[]).filter(a=>a.id!==alumnoId);
  save(); render();
}
function toggleImport(cursoId){
  const box = document.getElementById('importBox');
  if(box) box.style.display=box.style.display==='none'?'block':'none';
}
function importarLista(cursoId){
  const txt = document.getElementById('importText')?.value||'';
  const lines = txt.split('\n').map(l=>l.trim()).filter(Boolean);
  const parsed = lines.map(l=>l.replace(/^\d+[\.\-\)\s]+/,'').trim()).filter(Boolean);
  if(!parsed.length) return;
  const newAls = parsed.map((n,i)=>({id:uid(),nombre:n.toUpperCase()}));
  state.alumnos[cursoId]=[...(state.alumnos[cursoId]||[]),...newAls];
  save(); render();
}

// Listas
function guardarLista(){
  const nombre = document.getElementById('lista_nombre')?.value?.trim();
  if(!nombre) return;
  const cols = [...document.querySelectorAll('.lista-col')].map(i=>i.value.trim()).filter(Boolean);
  if(!cols.length) return;
  const cursoId = state.cursoActivo;
  state.listas[cursoId]=[...(state.listas[cursoId]||[]),{nombre,columnas:cols,checks:{}}];
  state._listaActiva = null;
  save(); closeModal();
}
function borrarLista(i){
  if(!confirm('¿Borrar lista?')) return;
  const cursoId = state.cursoActivo;
  state.listas[cursoId]=(state.listas[cursoId]||[]).filter((_,j)=>j!==i);
  save(); render();
}
function toggleCheck(cursoId,listaIdx,key){
  const lsts=[...(state.listas[cursoId]||[])];
  const l={...lsts[listaIdx]};
  l.checks={...(l.checks||{}),[key]:!(l.checks||{})[key]};
  lsts[listaIdx]=l;
  state.listas[cursoId]=lsts;
  save(); render();
}
function addCol(){
  state._listaCols=[...(state._listaCols||['','']),'']; render();
}
function removeCol(i){
  state._listaCols=(state._listaCols||[]).filter((_,j)=>j!==i); render();
}

// Eventos
function guardarEvento(){
  const titulo = document.getElementById('ev_titulo')?.value?.trim();
  if(!titulo) return;
  const ev = {
    titulo,
    fecha:document.getElementById('ev_fecha')?.value||todayISO(),
    hora:document.getElementById('ev_hora')?.value||'',
    lugar:document.getElementById('ev_lugar')?.value||'',
    etiqueta:document.getElementById('ev_etiqueta')?.value||'',
    descripcion:document.getElementById('ev_descripcion')?.value||'',
    color:document.getElementById('ev_color')?.value||COLORES[0],
  };
  const id = document.getElementById('ev_id')?.value;
  if(id){ state.eventos=state.eventos.map(e=>e.id===id?{...ev,id}:e); }
  else { state.eventos=[...state.eventos,{...ev,id:uid()}]; }
  save(); closeModal();
}
function borrarEvento(id){ if(confirm('¿Borrar evento?')){ state.eventos=state.eventos.filter(e=>e.id!==id); save(); render(); } }
function editEvento(id){ const ev=state.eventos.find(e=>e.id===id); if(ev) setState({modal:'evento',modalData:ev}); }

// Notas
function guardarNota(){
  const contenido=document.getElementById('n_contenido')?.value?.trim();
  if(!contenido) return;
  const n = {
    titulo:document.getElementById('n_titulo')?.value||'',
    contenido,
    color:document.getElementById('n_color')?.value||COLORES[0],
    importancia:parseInt(document.getElementById('n_importancia')?.value||0),
    destacada:document.getElementById('n_dest')?.checked||false,
  };
  const id=document.getElementById('n_id')?.value;
  if(id){ state.notas=state.notas.map(x=>x.id===id?{...n,id,fechaCreada:x.fechaCreada}:x); }
  else { state.notas=[{...n,id:uid(),fechaCreada:new Date().toISOString()},...state.notas]; }
  save(); closeModal();
}
function guardarNotaRapida(){
  const txt=document.getElementById('notaRapida')?.value?.trim();
  if(!txt) return;
  state.notas=[{id:uid(),contenido:txt,titulo:'',color:COLORES[0],importancia:0,destacada:false,fechaCreada:new Date().toISOString()},...state.notas];
  save(); render();
}
function borrarNota(id){ if(confirm('¿Borrar nota?')){ state.notas=state.notas.filter(n=>n.id!==id); save(); render(); } }
function editNota(id){ const n=state.notas.find(x=>x.id===id); if(n) setState({modal:'nota',modalData:n}); }
function setNotaImp(n){
  document.getElementById('n_importancia').value=n;
  [0,1,2,3].forEach(i=>{ const b=document.getElementById(`imp_${i}`); if(b){ b.className='imp-btn'+(i===n?' sel':''); } });
}

// Cursos
function guardarCurso(){
  const nombre=document.getElementById('c_nombre')?.value?.trim();
  if(!nombre) return;
  const c={nombre,orientacion:document.getElementById('c_orientacion')?.value||'',color:document.getElementById('c_color')?.value||COLORES[0]};
  const id=document.getElementById('c_id')?.value;
  if(id){ state.cursos=state.cursos.map(x=>x.id===id?{...c,id}:x); }
  else { const nc={...c,id:uid()}; state.cursos=[...state.cursos,nc]; state.alumnos[nc.id]=[]; }
  save(); closeModal();
}
function borrarCurso(id){
  if(!confirm('¿Borrar curso y todos sus datos?')) return;

  state.cursos = state.cursos.filter(c=>c.id!==id);
  delete state.alumnos[id];
  delete state.listas[id];
  delete state.horarios[id];

  Object.keys(state.asistencia).forEach(k=>{
    if(k.startsWith(id+'_')) delete state.asistencia[k];
  });
  Object.keys(state.acaps).forEach(k=>{
    if(k.startsWith(id+'_')) delete state.acaps[k];
  });

  save();
  render();
}

// Horarios
function guardarCeldaHorario(){
  const d=state.modalData;
  const materia=document.getElementById('h_materia')?.value?.trim();
  const profesor=document.getElementById('h_profesor')?.value?.trim();
  state.horarios[d.cursoId]={...(state.horarios[d.cursoId]||{}),[`${d.hora}_${d.dia}`]:{materia,profesor}};
  save(); closeModal();
}
function borrarCeldaHorario(){
  const d=state.modalData;
  const hor={...(state.horarios[d.cursoId]||{})};
  delete hor[`${d.hora}_${d.dia}`];
  state.horarios[d.cursoId]=hor;
  save(); closeModal();
}

// Perfil
function guardarPerfil(){
  state.perfil={
    nombre:document.getElementById('perfil_nombre')?.value||'',
    escuela:document.getElementById('perfil_escuela')?.value||'',
    turno:document.getElementById('perfil_turno')?.value||'',
  };
  save(); goHome();
}

// Colores
function guardarColores(){
  state.colors={
    primary:document.getElementById('col_primary')?.value||'#1a1a2e',
    accent:document.getElementById('col_accent')?.value||'#4361ee',
    bg:document.getElementById('col_bg')?.value||'#f4f6fb',
  };
  save(); render();
}

// ============================================================
// INIT
// ============================================================
applyColors();
render();
</script>
</body>
</html>
