<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Preceptor Pro v23.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --ios-bg: #f2f2f7; --accent: #2563eb; }
        body { font-family: 'Inter', sans-serif; background-color: var(--ios-bg); -webkit-tap-highlight-color: transparent; color: #1c1c1e; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.05); overflow: hidden; }
        
        /* Colores Específicos de Cursos */
        .bg-5a-boea { background-color: #f3efff !important; border-left: 10px solid #8b5cf6 !important; }
        .bg-5b-boea { background-color: #fff1f2 !important; border-left: 10px solid #9f1239 !important; }
        .bg-5a-boi { background-color: #f0f9ff !important; border-left: 10px solid #0ea5e9 !important; }
        
        .tab-btn { font-size: 8px; font-weight: 900; text-transform: uppercase; padding: 10px 4px; border-radius: 12px; transition: all 0.2s; flex: 1; text-align: center; white-space: nowrap; }
        .tab-btn.active { background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); color: var(--accent); }
        .tab-btn.inactive { color: #8e8e93; }

        .schedule-grid { display: grid; grid-template-columns: 100px repeat(5, 1fr); gap: 1px; background: #e5e7eb; }
        .schedule-cell { background: white; padding: 6px 2px; text-align: center; font-size: 9px; min-height: 50px; display: flex; flex-direction: column; justify-content: center; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .calendar-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 12px; font-size: 11px; font-weight: 700; position: relative; }
        .has-event::after { content: ''; width: 4px; height: 4px; background: #ef4444; border-radius: 50%; position: absolute; bottom: 4px; }
        
        .btn-action { transition: transform 0.1s; }
        .btn-action:active { transform: scale(0.92); }
        
        @keyframes slideIn { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-in { animation: slideIn 0.3s ease-out; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-32">
    <div id="app" class="max-w-md mx-auto min-h-screen relative">
        
        <!-- HEADER -->
        <header class="px-7 pt-10 pb-5 flex justify-between items-start">
            <div>
                <p id="header-date" class="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-1"></p>
                <h1 class="text-2xl font-black italic tracking-tighter text-gray-900 leading-none uppercase">PRECEPTOR <span class="text-blue-600">PRO</span></h1>
            </div>
            <div class="flex flex-col items-end">
                <div class="w-8 h-5 bg-blue-600 rounded flex flex-col overflow-hidden border border-blue-700 shadow-sm mb-1">
                    <div class="flex-1 bg-[#75AADB]"></div>
                    <div class="flex-1 bg-white"></div>
                    <div class="flex-1 bg-[#75AADB]"></div>
                </div>
                <span class="text-[8px] font-black text-gray-400">ARG 2026</span>
            </div>
        </header>

        <!-- NOTIFICADOR DE EVENTOS (Próximos 3 días) -->
        <div id="event-notice" class="px-5 mb-4 hidden"></div>

        <!-- VISTA PRINCIPAL -->
        <main id="main-content" class="px-5 py-2 animate-in"></main>

        <!-- NAV INFERIOR -->
        <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[94%] glass rounded-[2.5rem] p-3 flex justify-around items-center shadow-2xl border border-white/50 z-[100]">
            <button onclick="nav('home')" class="btn-action flex flex-col items-center gap-1" id="nav-home">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span class="text-[8px] font-black uppercase">Cursos</span>
            </button>
            <button onclick="nav('schedule')" class="btn-action flex flex-col items-center gap-1" id="nav-schedule">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <span class="text-[8px] font-black uppercase">Horarios</span>
            </button>
            <button onclick="nav('calendar')" class="btn-action flex flex-col items-center gap-1" id="nav-calendar">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                <span class="text-[8px] font-black uppercase">Agenda</span>
            </button>
            <button onclick="nav('notes')" class="btn-action flex flex-col items-center gap-1" id="nav-notes">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                <span class="text-[8px] font-black uppercase">Notas</span>
            </button>
        </nav>
    </div>

    <script>
        const DB_KEY = 'preceptor_pro_omar_v23_6_final';
        const hours = [
            "12:30-13:10", "13:10-13:50", "13:50-14:30", 
            "14:40-15:20", "15:20-16:00", "16:00-16:40", 
            "16:50-17:30", "17:30-18:10"
        ];
        const weekDays = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes"];
        
        let state = {
            view: 'home',
            course: null,
            subView: 'asis',
            sortBy: 'abc', // 'abc' or 'asis'
            calDate: new Date(2026, 0, 1),
            students: { 
                "5° A BOEA": ["ALVAREZ, MARCOS", "BENITEZ, CLARA", "GOMEZ, FACUNDO", "LOPEZ, DANIEL", "ZARATE, LUCAS", "DELLA, ANA"], 
                "5° B BOEA": ["DUARTE, ELENA", "MARTINEZ, SOL", "PEREZ, HUGO", "SOSA, MARTINA"], 
                "5° A BOI": ["CASTRO, LUIS", "SANCHEZ, MIA", "VACA, ROBERTO", "IBARRA, JUAN"] 
            },
            attendance: {}, // Stores daily history: { "2026-04-06": { "5° A BOEA": { "ALVAREZ": "P" } } }
            checklists: {},
            checklistLabels: ["Dinero", "Aut.", "Salida"],
            acapNotes: {},
            referentes: {},
            notes: [],
            schedule: {},
            events: [
                { d: 1, m: 0, y: 2026, t: 'Año Nuevo', f: true },
                { d: 16, m: 1, y: 2026, t: 'Carnaval', f: true },
                { d: 17, m: 1, y: 2026, t: 'Carnaval', f: true },
                { d: 24, m: 2, y: 2026, t: 'Día de la Memoria', f: true },
                { d: 2, m: 3, y: 2026, t: 'Viernes Santo / Malvinas', f: true },
                { d: 1, m: 4, y: 2026, t: 'Día del Trabajador', f: true },
                { d: 25, m: 4, y: 2026, t: 'Revolución de Mayo', f: true },
                { d: 15, m: 5, y: 2026, t: 'Güemes (Trasl.)', f: true },
                { d: 20, m: 5, y: 2026, t: 'Paso a la Inm. Belgrano', f: true },
                { d: 9, m: 6, y: 2026, t: 'Día de la Independencia', f: true },
                { d: 17, m: 7, y: 2026, t: 'Paso a la Inm. San Martín', f: true },
                { d: 12, m: 9, y: 2026, t: 'Día de la Diversidad Cultural', f: true },
                { d: 23, m: 10, y: 2026, t: 'Día de la Soberanía Nacional', f: true },
                { d: 8, m: 11, y: 2026, t: 'Inmaculada Concepción', f: true },
                { d: 25, m: 11, y: 2026, t: 'Navidad', f: true }
            ]
        };

        function load() { 
            const s = localStorage.getItem(DB_KEY); 
            if(s) {
                const parsed = JSON.parse(s);
                state = {...state, ...parsed};
            }
            state.calDate = new Date(state.calDate || '2026-01-01');
        }
        function save() { localStorage.setItem(DB_KEY, JSON.stringify(state)); }

        function nav(v) { state.view = v; if(v !== 'course') state.course = null; render(); }
        function setSub(v) { state.subView = v; render(); }

        function getTodayKey() {
            const d = new Date();
            return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
        }

        function render() {
            const main = document.getElementById('main-content');
            const notice = document.getElementById('event-notice');
            const today = new Date();
            document.getElementById('header-date').innerText = today.toLocaleDateString('es-AR', {weekday:'long', day:'numeric', month:'long'}).toUpperCase();

            // Lógica de avisos (hoy y próximos 3 días)
            const alerts = [];
            for(let i=0; i<=3; i++) {
                const checkDate = new Date(today);
                checkDate.setDate(today.getDate() + i);
                const evs = state.events.filter(e => e.d === checkDate.getDate() && e.m === checkDate.getMonth() && e.y === checkDate.getFullYear());
                evs.forEach(e => alerts.push({t: e.t, days: i}));
            }

            if(alerts.length > 0) {
                notice.innerHTML = alerts.map(a => `
                    <div class="bg-blue-600 text-white p-4 rounded-2xl shadow-lg flex items-center gap-3 mb-2 animate-in">
                        <span class="text-xl">${a.days === 0 ? '🔔' : '📅'}</span>
                        <div>
                            <p class="text-[8px] font-black uppercase opacity-70">${a.days === 0 ? 'Hoy' : 'En ' + a.days + ' días'}</p>
                            <p class="text-xs font-bold">${a.t}</p>
                        </div>
                    </div>`).join('');
                notice.classList.remove('hidden');
            } else { notice.classList.add('hidden'); }

            document.querySelectorAll('nav button').forEach(b => {
                const id = b.id.split('-')[1];
                b.style.color = (state.view === id || (state.view==='course' && id==='home')) ? '#2563eb' : '#c7c7cc';
            });

            if(state.view === 'home') renderHome(main);
            else if(state.view === 'course') renderCourse(main);
            else if(state.view === 'schedule') renderSchedule(main);
            else if(state.view === 'calendar') renderCalendar(main);
            else if(state.view === 'notes') renderNotes(main);
            save();
        }

        function renderHome(c) {
            c.innerHTML = `<h2 class="text-[10px] font-black text-gray-400 uppercase tracking-[3px] mb-6 italic">MIS CURSOS</h2>` +
                Object.keys(state.students).map(course => `
                <div onclick="state.view='course';state.course='${course}';state.subView='asis';render()" 
                     class="card p-8 mb-4 flex justify-between items-center cursor-pointer ${getCourseStyle(course)}">
                    <div>
                        <span class="text-2xl font-black italic text-gray-800 tracking-tighter uppercase">${course}</span>
                        <p class="text-[9px] font-black text-blue-600/60 mt-1 uppercase">Control Diario</p>
                    </div>
                    <span class="text-gray-300 text-2xl font-black">→</span>
                </div>`).join('');
        }

        function getCourseStyle(c) {
            if(c.includes('A BOEA')) return 'bg-5a-boea';
            if(c.includes('B BOEA')) return 'bg-5b-boea';
            if(c.includes('BOI')) return 'bg-5a-boi';
            return '';
        }

        function renderCourse(c) {
            c.innerHTML = `
                <div class="flex items-center gap-4 mb-6">
                    <button onclick="nav('home')" class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm">←</button>
                    <h2 class="text-xl font-black italic uppercase">${state.course}</h2>
                </div>
                <div class="flex bg-gray-200/50 p-1 rounded-2xl mb-6 gap-1 overflow-x-auto no-scrollbar">
                    <button onclick="setSub('asis')" class="tab-btn ${state.subView==='asis'?'active':'inactive'}">Asis</button>
                    <button onclick="setSub('acap')" class="tab-btn ${state.subView==='acap'?'active':'inactive'}">ACAP</button>
                    <button onclick="setSub('list')" class="tab-btn ${state.subView==='list'?'active':'inactive'}">Listas</button>
                    <button onclick="setSub('refs')" class="tab-btn ${state.subView==='refs'?'active':'inactive'}">Refs</button>
                    <button onclick="setSub('alum')" class="tab-btn ${state.subView==='alum'?'active':'inactive'}">Alumnos</button>
                </div>
                <div class="animate-in">${renderSubView()}</div>`;
        }

        function getSortedList() {
            let list = [...(state.students[state.course] || [])];
            if(state.sortBy === 'abc') {
                return list.sort();
            } else {
                // Count historical absences
                const counts = {};
                list.forEach(s => counts[s] = 0);
                Object.values(state.attendance).forEach(day => {
                    const cAsis = day[state.course] || {};
                    Object.entries(cAsis).forEach(([s, v]) => {
                        if(v === 'A' && counts[s] !== undefined) counts[s]++;
                    });
                });
                return list.sort((a,b) => (counts[b] || 0) - (counts[a] || 0));
            }
        }

        function renderSubView() {
            const list = getSortedList();
            const todayKey = getTodayKey();
            if(!state.attendance[todayKey]) state.attendance[todayKey] = {};
            if(!state.attendance[todayKey][state.course]) state.attendance[todayKey][state.course] = {};

            if(state.subView === 'asis') {
                return `
                <div class="flex gap-2 mb-4">
                    <button onclick="state.sortBy='abc';render()" class="flex-1 py-2 text-[8px] font-black uppercase rounded-lg ${state.sortBy==='abc'?'bg-blue-600 text-white':'bg-white text-gray-400'} shadow-sm">A-Z</button>
                    <button onclick="state.sortBy='asis';render()" class="flex-1 py-2 text-[8px] font-black uppercase rounded-lg ${state.sortBy==='asis'?'bg-blue-600 text-white':'bg-white text-gray-400'} shadow-sm">Por Inasistencias</button>
                </div>
                <div class="space-y-3 pb-20">` + list.map(s => {
                    const st = state.attendance[todayKey][state.course][s] || '';
                    return `<div class="card p-4 flex justify-between items-center px-6 ${st==='S'?'bg-amber-50 border-l-8 border-amber-400':''}">
                        <span class="font-black text-[11px] uppercase italic text-gray-700 truncate w-32">${s}</span>
                        <div class="flex gap-1.5">
                            ${['P','A','J','S'].map(v => `<button onclick="setAsis('${s}','${v}')" class="w-8 h-8 rounded-lg font-black text-[10px] border ${st===v?getBtnColor(v):'bg-gray-50 border-gray-100 text-gray-300'}">${getIcon(v)}</button>`).join('')}
                        </div>
                    </div>`;
                }).join('') + `</div>`;
            }
            if(state.subView === 'acap') {
                return `<div class="space-y-4 pb-20">` + list.map(s => {
                    const val = state.acapNotes[`${state.course}_${s}`] || '';
                    return `<div class="card p-5">
                        <p class="text-[9px] font-black uppercase text-amber-600 mb-2">${s}</p>
                        <input onchange="state.acapNotes['${state.course}_${s}']=this.value;save()" class="w-full bg-gray-50 p-3 rounded-xl text-[10px] font-bold border-none" placeholder="Horario / Lugar ACAP hoy..." value="${val}">
                    </div>`;
                }).join('') + `</div>`;
            }
            if(state.subView === 'list') {
                return `
                <div class="card p-3 mb-4 flex gap-2">
                    ${state.checklistLabels.map((l,i) => `<input onchange="state.checklistLabels[${i}]=this.value;save()" class="flex-1 bg-gray-100 p-2 text-[8px] font-black uppercase text-center rounded-lg border-none" value="${l}">`).join('')}
                </div>
                <div class="space-y-2 pb-20">` + list.map(s => {
                    const ck = state.checklists[`${state.course}_${s}`] || [false, false, false];
                    return `<div class="card p-4 flex justify-between items-center px-6">
                        <span class="font-black text-[10px] uppercase italic text-gray-600">${s}</span>
                        <div class="flex gap-5">
                            ${ck.map((v, i) => `<input type="checkbox" ${v?'checked':''} onchange="toggleCk('${s}',${i})" class="w-5 h-5 accent-blue-600">`).join('')}
                        </div>
                    </div>`;
                }).join('') + `</div>`;
            }
            if(state.subView === 'refs') {
                const r = state.referentes[state.course] || {d:'', p:''};
                return `<div class="space-y-4">
                    <div class="card p-6 border-l-4 border-blue-500"><label class="text-[9px] font-black text-blue-600 uppercase mb-2 block tracking-widest italic">Delegados</label>
                    <textarea onchange="state.referentes['${state.course}'].d=this.value;save()" class="w-full bg-gray-50 p-3 rounded-xl text-xs font-bold border-none h-20">${r.d}</textarea></div>
                    <div class="card p-6 border-l-4 border-green-500"><label class="text-[9px] font-black text-green-600 uppercase mb-2 block tracking-widest italic">Referentes Padres</label>
                    <textarea onchange="state.referentes['${state.course}'].p=this.value;save()" class="w-full bg-gray-50 p-3 rounded-xl text-xs font-bold border-none h-20">${r.p}</textarea></div>
                </div>`;
            }
            return `<div class="card p-6 mb-6"><textarea id="imp" class="w-full bg-gray-50 p-4 rounded-xl text-xs font-bold border-none h-24 mb-3" placeholder="Apellido y Nombre (uno por fila)..."></textarea><button onclick="procAlum()" class="w-full bg-blue-600 text-white py-4 rounded-xl text-[10px] font-black uppercase">Importar Alumnos</button></div>`;
        }

        function getIcon(v) { 
            if(v==='J') return '🩺'; 
            if(v==='S') return '💼'; 
            return v; 
        }
        function getBtnColor(v) {
            if(v==='P') return 'bg-green-500 border-green-500 text-white shadow-lg shadow-green-100';
            if(v==='A') return 'bg-red-500 border-red-500 text-white shadow-lg shadow-red-100';
            if(v==='J') return 'bg-blue-500 border-blue-500 text-white shadow-lg shadow-blue-100';
            if(v==='S') return 'bg-amber-500 border-amber-500 text-white shadow-lg shadow-amber-100';
        }

        function setAsis(s, v) { 
            const tk = getTodayKey();
            const current = state.attendance[tk][state.course][s];
            state.attendance[tk][state.course][s] = current === v ? '' : v; 
            render(); 
        }
        function toggleCk(s, i) { const k = `${state.course}_${s}`; if(!state.checklists[k]) state.checklists[k]=[false,false,false]; state.checklists[k][i]=!state.checklists[k][i]; save(); }

        function renderSchedule(c) {
            if(!state.course) {
                c.innerHTML = `<h2 class="text-xl font-black italic mb-6 uppercase">HORARIOS DE CLASES</h2>` + 
                Object.keys(state.students).map(cur => `<button onclick="state.course='${cur}';render()" class="card p-6 mb-3 w-full text-left font-black italic uppercase text-sm ${getCourseStyle(cur)}">${cur} →</button>`).join('');
                return;
            }
            c.innerHTML = `<div class="flex items-center gap-4 mb-4"><button onclick="state.course=null;render()" class="w-8 h-8 bg-white rounded-full flex items-center justify-center shadow-sm">←</button><h2 class="text-lg font-black italic uppercase">${state.course}</h2></div>
            <div class="card p-1 overflow-x-auto">
                <div class="schedule-grid" style="min-width:650px">
                    <div class="schedule-cell font-black bg-gray-50 text-[8px] uppercase">Hora</div>
                    ${weekDays.map(d => `<div class="schedule-cell font-black bg-gray-50 text-[8px] uppercase">${d}</div>`).join('')}
                    ${hours.map((h, i) => `
                        <div class="schedule-cell font-black bg-gray-50 text-[8px]">${h}</div>
                        ${weekDays.map(d => {
                            const k = `${state.course}_${d}_${i}`;
                            const val = state.schedule[k] || {m:'', p:''};
                            return `<div class="schedule-cell border-b border-gray-50">
                                <input onchange="saveS('${k}','m',this.value)" class="w-full text-center font-bold text-blue-600 border-none p-0 text-[8px] bg-transparent" placeholder="Materia" value="${val.m}">
                                <input onchange="saveS('${k}','p',this.value)" class="w-full text-center text-gray-400 border-none p-0 text-[7px] bg-transparent uppercase" placeholder="Prof." value="${val.p}">
                            </div>`;
                        }).join('')}
                    `).join('')}
                    <!-- CONTRATURNO -->
                    <div class="schedule-cell bg-orange-50"><input onchange="saveS('${state.course}_ct_h','h',this.value)" class="w-full text-center font-black text-orange-600 bg-transparent border-none text-[8px]" value="${state.schedule[state.course+'_ct_h']?.h || 'CONTRATURNO'}"></div>
                    ${weekDays.map(d => {
                        const k = `${state.course}_${d}_CT`;
                        const val = state.schedule[k] || {m:'', p:''};
                        return `<div class="schedule-cell bg-orange-50">
                            <input onchange="saveS('${k}','m',this.value)" class="w-full text-center font-bold text-orange-600 border-none p-0 text-[8px] bg-transparent" placeholder="Mat." value="${val.m}">
                            <input onchange="saveS('${k}','p',this.value)" class="w-full text-center text-gray-400 border-none p-0 text-[7px] bg-transparent uppercase" placeholder="Prof." value="${val.p}">
                        </div>`;
                    }).join('')}
                </div>
            </div>`;
        }
        function saveS(k, f, v) { if(!state.schedule[k]) state.schedule[k]={m:'',p:'',h:''}; state.schedule[k][f]=v; save(); }

        function renderCalendar(c) {
            const m = state.calDate.getMonth();
            const y = state.calDate.getFullYear();
            const first = new Date(y, m, 1).getDay();
            const daysInM = new Date(y, m + 1, 0).getDate();
            const months = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

            c.innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <div><h2 class="text-2xl font-black italic uppercase">${months[m]}</h2><p class="text-[10px] font-black text-blue-600 tracking-widest">${y}</p></div>
                    <div class="flex gap-2">
                        <button onclick="changeMonth(-1)" class="w-10 h-10 bg-white rounded-xl flex items-center justify-center">←</button>
                        <button onclick="changeMonth(1)" class="w-10 h-10 bg-white rounded-xl flex items-center justify-center">→</button>
                    </div>
                </div>
                <div class="card p-5 mb-6">
                    <div class="calendar-grid mb-4">
                        ${['D','L','M','X','J','V','S'].map(d => `<div class="text-center text-[9px] font-black text-gray-300">${d}</div>`).join('')}
                        ${Array(first).fill('0').map(()=>`<div></div>`).join('')}
                        ${Array.from({length: daysInM}, (_,i)=>i+1).map(d => {
                            const evs = state.events.filter(e => e.d===d && e.m===m && e.y===y);
                            const isFeriado = evs.some(e => e.f);
                            const hasOther = evs.some(e => !e.f);
                            return `<div onclick="showDay(${d},${m},${y})" class="calendar-day cursor-pointer 
                                ${isFeriado?'bg-red-50 text-red-600':''} 
                                ${hasOther?'bg-blue-50 text-blue-600':''} 
                                ${!isFeriado && !hasOther ? 'hover:bg-gray-100':''}">
                                ${d}
                                ${(isFeriado || hasOther) ? '<div class="w-1 h-1 bg-current rounded-full mt-0.5"></div>' : ''}
                            </div>`;
                        }).join('')}
                    </div>
                </div>
                <div id="day-events" class="space-y-3"></div>`;
        }
        
        function changeMonth(v) { state.calDate.setMonth(state.calDate.getMonth() + v); render(); }

        function showDay(d, m, y) {
            const evs = state.events.filter(e => e.d===d && e.m===m && e.y===y);
            const list = document.getElementById('day-events');
            list.innerHTML = `
                <div class="flex justify-between items-center mb-2 px-2">
                    <span class="text-[10px] font-black uppercase text-gray-400 italic">${d} ${['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'][m]}</span>
                    <button onclick="addEv(${d},${m},${y})" class="text-blue-600 font-black text-[9px] uppercase tracking-tighter">+ Nuevo Evento</button>
                </div>
                ${evs.length===0 ? '<p class="text-center text-gray-300 font-black text-[9px] py-6 uppercase italic card">Sin eventos registrados</p>' : 
                evs.map(e => `<div class="card p-4 flex justify-between items-center ${e.f?'border-l-4 border-red-500':''}">
                    <div>
                        <p class="text-xs font-bold text-gray-700">${e.t}</p>
                        ${e.f ? '<p class="text-[7px] font-black text-red-500 uppercase">Feriado Nacional</p>':'<p class="text-[7px] font-black text-blue-500 uppercase">Personal</p>'}
                    </div>
                    ${!e.f ? `<button onclick="delEv(${e.d},${e.m},${e.y},'${e.t}')" class="text-red-200 p-2 text-xl">×</button>` : ''}
                </div>`).join('')}`;
        }

        function addEv(d,m,y) { const t = prompt("Tipo (Cumple, Reunión, Examen...):"); if(t) { state.events.push({d,m,y,t, f:false}); render(); showDay(d,m,y); } }
        function delEv(d,m,y,t) { state.events = state.events.filter(e => !(e.d===d && e.m===m && e.y===y && e.t===t)); render(); showDay(d,m,y); }

        function renderNotes(c) {
            c.innerHTML = `<h2 class="text-xl font-black italic uppercase mb-6">Notas de Guardado Automático</h2>
                <div class="card p-6 mb-6">
                    <textarea id="n-in" oninput="autoSaveNote(this.value)" class="w-full bg-gray-50 p-4 rounded-xl text-xs font-bold border-none h-32 mb-4" placeholder="Escribe aquí, se guardará solo al terminar..."></textarea>
                    <div id="save-indicator" class="text-[8px] font-black text-green-500 uppercase italic opacity-0 transition-opacity">Nota Guardada ✓</div>
                </div>
                <div class="space-y-4 pb-20">
                    ${state.notes.slice().reverse().map(n => `<div class="card p-6 relative">
                        <p class="text-xs font-bold text-gray-700 mb-3 leading-relaxed">${n.txt}</p>
                        <div class="flex justify-between items-center">
                            <p class="text-[7px] font-black text-gray-400 uppercase italic">📅 ${n.date}</p>
                            <button onclick="delNote('${n.id}')" class="text-[7px] font-black text-red-400 uppercase">Eliminar</button>
                        </div>
                    </div>`).join('')}
                </div>`;
        }

        let saveTimer;
        function autoSaveNote(v) {
            const ind = document.getElementById('save-indicator');
            clearTimeout(saveTimer);
            saveTimer = setTimeout(() => {
                if(!v.trim()) return;
                const now = new Date();
                state.notes.push({ 
                    id: Date.now().toString(),
                    txt: v, 
                    date: now.toLocaleDateString() + ' ' + now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) 
                });
                document.getElementById('n-in').value = '';
                ind.style.opacity = '1';
                setTimeout(() => { ind.style.opacity = '0'; render(); }, 1000);
            }, 1500);
        }

        function delNote(id) { state.notes = state.notes.filter(n => n.id !== id); render(); }

        function procAlum() {
            const v = document.getElementById('imp').value;
            if(!v) return;
            const ns = v.split('\n').map(x => x.trim().toUpperCase()).filter(x => x.length>2);
            state.students[state.course] = [...new Set([...(state.students[state.course]||[]), ...ns])].sort();
            render();
        }

        window.onload = () => { 
            load(); 
            // Mocking year 2026 if needed
            const d = new Date();
            if(d.getFullYear() < 2026) {
                // Keep the actual current date for logic but focus calendar on 2026
            }
            render(); 
        };
    </script>
</body>
</html>
