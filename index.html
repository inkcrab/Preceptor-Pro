<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Preceptor Pro v23.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --ios-bg: #f2f2f7; --accent: #2563eb; }
        body { font-family: 'Inter', sans-serif; background-color: var(--ios-bg); -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.05); }
        .tab-btn { font-size: 8px; font-weight: 900; text-transform: uppercase; padding: 10px 4px; border-radius: 12px; transition: all 0.2s; }
        .tab-btn.active { background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.05); color: #2563eb; }
        .tab-btn.inactive { color: #9ca3af; }
        .saca-bg { background-color: #fffbeb !important; border-left: 4px solid #f59e0b !important; }
    </style>
</head>
<body class="pb-32">
    <div id="app" class="max-w-md mx-auto min-h-screen relative">
        
        <!-- HEADER SEGÚN CAPTURA -->
        <header class="px-6 pt-8 pb-4 flex justify-between items-start">
            <div>
                <p class="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-1">LUNES, 6 ABR</p>
                <h1 class="text-xl font-black italic tracking-tighter text-gray-900 leading-none uppercase">PRECEPTOR PRO <span class="text-blue-500 font-black italic">V23</span></h1>
            </div>
            <div class="w-10 h-6 bg-blue-600 rounded flex flex-col overflow-hidden border border-blue-700 shadow-sm mt-1">
                <div class="flex-1 bg-[#75AADB]"></div>
                <div class="flex-1 bg-white"></div>
                <div class="flex-1 bg-[#75AADB]"></div>
            </div>
        </header>

        <!-- CONTENEDOR PRINCIPAL -->
        <main id="main-view" class="px-5 py-2"></main>

        <!-- NAVEGACIÓN INFERIOR ESTILO CAPTURA -->
        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] glass rounded-[2.5rem] p-3 flex justify-around items-center shadow-2xl border border-white/50 z-[100]">
            <button onclick="changeTab('home')" class="flex flex-col items-center gap-1" id="nav-home">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span class="text-[8px] font-black uppercase tracking-tighter">Cursos</span>
            </button>
            <button onclick="changeTab('schedule')" class="flex flex-col items-center gap-1" id="nav-schedule">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <span class="text-[8px] font-black uppercase tracking-tighter">Horarios</span>
            </button>
            <button onclick="changeTab('calendar')" class="flex flex-col items-center gap-1" id="nav-calendar">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                <span class="text-[8px] font-black uppercase tracking-tighter">Agenda</span>
            </button>
            <button onclick="changeTab('notes')" class="flex flex-col items-center gap-1" id="nav-notes">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                <span class="text-[8px] font-black uppercase tracking-tighter">Notas</span>
            </button>
        </nav>
    </div>

    <script>
        const STORAGE_KEY = 'preceptor_pro_v23_final_storage';
        let state = {
            tab: 'home',
            course: null,
            subTab: 'asis',
            students: { 
                "5° A BOEA": ["Alvarez, Marcos", "Benitez, Juan", "Cabrera, Ana"], 
                "5° B BOEA": ["Duarte, Sol", "Escobar, Luis"], 
                "5° A BOI": ["Franco, Raul", "Gomez, Mia"] 
            },
            attendance: {},
            referentes: {}
        };

        const savedData = localStorage.getItem(STORAGE_KEY);
        if (savedData) { try { state = JSON.parse(savedData); } catch(e) {} }

        function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

        function changeTab(t) { state.tab = t; state.course = null; render(); }

        function render() {
            const container = document.getElementById('main-view');
            document.querySelectorAll('nav button').forEach(btn => {
                const id = btn.id.split('-')[1];
                const isActive = (state.tab === id || (state.tab === 'course' && id === 'home'));
                btn.style.color = isActive ? '#2563eb' : '#d1d5db';
            });
            if (state.tab === 'home') renderHome(container);
            else if (state.tab === 'course') renderCourse(container);
            else container.innerHTML = `<div class="p-10 text-center text-gray-300 font-black italic uppercase text-[10px]">Módulo en desarrollo</div>`;
            save();
        }

        function renderHome(c) {
            c.innerHTML = `<h2 class="text-[11px] font-black text-gray-400 uppercase tracking-widest mb-6 italic px-1">MIS CURSOS</h2>` +
                Object.keys(state.students).map(course => `
                <div onclick="state.tab='course';state.course='${course}';state.subTab='asis';render()" class="card p-8 mb-4 flex justify-between items-center cursor-pointer active:scale-[0.97] transition-all">
                    <div>
                        <span class="text-2xl font-black italic text-gray-800 tracking-tighter uppercase leading-none">${course}</span>
                        <p class="text-[10px] font-black text-blue-500 mt-2 uppercase tracking-tight">${state.students[course].length} ALUMNOS</p>
                    </div>
                    <span class="text-blue-100 text-lg">→</span>
                </div>`).join('');
        }

        function renderCourse(c) {
            c.innerHTML = `
                <div class="flex items-center gap-4 mb-6">
                    <button onclick="changeTab('home')" class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm text-gray-400">←</button>
                    <h2 class="text-2xl font-black italic uppercase tracking-tighter text-gray-800">${state.course}</h2>
                </div>
                <div class="flex bg-gray-200/40 p-1 rounded-2xl mb-6 gap-1">
                    <button onclick="state.subTab='asis';render()" class="flex-1 tab-btn ${state.subTab==='asis'?'active':'inactive'}">Asistencia</button>
                    <button onclick="state.subTab='refs';render()" class="flex-1 tab-btn ${state.subTab==='refs'?'active':'inactive'}">Referentes</button>
                    <button onclick="state.subTab='alum';render()" class="flex-1 tab-btn ${state.subTab==='alum'?'active':'inactive'}">Alumnos</button>
                </div>
                ${state.subTab === 'asis' ? renderAsisPanel() : (state.subTab === 'refs' ? renderRefs() : renderAlum())}`;
        }

        function renderAsisPanel() {
            const today = new Date().toISOString().split('T')[0];
            const list = state.students[state.course] || [];
            if (list.length === 0) return `<div class="p-10 text-center text-gray-300 font-black italic text-[10px]">CARGA ALUMNOS PRIMERO</div>`;

            return `<div class="space-y-3 pb-24">` + list.map(s => {
                const status = state.attendance[`${state.course}_${s}_${today}`] || '';
                return `
                <div class="card p-4 flex justify-between items-center px-6 ${status === 'S' ? 'saca-bg' : ''}">
                    <div class="flex flex-col truncate pr-2">
                        <span class="font-black text-[12px] uppercase text-gray-800 italic truncate">${s}</span>
                        ${status === 'S' ? '<span class="text-[7px] font-black text-amber-600 uppercase italic">● TRABAJO / ACAP</span>' : ''}
                    </div>
                    <div class="flex gap-1.5">
                        <button onclick="setAsis('${s}','P')" class="w-9 h-9 rounded-xl font-black text-[10px] border ${status==='P'?'bg-green-500 text-white border-green-500':'bg-gray-50 text-gray-300 border-gray-100'}">P</button>
                        <button onclick="setAsis('${s}','A')" class="w-9 h-9 rounded-xl font-black text-[10px] border ${status==='A'?'bg-red-500 text-white border-red-500':'bg-gray-50 text-gray-300 border-gray-100'}">A</button>
                        <button onclick="setAsis('${s}','J')" class="w-9 h-9 rounded-xl font-black text-[10px] border ${status==='J'?'bg-blue-500 text-white border-blue-500':'bg-gray-50 text-gray-300 border-gray-100'} flex items-center justify-center">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                        </button>
                        <button onclick="setAsis('${s}','S')" class="w-9 h-9 rounded-xl font-black text-[10px] border ${status==='S'?'bg-amber-500 text-white border-amber-500':'bg-gray-50 text-gray-300 border-gray-100'} flex items-center justify-center">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                        </button>
                    </div>
                </div>`;
            }).join('') + `</div>`;
        }

        function setAsis(s, t) { const d = new Date().toISOString().split('T')[0]; const k = `${state.course}_${s}_${d}`; state.attendance[k] = (state.attendance[k]===t) ? '' : t; render(); }

        function renderRefs() {
            const r = state.referentes[state.course] || { d: "", p: "" };
            return `<div class="space-y-4">
                <div class="card p-6 border-l-4 border-l-blue-600">
                    <label class="text-[9px] font-black text-blue-600 uppercase italic mb-2 block">Delegados</label>
                    <textarea onchange="saveR('${state.course}','d',this.value)" class="w-full bg-gray-50 rounded-xl p-4 text-[11px] font-bold outline-none h-20" placeholder="Nombres...">${r.d}</textarea>
                </div>
                <div class="card p-6 border-l-4 border-l-green-500">
                    <label class="text-[9px] font-black text-green-600 uppercase italic mb-2 block">Referentes</label>
                    <textarea onchange="saveR('${state.course}','p',this.value)" class="w-full bg-gray-50 rounded-xl p-4 text-[11px] font-bold outline-none h-20" placeholder="Nombres...">${r.p}</textarea>
                </div></div>`;
        }
        function saveR(c, f, v) { if(!state.referentes[c]) state.referentes[c]={d:"",p:""}; state.referentes[c][f]=v; save(); }

        function renderAlum() {
            return `<div class="card p-6 mb-4"><textarea id="imp" class="w-full bg-gray-50 rounded-xl p-4 text-[11px] font-bold outline-none h-20 mb-3" placeholder="Pegar lista..."></textarea><button onclick="procImp()" class="w-full bg-blue-600 text-white py-4 rounded-xl text-[10px] font-black uppercase">Importar</button></div>
            <div class="space-y-2 pb-24">${(state.students[state.course]||[]).map(s => `<div class="bg-white p-3 px-5 rounded-xl border border-gray-100 flex justify-between items-center text-[10px] font-bold text-gray-500 uppercase"><span>${s}</span><button onclick="remS('${s}')" class="text-red-200 font-black">×</button></div>`).join('')}</div>`;
        }
        function procImp() { const v = document.getElementById('imp').value; if(!v) return; const ns = v.split('\n').map(n => n.trim()).filter(n => n.length>2); state.students[state.course] = [...new Set([...(state.students[state.course]||[]), ...ns])].sort(); render(); }
        function remS(n) { state.students[state.course] = state.students[state.course].filter(x => x!==n); render(); }

        window.onload = () => { render(); };
    </script>
</body>
</html>

```
