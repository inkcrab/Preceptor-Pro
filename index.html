<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0"/>
<title>Preceptor Pro</title>
<link rel="icon" type="image/png" href="preceptor-pro-favicon-32.png" />
<link rel="apple-touch-icon" href="preceptor-pro-icon-192.png" />
<link rel="manifest" href="preceptor-pro-manifest.json" />
<meta name="theme-color" content="#0b3d91" />
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#f4f6fb;min-height:100vh;}
  button{cursor:pointer;font-family:inherit;}
  input,textarea,select{font-family:inherit;}
  textarea{resize:vertical;}
  :root{
    --primary:#1a1a2e;
    --accent:#4361ee;
    --bg:#f4f6fb;
  }
  .app{max-width:500px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;}
  .screen{padding:16px 16px 90px;}
  /* Bottom Nav */
  .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;background:#fff;border-top:1px solid #f0f0f0;display:flex;z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,.08);}
  .nav-btn{flex:1;background:none;border:none;padding:12px 4px;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;font-weight:700;color:#999;}
  .nav-btn.active{color:var(--accent);}
  .nav-btn svg{display:block;}
  /* Cards */
  .card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.07);margin-bottom:14px;}
  /* Buttons */
  .btn-primary{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:13px;font-weight:800;font-size:15px;width:100%;}
  .btn-ghost{background:#f0f0f0;border:none;border-radius:12px;padding:13px;font-weight:700;font-size:14px;width:100%;}
  /* Inputs */
  .inp{width:100%;padding:11px 13px;border-radius:10px;border:1px solid #e0e0e0;font-size:14px;}
  .inp:focus{outline:2px solid var(--accent);border-color:transparent;}
  /* Modal */
  .modal-overlay{position:fixed;inset:0;z-index:1000;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.5);overflow-y:auto;padding-top:16px;}
  .modal-box{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;touch-action:pan-y;padding:20px 16px 32px;}
  /* Tabs */
  .tabs{display:flex;background:#ebebf0;border-radius:12px;padding:4px;gap:2px;margin-bottom:14px;}
  .tab-btn{flex:1;padding:8px 4px;border-radius:9px;border:none;font-weight:700;font-size:11px;background:transparent;color:#888;transition:all .2s;}
  .tab-btn.active{background:#fff;color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.1);}
  /* Vista selector */
  .vista-sel{display:flex;background:#ebebf0;border-radius:12px;padding:4px;gap:2px;margin-bottom:16px;}
  .vista-btn{flex:1;padding:8px 4px;border-radius:9px;border:none;font-weight:700;font-size:12px;background:transparent;color:#888;}
  .vista-btn.active{background:#fff;color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.1);}
  /* Fab */
  .fab{position:fixed;bottom:80px;right:calc(50% - 240px);width:52px;height:52px;border-radius:50%;background:var(--accent);border:none;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(67,97,238,.4);z-index:200;color:#fff;font-size:28px;font-weight:300;}
  /* Notif cards */
  .notif{border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:10px;}
  /* Asistencia buttons */
  .asist-btn{width:34px;height:34px;border-radius:9px;border:2px solid #e0e0e0;background:#fff;font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;}
  .asist-btn.active-P{background:#27ae60;border-color:#27ae60;color:#fff;}
  .asist-btn.active-A{background:#e74c3c;border-color:#e74c3c;color:#fff;}
  .asist-btn.active-J{background:#2980b9;border-color:#2980b9;color:#fff;}
  .asist-btn.active-S{background:#1a1a2e;border-color:#1a1a2e;color:#fff;}
  .asist-btn.active-AC{background:#e67e22;border-color:#e67e22;color:#fff;}
  .asist-btn.active-T{background:#8e44ad;border-color:#8e44ad;color:#fff;}
  /* Expandable asist row */
  .asist-expand{display:none;flex-wrap:wrap;gap:6px;padding:10px 0 4px;}
  .asist-expand.open{display:flex;}
  .asist-main-btn{padding:8px 14px;border-radius:10px;border:2px solid #e0e0e0;background:#fff;font-weight:800;font-size:13px;color:#888;}
  /* Back btn */
  .back-btn{background:#fff;border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.1);flex-shrink:0;}
  /* Scrollable table */
  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  table{border-collapse:collapse;}
  th,td{padding:8px 6px;text-align:center;}
  /* Color dots */
  .color-dot{width:30px;height:30px;border-radius:8px;cursor:pointer;border:2px solid transparent;display:inline-block;}
  .color-dot.sel{border-color:#333;transform:scale(1.15);}
  label{display:block;font-size:12px;font-weight:700;color:#888;margin-bottom:5px;}
  /* Importance stars */
  .imp-btn{flex:1;padding:8px;border-radius:10px;border:2px solid #e0e0e0;background:#fff;font-weight:700;font-size:13px;}
  .imp-btn.sel{border-color:var(--accent);background:#eff3ff;color:var(--accent);}
  /* Notification bell badge */
  .badge{background:#e74c3c;color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;}
  .fast-mode *{animation:none!important;transition:none!important;scroll-behavior:auto!important;}
  .splash-screen{position:fixed;inset:0;background:#0b3d91;display:flex;align-items:center;justify-content:center;z-index:5000;opacity:1;visibility:visible;transition:opacity .35s ease,visibility .35s ease;}
  .splash-screen.hidden{opacity:0;visibility:hidden;pointer-events:none;}
  .splash-box{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;color:#fff;animation:splashFade .45s ease;}
  .splash-logo{width:92px;height:92px;border-radius:24px;background:rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);box-shadow:0 10px 24px rgba(0,0,0,.18);margin-bottom:18px;overflow:hidden;}
  .splash-logo img{width:100%;height:100%;object-fit:cover;}
  .splash-title{font-size:30px;font-weight:900;letter-spacing:-.5px;margin-bottom:6px;}
  .splash-sub{font-size:14px;color:#dce6ff;font-weight:600;margin-bottom:18px;}
  .splash-spinner{width:32px;height:32px;border-radius:50%;border:3px solid rgba(255,255,255,.24);border-top-color:#fff;animation:splashSpin .9s linear infinite;}
  @keyframes splashSpin{to{transform:rotate(360deg);}}
  @keyframes splashFade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  @media(max-width:400px){.fab{right:20px;}}
</style>
</head>
<body>
<div id="splashScreen" class="splash-screen" aria-live="polite">
  <div class="splash-box">
    <div class="splash-logo">
      <img src="preceptor-pro-icon-192.png" alt="Preceptor Pro"/>
    </div>
    <div class="splash-title">Preceptor Pro</div>
    <div class="splash-sub">Gestión escolar</div>
    <div class="splash-spinner" aria-hidden="true"></div>
  </div>
</div>
<div class="app" id="app">
  <!-- Rendered by JS -->
</div>
<input type="file" id="backupImportInput" accept="application/json,.json" style="display:none" onchange="importarBackup(event)"/>
<input type="file" id="emergencyBackupImportInput" accept="application/json,.json" style="display:none" onchange="importarBackupEmergencia(event)"/>
<input type="file" id="profilePhotoInput" accept="image/*" style="position:fixed;left:-9999px;top:-9999px;opacity:0;width:1px;height:1px;pointer-events:none" onchange="subirFotoPerfil(event)"/>
<script src="https://www.gstatic.com/firebasejs/12.0.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.0.0/firebase-storage-compat.js"></script>

<script>
// ============================================================
// DATA & STORAGE
// ============================================================
const FERIADOS = [
  {fecha:"2026-01-01",nombre:"Año Nuevo"},
  {fecha:"2026-02-16",nombre:"Carnaval"},
  {fecha:"2026-02-17",nombre:"Carnaval"},
  {fecha:"2026-03-24",nombre:"Día de la Memoria"},
  {fecha:"2026-04-02",nombre:"Día del Veterano de Malvinas"},
  {fecha:"2026-04-03",nombre:"Viernes Santo"},
  {fecha:"2026-05-01",nombre:"Día del Trabajador"},
  {fecha:"2026-05-25",nombre:"Revolución de Mayo"},
  {fecha:"2026-06-15",nombre:"Paso a la Inmortalidad del Gral. Güemes"},
  {fecha:"2026-06-20",nombre:"Paso a la Inmortalidad del Gral. Belgrano"},
  {fecha:"2026-07-09",nombre:"Día de la Independencia"},
  {fecha:"2026-08-17",nombre:"Paso a la Inmortalidad del Gral. San Martín"},
  {fecha:"2026-10-12",nombre:"Día del Respeto a la Diversidad Cultural"},

  {fecha:"2026-12-08",nombre:"Inmaculada Concepción de María"},

const COLORES = ["#6C63FF","#E74C3C","#27AE60","#F39C12","#2980B9","#8E44AD","#16A085","#D35400","#E91E63","#1a1a2e"];
const DIAS = ["Lunes","Martes","Miércoles","Jueves","Viernes"];
const DIAS_ACAP = [
  {label:"L", value:"lunes"},
  {label:"M", value:"martes"},
  {label:"X", value:"miercoles"},
  {label:"J", value:"jueves"},
  {label:"V", value:"viernes"},

const HORAS = ["12:30 - 13:10","13:10 - 13:50","13:50 - 14:30","14:40 - 15:20","15:20 - 16:00","16:00 - 16:40","16:50 - 17:30","17:30 - 18:10","CONTRATURNO"];
const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DIAS_CORTOS = ["D","L","M","X","J","V","S"];
const PERFIL_NAME_PLACEHOLDERS = ['preceptor','preceptor/a'];
const SUPPORT_EMAIL = 'soporte.tusapps@gmail.com';
const supportWhatsapp = '549XXXXXXXXXX';
const premiumMessage = 'Hola! Quiero pasarme a Premium en Preceptor Pro.';
const SUPPORT_WHATSAPP = supportWhatsapp;
const adminEmails = ['omar_moyano@hotmail.com'];
const AUTH_USERS_KEY = 'pp_auth_users';
const AUTH_ACTIVE_KEY = 'pp_auth_active';
const AUTH_ACTIVE_SESSION_KEY = 'pp_auth_active_session';
const AUTH_PERSIST_KEY = 'pp_auth_persist';
const APP_DATA_KEYS = ['pp_perfil','pp_cursos','pp_alumnos','pp_asist','pp_acaps','pp_hor','pp_horas_inst','pp_eventos','pp_notas','pp_listas','pp_listas_globales','pp_acap_hist','pp_asist_obs','pp_colors','pp_fast_mode','pp_last_modified','pp_user_profile','pp_plan'];
const firebaseConfig = {
  apiKey: "AIzaSyB3L7CiwRYrOD6isSPm3XCy0k76GfoYPsA",
  authDomain: "preceptor-pro-97caa.firebaseapp.com",
  projectId: "preceptor-pro-97caa",
  storageBucket: "preceptor-pro-97caa.firebasestorage.app",
  messagingSenderId: "1096852070463",
  appId: "1:1096852070463:web:945246c1a1ad1232f8988a"
};

function getStoredUsers(){ try{return JSON.parse(localStorage.getItem(AUTH_USERS_KEY)||'[]');}catch{return [];} }
function getAuthPersistencePreference(){
  try{return localStorage.getItem(AUTH_PERSIST_KEY) || sessionStorage.getItem(AUTH_PERSIST_KEY) || 'local';}catch{return 'local';}
}
function setAuthPersistencePreference(remember){
  try{
    if(remember){
      localStorage.setItem(AUTH_PERSIST_KEY, 'local');
      sessionStorage.removeItem(AUTH_PERSIST_KEY);
    } else {
      sessionStorage.setItem(AUTH_PERSIST_KEY, 'session');
      localStorage.removeItem(AUTH_PERSIST_KEY);
    }
  }catch{}
}
function getActiveUser(){
  try{
    return JSON.parse(sessionStorage.getItem(AUTH_ACTIVE_SESSION_KEY)||localStorage.getItem(AUTH_ACTIVE_KEY)||'null');
  }catch{return null;}
}
function setActiveUser(user, remember=getAuthPersistencePreference()!=='session'){
  try{
    if(remember){
      localStorage.setItem(AUTH_ACTIVE_KEY, JSON.stringify(user));
      sessionStorage.removeItem(AUTH_ACTIVE_SESSION_KEY);
    } else {
      sessionStorage.setItem(AUTH_ACTIVE_SESSION_KEY, JSON.stringify(user));
      localStorage.removeItem(AUTH_ACTIVE_KEY);
    }
  }catch{}
}
function clearActiveUser(){
  try{
    localStorage.removeItem(AUTH_ACTIVE_KEY);
    sessionStorage.removeItem(AUTH_ACTIVE_SESSION_KEY);
  }catch{}
}
let activeUser = getActiveUser();
let firebaseApp = null;
let firebaseAuth = null;
let firestoreDb = null;
let storageDb = null;
let authReady = true;
let firebaseEnabled = false;
let firestoreEnabled = false;
let storageEnabled = false;
let remoteSaveTimer = null;
let cloudStatusTimer = null;
let remoteHydrating = false;
let splashHidden = false;
let splashMaxTimer = null;
let lastRemoteUserDoc = null;
let profilePhotoPreviewUrl = '';
let profilePhotoPreviewObjectUrl = '';
function getActiveUserUid(){
  return String(activeUser?.uid || activeUser?.id || firebaseAuth?.currentUser?.uid || '').trim();
}
function scopedStorageKey(k){
  if(!APP_DATA_KEYS.includes(k)) return k;
  const uid = getActiveUserUid();
  if(!uid) return null;
  return `pp_state_${uid}_${k}`;
}
function hasScopedData(userRef){
  const uid = String(userRef?.uid || userRef?.id || userRef || '').trim();
  if(!uid) return false;
  return APP_DATA_KEYS.some(k=>localStorage.getItem(`pp_state_${uid}_${k}`)!==null);
}
function migrateLegacyDataToUser(userRef){
  const uid = String(userRef?.uid || userRef?.id || '').trim();
  const email = String(userRef?.email || '').trim();
  if(!uid || hasScopedData(uid)) return;
  const allowGlobalLegacy = isAdminEmail(email);
  APP_DATA_KEYS.forEach(k=>{
    const candidates = [
      localStorage.getItem(`pp_state_${uid}_${k}`),
      email ? localStorage.getItem(`pp_user_${email}_${k}`) : null,
      allowGlobalLegacy ? localStorage.getItem(k) : null
    ];
    const legacy = candidates.find(v=>v!==null);
    if(legacy!==null) localStorage.setItem(`pp_state_${uid}_${k}`, legacy);
  });
}
function initFirebaseAuth(){
  try{
    if(typeof firebase === 'undefined') return false;
    firebaseApp = firebase.apps?.length ? firebase.app() : firebase.initializeApp(firebaseConfig);
    firebaseAuth = firebase.auth();
    firestoreDb = typeof firebase.firestore === 'function' ? firebase.firestore() : null;
    storageDb = typeof firebase.storage === 'function' ? firebase.storage() : null;
    firebaseEnabled = true;
    firestoreEnabled = !!firestoreDb;
    storageEnabled = !!storageDb;
    return true;
  }catch(err){
    console.error('Firebase init error', err);
    firebaseEnabled = false;
    firestoreEnabled = false;
    storageEnabled = false;
    return false;
  }
}
function syncActiveUserFromFirebase(user){
  if(user){
    activeUser = {
      uid: user.uid,
      email: user.email || '',
      nombre: user.displayName || user.email || 'Usuario',
      emailVerified: user.emailVerified === true
    };
    migrateLegacyDataToUser(activeUser);
    setActiveUser(activeUser, getAuthPersistencePreference()!=='session');
    state.userProfile = {
      ...(state.userProfile||{}),
      uid: activeUser.uid,
      email: activeUser.email,
      nombre: (String(state?.userProfile?.nombre||'').trim() && !isPlaceholderProfileName(state?.userProfile?.nombre)) ? String(state.userProfile.nombre).trim() : activeUser.nombre
    };
    if((!String(state?.perfil?.nombre||'').trim() || isPlaceholderProfileName(state?.perfil?.nombre)) && String(activeUser.nombre||'').trim()){
      state.perfil = {...(state.perfil||{}), nombre: activeUser.nombre};
    }
    if(isAdminEmail(activeUser.email)){
      state.plan = 'premium';
      S.set('pp_plan', state.plan);
    }
  } else {
    activeUser = null;
    clearActiveUser();
  }
}
function getFutureCloudPayload(){
  return {
    user: activeUser ? {uid:activeUser.uid,email:activeUser.email} : null,
    updatedAt: state?._lastModified || '',
    dataKeys: APP_DATA_KEYS
  };
}
function deepCopy(v){return JSON.parse(JSON.stringify(v));}
function isPlaceholderProfileName(name){
  return PERFIL_NAME_PLACEHOLDERS.includes(String(name||'').trim().toLowerCase());
}
function isAdminEmail(email){
  return adminEmails.map(v=>String(v||'').trim().toLowerCase()).includes(String(email||'').trim().toLowerCase());
}
function isAdminUser(){
  const user = firebaseAuth?.currentUser || null;
  return !!(user && isAdminEmail(user.email || ''));
}
function getVisibleUserName(){
  const perfilNombre = String(state?.perfil?.nombre||'').trim();
  if(perfilNombre && !isPlaceholderProfileName(perfilNombre)) return perfilNombre;
  const userProfileNombre = String(state?.userProfile?.nombre||'').trim();
  if(userProfileNombre && !isPlaceholderProfileName(userProfileNombre)) return userProfileNombre;
  const firebaseNombre = String(firebaseAuth?.currentUser?.displayName||'').trim();
  if(firebaseNombre && !isPlaceholderProfileName(firebaseNombre)) return firebaseNombre;
  const emailNombre = String(activeUser?.email || firebaseAuth?.currentUser?.email || '').trim();
  if(emailNombre) return emailNombre;
  return 'Preceptor';
}
function isPendingEmailVerification(){
  return !!(firebaseEnabled && firebaseAuth?.currentUser && firebaseAuth.currentUser.emailVerified===false);
}
function buildEmailVerificationNotice(){
  if(!isPendingEmailVerification()) return '';
  return `<div class="card" style="margin-bottom:16px;background:#fff8e1;border-left:4px solid #f39c12">
    <div style="font-weight:800;font-size:14px;color:#b26a00;margin-bottom:6px">Tu cuenta no está verificada</div>
    <div style="font-size:12px;color:#8a6d1f;line-height:1.5;margin-bottom:12px">Te enviamos un correo para verificar tu cuenta. Revisá tu email antes de continuar.</div>
    <button onclick="reenviarEmailVerificacion()" class="btn-ghost" style="width:auto;padding:10px 14px;color:#b26a00;border-color:#f4d58d">Reenviar email</button>
  </div>`;
}
function isMeaningfulValue(next, current){
  if(typeof next === 'undefined' || next === null) return false;
  if(typeof next === 'string') return next.trim()!=='' || !String(current||'').trim();
  if(Array.isArray(next)) return next.length>0 || !(Array.isArray(current) && current.length>0);
  if(typeof next === 'object'){
    const keys = Object.keys(next);
    if(keys.length===0) return !(current && typeof current==='object' && Object.keys(current).length>0);
    return true;
  }
  return true;
}
function setCloudStatus(status){
  if(cloudStatusTimer){
    clearTimeout(cloudStatusTimer);
    cloudStatusTimer = null;
  }
  if(status === 'syncing'){
    cloudStatusTimer = setTimeout(()=>{
      if(state._cloudStatus === 'syncing'){
        state._cloudStatus = (typeof navigator!=='undefined' && !navigator.onLine) ? 'offline' : 'local';
        if(typeof document!=='undefined' && document.getElementById('app')) render();
      }
    }, 8000);
  }
  if(state._cloudStatus===status) return;
  state._cloudStatus = status;
  if(typeof document!=='undefined' && document.getElementById('app')) render();
}

const S = {
  get:(k,d)=>{
    try{
      const scopedKey = scopedStorageKey(k);
      if(!scopedKey) return d;
      const v=localStorage.getItem(scopedKey);
      return v?JSON.parse(v):d;
    }catch{return d;}
  },
  set:(k,v)=>{
    try{
      const scopedKey = scopedStorageKey(k);
      if(!scopedKey) return;
      localStorage.setItem(scopedKey,JSON.stringify(v));
    }catch{}
  }
};

// ---- State ----
let state = {
  perfil: S.get('pp_perfil', {nombre:'Preceptor/a', escuela:'Mi Escuela', turno:'Mañana'}),
  userProfile: S.get('pp_user_profile', {nombre: activeUser?.nombre||'', email: activeUser?.email||'', uid: activeUser?.uid||''}),
  plan: S.get('pp_plan', 'free'),
  cursos: S.get('pp_cursos', []),
  alumnos: S.get('pp_alumnos', {}),
  asistencia: S.get('pp_asist', {}),
  acaps: S.get('pp_acaps', {}),
  horarios: S.get('pp_hor', {}),
  horasInstitucion: S.get('pp_horas_inst', HORAS),
  eventos: S.get('pp_eventos', []),
  notas: S.get('pp_notas', []),
  listas: S.get('pp_listas', {}),
  listasGlobales: S.get('pp_listas_globales', []),
  acapHistorial: S.get('pp_acap_hist', []),
  asistObs: S.get('pp_asist_obs', {}),
  colors: S.get('pp_colors', {primary:'#1a1a2e', accent:'#4361ee', bg:'#f4f6fb'}),
  fastMode: S.get('pp_fast_mode', false),
  // Nav
  screen: 'home', // home | curso | perfil | config
  tab: 'cursos',  // cursos | horarios | agenda | notas
  cursoActivo: null,
  cursoTab: 'asistencia',
  fechaAsist: toISO(new Date()),
  vistaAsist: 'dia',
  _listaActiva: null,
  _listaModo: 'curso',
  _listaCols: ['','',''],
  _acapOpen: {},
  _acapClipboard: null,
  _acapSearch: '',
  _acapDesde: '',
  _acapHasta: '',
  _asistSearch: '',
  _asistInitial: '',
  _asistLimit: 40,
  _asistSelected: {},
  _asistOnlyAcap: false,
  _notasSearch: '',
  _notasOnlyImportant: false,
  _authMode: 'login',
  _rememberLogin: getAuthPersistencePreference()!=='session',
  _cloudStatus: 'local',
  _online: typeof navigator!=='undefined' ? navigator.onLine : true,
  _toast: null,
  _lastModified: S.get('pp_last_modified', ''),
  // Modals
  modal: null,
  modalData: {},
};

const PERSIST_DEFAULTS = {
  perfil: deepCopy(state.perfil),

      nombre: String(state?.userProfile?.nombre||'').trim() || getVisibleUserName(),

    },

    fastMode: state.fastMode,
    config: {fastMode: state.fastMode, plan: state.plan},

}
function hasMeaningfulPersistedData(data){
  if(!data || typeof data!=='object') return false;
  const source = data.state && typeof data.state==='object' ? data.state : data;
  return Object.keys(PERSIST_DEFAULTS).some(k=>typeof source[k] !== 'undefined');
}
function applyPersistedState(data){
  if(!data || typeof data!=='object') return;
  const source = data.state && typeof data.state==='object' ? data.state : data;
  ['cursos','alumnos','asistencia','acaps','listas','listasGlobales','notas','eventos','horarios','horasInstitucion','perfil','colors','config','userProfile','plan'].forEach(k=>{
    if(typeof source[k] === 'undefined'){
      console.warn(`Firestore missing field: ${k}`);
    }
  });
  Object.keys(PERSIST_DEFAULTS).forEach(k=>{
    if(isMeaningfulValue(source[k], state[k])) state[k] = source[k];
  });
  if(source.config && typeof source.config.fastMode !== 'undefined' && !isMeaningfulValue(source.fastMode, state.fastMode)){
    state.fastMode = source.config.fastMode;
  }
  if(source.config && typeof source.config.plan !== 'undefined' && !isMeaningfulValue(source.plan, state.plan)){
    state.plan = source.config.plan;
  }
  if(source.userProfile && typeof source.userProfile === 'object'){
    state.userProfile = {
      ...(state.userProfile||{}),
      ...source.userProfile,
      nombre: String(source.userProfile.nombre||'').trim() || String(state?.userProfile?.nombre||'').trim() || String(activeUser?.nombre||'').trim() || ''
    };
  }
  if((!state.perfil || !String(state.perfil.nombre||'').trim() || isPlaceholderProfileName(state.perfil.nombre)) && source.userProfile?.nombre){
    state.perfil = {...(state.perfil||{}), nombre: source.userProfile.nombre};
  }
  if(source.perfil && typeof source.perfil === 'object' && String(source.perfil.foto||'').trim() && !String(source.perfil.foto||'').trim().startsWith('blob:') && !String(source.perfil.foto||'').trim().startsWith('data:')){
    const stamp = source.perfil.fotoUpdatedAt || source._lastModified || data?.meta?.updatedAt || state._lastModified || new Date().toISOString();
    console.log('Foto cargada desde Firestore:', source.perfil?.foto || '');
    state.perfil = {
      ...(state.perfil||{}),
      ...source.perfil,
      foto: withProfilePhotoCacheBuster(String(source.perfil.foto||'').trim(), stamp),
      fotoUpdatedAt: stamp
    };
    resetProfilePhotoPreview();
  }
}
function buildSyncedProfilePayload(){
  const perfil = state.perfil || {};
  return {
    nombre: String(perfil.nombre || '').trim(),
    escuela: String(perfil.escuela || '').trim(),
    institucion: String(perfil.institucion || '').trim(),
    turno: String(perfil.turno || '').trim(),
    foto: isTemporaryProfilePhotoUrl(perfil.foto) ? '' : stripProfilePhotoCacheBuster(String(perfil.foto || '').trim()),
    fotoUpdatedAt: perfil.fotoUpdatedAt || state._lastModified || new Date().toISOString()
  };
}
function getCurrentStatePayload(){
  return serializePersistedState();
}
function hasMeaningfulLocalState(){
  return hasMeaningfulPersistedData(getCurrentStatePayload());
}
function applyRemoteProfileFromUserDoc(data, options={}){
  const remotePerfil = data?.perfil;
  if(!remotePerfil || typeof remotePerfil !== 'object') return false;
  let changed = false;
  const nextPerfil = {...(state.perfil||{})};
  ['nombre','escuela','institucion','turno'].forEach(key=>{
    const value = String(remotePerfil[key] || '').trim();
    if(value && value !== String(nextPerfil[key] || '').trim()){
      nextPerfil[key] = value;
      changed = true;
    }
  });
  const remotePhoto = String(remotePerfil.foto || '').trim();
  const remoteStamp = remotePerfil.fotoUpdatedAt || data?.updatedAt || new Date().toISOString();
  if(remotePhoto && !isTemporaryProfilePhotoUrl(remotePhoto)){
    const normalizedRemotePhoto = withProfilePhotoCacheBuster(remotePhoto, remoteStamp);
    console.log('Foto cargada desde Firestore:', remotePhoto);
    if(String(nextPerfil.foto || '').trim() !== normalizedRemotePhoto || String(nextPerfil.fotoUpdatedAt || '').trim() !== String(remoteStamp)){
      nextPerfil.foto = normalizedRemotePhoto;
      nextPerfil.fotoUpdatedAt = remoteStamp;
      changed = true;
    }
  }
  if(changed){
    state.perfil = nextPerfil;
    resetProfilePhotoPreview();
    persistLocalState();
    if(options.showToast) showToast('Foto sincronizada');
  }
  return changed;
}

function getUserDocRef(uid=activeUser?.uid){
  const safeUid = String(uid || firebaseAuth?.currentUser?.uid || '').trim();
  if(!firestoreEnabled || !safeUid) return null;
  return firestoreDb.collection('users').doc(safeUid);
}
function getFirestoreDocRef(mode){
  const uid = getActiveUserUid();
  if(!firestoreEnabled || !uid) return null;
  if(mode==='legacy') return firestoreDb.collection('users').doc(uid).collection('data').doc('appState');
  return firestoreDb.collection('users').doc(uid).collection('appData').doc('main');
}
async function ensureUserDirectoryDoc(userLike){
  const uid = String(userLike?.uid || userLike?.id || '').trim();
  const email = String(userLike?.email || '').trim().toLowerCase();
  if(!firestoreEnabled || !uid || !email) return false;
  try{
    const ref = getUserDocRef(uid);
    if(!ref) return false;
    const snap = await ref.get();
    const current = snap.exists ? (snap.data() || {}) : {};
    const nextPlan = current.plan === 'premium' ? 'premium' : (current.plan === 'free' ? 'free' : 'free');
    await ref.set({
      uid,
      email,
      nombre: String(userLike?.displayName || userLike?.nombre || current.nombre || '').trim(),
      plan: nextPlan,
      createdAt: current.createdAt || new Date().toISOString(),
      updatedAt: new Date().toISOString()
    }, {merge:true});
    return true;
  }catch(err){
    console.error('Ensure user doc error', err);
    return false;
  }
}
async function loadUserPlanFromFirestore(uid=activeUser?.uid){
  try{
    const ref = getUserDocRef(uid);
    if(!ref) return false;
    const snap = await ref.get();
    const userData = snap.exists ? (snap.data() || {}) : {};
    lastRemoteUserDoc = userData;
    applyRemoteProfileFromUserDoc(userData);
    if(isAdminEmail(activeUser?.email || snap.data()?.email || '')){
      state.plan = 'premium';
      S.set('pp_plan', state.plan);
      try{
        await ref.set({
          plan: 'premium',
          email: activeUser?.email || snap.data()?.email || '',
          nombre: getVisibleUserName() || '',
          perfil: buildSyncedProfilePayload(),
          updatedAt: new Date().toISOString()
        }, {merge:true});
      }catch(writeErr){
        console.warn('Could not persist admin premium plan to Firestore.', writeErr);
      }
      return true;
    }
    const remotePlan = snap.exists ? snap.data()?.plan : null;
    state.plan = remotePlan === 'premium' ? 'premium' : 'free';
    S.set('pp_plan', state.plan);
    if(remotePlan!=='premium' && remotePlan!=='free'){
      console.warn('Firestore plan missing or invalid. Defaulting to free.', {uid});
      try{
        await ref.set({
          uid,
          plan: 'free',
          email: activeUser?.email || '',
          nombre: getVisibleUserName() || '',
          createdAt: snap.data()?.createdAt || new Date().toISOString(),
          perfil: buildSyncedProfilePayload(),
          updatedAt: new Date().toISOString()
        }, {merge:true});
      }catch(writeErr){
        console.warn('Could not persist default free plan to Firestore.', writeErr);
      }
    }
    return true;
  }catch(err){
    console.error('Firestore user plan load error', err);
    return false;
  }
}
async function loadDataFromFirestore(){
  try{
    const authUid = String(firebaseAuth?.currentUser?.uid || '').trim();
    if(!authUid || authUid!==getActiveUserUid()){
      console.warn('Skipping Firestore load: no authenticated uid available.');
      return false;
    }
    const userRef = getUserDocRef(authUid);
    const userSnap = userRef ? await userRef.get() : null;
    const userData = userSnap?.exists ? (userSnap.data() || {}) : null;
    let data = null;
    const refs = [getFirestoreDocRef('main'), getFirestoreDocRef('legacy')].filter(Boolean);
    for(const ref of refs){
      const snap = await ref.get();
      if(snap.exists && hasMeaningfulPersistedData(snap.data())){
        data = snap.data();
        break;
      }
    }
    const planLoaded = await loadUserPlanFromFirestore();
    if(!data){
      if(hasMeaningfulLocalState()){
        await saveToFirestore();
      }
      return planLoaded;
    }
    remoteHydrating = true;
    if (hasMeaningfulLocalState()) {
      console.log("Usando datos locales como fuente principal");
      await saveToFirestore();
      return true;
    }
    applyPersistedState(data);
    if(lastRemoteUserDoc) applyRemoteProfileFromUserDoc(lastRemoteUserDoc);
    if(isAdminUser()) state.plan = 'premium';
    else if(planLoaded) state.plan = state.plan === 'premium' ? 'premium' : 'free';
    console.log('Datos cargados desde Firestore', data.state && typeof data.state==='object' ? data.state : data);
    remoteHydrating = false;
    persistLocalState();
    return true;
  }catch(err){
    console.error('Firestore load error', err);
    return false;
  }finally{
    remoteHydrating = false;
  }
}
function queueFirestoreSave(){
  if(remoteHydrating) return;
  if(!activeUser?.uid || !firestoreEnabled){
    setCloudStatus('local');
    return;
  }
  if(typeof navigator!=='undefined' && !navigator.onLine){
    setCloudStatus('offline');
    return;
  }
  clearTimeout(remoteSaveTimer);
  setCloudStatus('syncing');
  remoteSaveTimer = setTimeout(()=>{ saveToFirestore(); }, 500);
}
async function upsertRemoteUserPlan(uid, plan, extra={}){
  if(!firestoreEnabled || !uid) return false;
  const userRef = getUserDocRef(uid);
  if(!userRef) return false;
  const currentSnap = await userRef.get();
  const current = currentSnap.exists ? (currentSnap.data() || {}) : {};
  await userRef.set({
    uid,
    plan: plan === 'premium' ? 'premium' : 'free',
    email: String(extra.email || current.email || '').trim().toLowerCase(),
    nombre: extra.nombre || current.nombre || '',
    createdAt: current.createdAt || new Date().toISOString(),
    perfil: extra.perfil || buildSyncedProfilePayload(),
    updatedAt: new Date().toISOString()
  }, {merge:true});
  return true;
}
async function saveToFirestore(){
  let nextStatus = 'synced';
  try{
    const authUid = String(firebaseAuth?.currentUser?.uid || '').trim();
    if(!authUid || authUid!==getActiveUserUid()){
      nextStatus = 'local';
      console.warn('Skipping Firestore save: no authenticated uid available.');
      return;
    }
    const ref = getFirestoreDocRef('main');
    const userRef = getUserDocRef(authUid);
    const payload = getCurrentStatePayload();
    if(!ref){
      nextStatus = 'local';
      return;
    }
    await Promise.all([
      ref.set({
        state: payload,
        meta: {
          updatedAt: state._lastModified || new Date().toISOString(),
          dataKeys: APP_DATA_KEYS
        }
      }, {merge:true}),
      userRef ? userRef.set({
        uid: authUid,
        plan: state.plan === 'premium' ? 'premium' : 'free',
        email: String(activeUser?.email || '').trim().toLowerCase(),
        nombre: getVisibleUserName(),
        perfil: buildSyncedProfilePayload(),
        createdAt: lastRemoteUserDoc?.createdAt || new Date().toISOString(),
        updatedAt: state._lastModified || new Date().toISOString()
      }, {merge:true}) : Promise.resolve()
    ]);
    console.log('Datos guardados en Firestore', payload);
  }catch(err){
    console.error('Firestore save error', err);
    nextStatus = (typeof navigator!=='undefined' && !navigator.onLine) ? 'offline' : 'local';
  }finally{
    setCloudStatus(nextStatus);
  }
}
function hydrateFromFirestoreInBackground(){
  if(!activeUser?.uid){
    setCloudStatus('local');
    return;
  }
  if(!firestoreEnabled){
    setCloudStatus('local');
    return;
  }
  if(typeof navigator!=='undefined' && !navigator.onLine){
    setCloudStatus('offline');
    return;
  }
  setCloudStatus('syncing');
  const localPhotoBefore = String(state?.perfil?.foto || '').trim();
  const localPhotoStampBefore = String(state?.perfil?.fotoUpdatedAt || '').trim();
  loadDataFromFirestore()
    .then(loaded=>{
      if(loaded){
        if(String(state?.perfil?.foto || '').trim() !== localPhotoBefore || String(state?.perfil?.fotoUpdatedAt || '').trim() !== localPhotoStampBefore){
          showToast('Foto sincronizada');
        }
        setCloudStatus('synced');
        render();
      } else {
        queueFirestoreSave();
      }
    })
    .catch(err=>{
      console.error('Background Firestore hydrate error', err);
      setCloudStatus('offline');
    });
}

function save(){
  state._lastModified = new Date().toISOString();
  persistLocalState();
  try{
    const today = todayISO();
    const lastBackup = localStorage.getItem('pp_auto_backup_day');
    if(lastBackup!==today){
      localStorage.setItem(`backup_auto_${today}`, JSON.stringify(state));
      localStorage.setItem('pp_auto_backup_day', today);
    }
  }catch{}
  queueFirestoreSave();
  flashToast('Guardado correctamente');
}

function toISO(d){return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function p2(n){return String(n).padStart(2,'0');}
function addDays(iso,n){const d=isoToDate(iso);d.setDate(d.getDate()+n);return toISO(d);}
function isoToDate(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function fmtFecha(iso){const d=isoToDate(iso);const days=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];return `${days[d.getDay()]}, ${d.getDate()} de ${MESES[d.getMonth()]} de ${d.getFullYear()}`;}
function startOfWeek(iso){const d=isoToDate(iso);const day=d.getDay();const diff=day===0?-6:1-day;d.setDate(d.getDate()+diff);return toISO(d);}
function daysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function todayISO(){return toISO(new Date());}
function saludo(){const h=new Date().getHours();if(h>=6&&h<13)return'Buen día';if(h>=13&&h<20)return'Buenas tardes';return'Buenas noches';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function uid(){return '_'+Math.random().toString(36).slice(2);}
function normalizeDia(d){return String(d||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
function diaSemanaISO(iso){
  const dias = ['domingo','lunes','martes','miercoles','jueves','viernes','sabado'];
  return dias[isoToDate(iso).getDay()];
}
function parseFechaInput(s){
  const txt = String(s||'').trim();
  if(!txt) return null;
  if(/^\d{4}-\d{2}-\d{2}$/.test(txt)) return txt;
  const m = txt.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(!m) return null;
  return `${m[3]}-${p2(Number(m[2]))}-${p2(Number(m[1]))}`;
}
function buildHorario(desde,hasta){
  if(desde && hasta) return `${desde} a ${hasta}`;
  if(desde) return `Desde ${desde}`;
  if(hasta) return `Hasta ${hasta}`;
  return '';
}
function backupTimestamp(){
  const now = new Date();
  return `${now.getFullYear()}${p2(now.getMonth()+1)}${p2(now.getDate())}_${p2(now.getHours())}${p2(now.getMinutes())}`;
}
function sanitizeFileName(s){return String(s||'archivo').replace(/[\\/:*?"<>|]+/g,'_').replace(/\s+/g,'_');}
function withinAcapRange(fecha, desde, hasta){
  if(desde && fecha < desde) return false;
  if(hasta && fecha > hasta) return false;
  return true;
}
function parseHorarioData(data){
  const horaDesde = data?.horaDesde || '';
  const horaHasta = data?.horaHasta || '';
  if(horaDesde || horaHasta){
    return {horaDesde, horaHasta};
  }
  const horario = String(data?.horario||'');
  const match = horario.match(/^\s*([^]+?)\s+a\s+([^]+?)\s*$/i);
  if(match) return {horaDesde:match[1].trim(), horaHasta:match[2].trim()};
  if(/^Desde\s+/i.test(horario)) return {horaDesde:horario.replace(/^Desde\s+/i,'').trim(), horaHasta:''};
  if(/^Hasta\s+/i.test(horario)) return {horaDesde:'', horaHasta:horario.replace(/^Hasta\s+/i,'').trim()};
  return {horaDesde:'', horaHasta:''};
}
function parseTimeToMinutes(value){
  const match = String(value||'').trim().match(/^(\d{1,2}):(\d{2})$/);
  if(!match) return null;
  const hours = Number(match[1]);
  const minutes = Number(match[2]);
  if(hours<0 || hours>23 || minutes<0 || minutes>59) return null;
  return hours * 60 + minutes;
}
function getAcapNotificationSummary(fecha=todayISO(), currentDate=new Date()){
  const byStudent = new Map();
  Object.entries(state.acaps||{}).forEach(([key, data])=>{
    if(!data) return;
    const parts = key.split('_');
    if(parts.length < 3) return;
    const recordDate = parts.slice(-1)[0];
    if(recordDate!==fecha) return;
    const cursoId = parts[0];
    const alumnoId = parts[1];
    const alumno = (state.alumnos[cursoId]||[]).find(a=>a.id===alumnoId);
    if(!alumno) return;
    if(!(data?.empresa || data?.horario || data?.horaDesde || data?.horaHasta || data?.lugar)) return;
    byStudent.set(`${cursoId}_${alumnoId}`, {
      cursoId,
      alumnoId,
      nombre: alumno.nombre,
      data
    });
  });
  const nowMinutes = currentDate.getHours() * 60 + currentDate.getMinutes();
  const activeNow = [...byStudent.values()].filter(item=>{
    const {horaDesde, horaHasta} = parseHorarioData(item.data);
    const start = parseTimeToMinutes(horaDesde);
    const end = parseTimeToMinutes(horaHasta);
    if(start===null || end===null) return false;
    return nowMinutes >= start && nowMinutes <= end;
  });
  return {
    totalHoy: byStudent.size,
    alumnosHoy: [...byStudent.values()],
    totalAhora: activeNow.length,
    alumnosAhora: activeNow
  };
}
function getAcapEntriesForAlumno(cursoId, alumnoId, opts){
  const {desde='', hasta=''} = opts||{};
  return Object.entries(state.acaps)
    .filter(([key, value])=>{
      if(!key.startsWith(`${cursoId}_${alumnoId}_`)) return false;
      const fecha = key.split('_').slice(-1)[0];
      return (value?.empresa || value?.horario || value?.horaDesde || value?.horaHasta || value?.lugar) && withinAcapRange(fecha, desde, hasta);
    })
    .map(([key, value])=>({key, fecha:key.split('_').slice(-1)[0], data:value}))
    .sort((a,b)=>a.fecha.localeCompare(b.fecha));
}
function getAcapRowsForCurso(cursoId, opts){

let __ppLastRenderContext = '';
function render(){
  const active = document.activeElement;
  const activeId = active?.id || '';
  const selectionStart = typeof active?.selectionStart === 'number' ? active.selectionStart : null;
  const selectionEnd = typeof active?.selectionEnd === 'number' ? active.selectionEnd : null;
  document.body.classList.toggle('fast-mode', !!state.fastMode);
  const prevCtx = __ppLastRenderContext;
  const nextCtx = currentRenderContext();
  const prevScroll = window.scrollY;
  __ppLastRenderContext = nextCtx;
  applyColors();
  const app = document.getElementById('app');
  app.innerHTML = buildApp();
  requestAnimationFrame(()=>hideSplashScreen());
  attachEvents();
  if(activeId){
    requestAnimationFrame(()=>{
      const nextActive = document.getElementById(activeId);
      if(nextActive){
        nextActive.focus();
        if(selectionStart!==null && selectionEnd!==null && typeof nextActive.setSelectionRange === 'function'){
          nextActive.setSelectionRange(selectionStart, selectionEnd);
        }
      }
    });
  }
  if(prevCtx===nextCtx){
    requestAnimationFrame(()=>window.scrollTo(0, prevScroll));
  } else {
    requestAnimationFrame(()=>window.scrollTo(0,0));
  }
}

// ============================================================
// HOME
// ============================================================
function buildHome(){
  const hoy = todayISO();
  const h = new Date().getHours();
  const emoji = h<12?'🌅':h<20?'☀️':'🌙';
  const ferHoy = FERIADOS.find(f=>f.fecha===hoy);
  const evsHoy = state.eventos.filter(e=>e.fecha===hoy);
  const acapSummary = getAcapNotificationSummary(hoy, new Date());
  const proxEvs = state.eventos.filter(e=>{
    const diff = Math.round((isoToDate(e.fecha)-isoToDate(hoy))/86400000);
    return diff>=1 && diff<=7;
  }).sort((a,b)=>a.fecha.localeCompare(b.fecha) || (a.titulo||'').localeCompare(b.titulo||''));
  const notasDest = notasImportantes();
  const ausentesHoy = totalAusentesHoy();
  const seenNotif = new Set();
  const pushNotif = htmlKey=>{
    const [key, html] = htmlKey;
    if(seenNotif.has(key)) return '';
    seenNotif.add(key);
    return html;
  };

  const notifsHoy = [];
  const notifsProx = [];
  if(acapSummary.totalHoy) notifsHoy.push(pushNotif([
    `acap_${hoy}`,
    `<div class="notif" style="background:#fff8e1;border-left:4px solid #f39c12"><span style="font-size:22px">💼</span><div><div style="font-weight:700;color:#e67e22;font-size:14px">ACAP del día</div><div style="font-size:12px;color:#946200">Hoy tienen ACAP: ${acapSummary.totalHoy} alumno${acapSummary.totalHoy===1?'':'s'}</div><div style="font-size:12px;color:#7d5d00;margin-top:3px">${esc(acapSummary.alumnosHoy.slice(0,4).map(a=>a.nombre).join(', '))}${acapSummary.totalHoy>4?'...':''}</div></div></div>`
  ]));
  if(acapSummary.totalHoy) notifsHoy.push(pushNotif([
    `acap_now_${hoy}`,
    `<div class="notif" style="background:#f7fbff;border-left:4px solid #2980b9"><span style="font-size:22px">⏰</span><div><div style="font-weight:700;color:#1f5f8b;font-size:14px">${acapSummary.totalAhora ? `Ahora están en ACAP: ${acapSummary.totalAhora} alumno${acapSummary.totalAhora===1?'':'s'}` : 'No hay alumnos en ACAP ahora'}</div><div style="font-size:12px;color:#5c6f82">${acapSummary.totalAhora ? `${esc(acapSummary.alumnosAhora.slice(0,4).map(a=>a.nombre).join(', '))}${acapSummary.totalAhora>4?'...':''}` : 'Se actualizará automáticamente según el horario actual.'}</div></div></div>`
  ]));
  if(ferHoy) notifsHoy.push(pushNotif([
    `feriado_${ferHoy.fecha}`,
    `<div class="notif" style="background:#fff0f0;border-left:4px solid #e74c3c"><span style="font-size:22px">🎉</span><div><div style="font-weight:700;color:#c0392b;font-size:14px">HOY · ${esc(ferHoy.nombre)}</div><div style="font-size:12px;color:#e74c3c">Feriado Nacional · Sin actividad escolar</div></div></div>`
  ]));
  evsHoy.forEach(ev=>{
    notifsHoy.push(pushNotif([
      `hoy_${ev.id||`${ev.fecha}_${ev.titulo}`}`,
      `<div class="notif" style="background:#f0f4ff;border-left:4px solid ${ev.color||'var(--accent)'}"><span style="font-size:22px">📌</span><div><div style="font-weight:700;color:var(--primary);font-size:14px">HOY · ${esc(ev.titulo)}</div>${ev.hora?`<div style="font-size:12px;color:#666">${esc(ev.hora)}${ev.lugar?' · '+esc(ev.lugar):''}</div>`:''}</div></div>`
    ]));
  });
  if(ausentesHoy) notifsHoy.push(pushNotif([
    `ausentes_${hoy}`,
    `<div class="notif" style="background:#fff5f5;border-left:4px solid #e74c3c"><span style="font-size:22px">🚨</span><div><div style="font-weight:700;color:#e74c3c;font-size:14px">AUSENTES HOY · ${ausentesHoy}</div></div></div>`
  ]));
  proxEvs.forEach(ev=>{
    const diff=Math.round((isoToDate(ev.fecha)-isoToDate(hoy))/86400000);
    notifsProx.push(pushNotif([
      `prox_${ev.id||`${ev.fecha}_${ev.titulo}`}`,
      `<div class="notif" style="background:#f8f9fa;border-left:4px solid ${ev.color||'#aaa'}"><span style="font-size:22px">🔔</span><div><div style="font-weight:700;color:var(--primary);font-size:14px">${esc(ev.titulo)}</div><div style="font-size:12px;color:#666">Faltan ${diff} día${diff===1?'':'s'}${ev.hora?` · ${esc(ev.hora)}`:''}</div></div></div>`
    ]));
  });
  notasDest.slice(0,2).forEach(n=>{
    notifsHoy.push(pushNotif([
      `nota_${n.id||n.fechaCreada||n.titulo||n.contenido}`,
      `<div class="notif" style="background:#fff;border-left:4px solid ${n.color||'var(--accent)'};box-shadow:0 1px 6px rgba(0,0,0,.07)"><span style="font-size:22px">⭐</span><div><div style="font-weight:700;color:var(--primary);font-size:14px">${esc(n.titulo||n.contenido.slice(0,40))}</div><div style="font-size:12px;color:#888">Nota importante</div></div></div>`
    ]));
  });
  const notifs = [...notifsHoy.filter(Boolean), ...notifsProx.filter(Boolean)].join('');

  let cursosHtml = state.cursos.map(c=>{
    const als = state.alumnos[c.id]||[];
    const presentes = als.filter(a=>{const e=getAsist(c.id,a.id,hoy);return e==='P'||e==='AC'||e==='T';}).length;
    const ausentes = als.filter(a=>getAsist(c.id,a.id,hoy)==='A').length;
    return `<div class="card" style="border-left:5px solid ${c.color};cursor:pointer" onclick="goCurso('${c.id}')">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div><div style="font-weight:800;font-size:17px;color:var(--primary)">${esc(c.nombre)}</div><div style="font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px">${esc(c.orientacion)}</div></div>
        <span style="color:#ccc">${ICONS.chevR}</span>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <div style="background:#f4f6fb;border-radius:10px;padding:8px 14px;text-align:center"><div style="font-size:10px;color:#888;font-weight:600">ALUMNOS</div><div style="font-size:22px;font-weight:900;color:var(--primary)">${als.length}</div></div>
        <div style="background:#f0fff4;border-radius:10px;padding:8px 14px;text-align:center"><div style="font-size:10px;color:#27ae60;font-weight:600">PRESENTES</div><div style="font-size:22px;font-weight:900;color:#27ae60">${presentes}</div></div>
        <div style="background:#fff5f5;border-radius:10px;padding:8px 14px;text-align:center"><div style="font-size:10px;color:#e74c3c;font-weight:600">AUSENTES</div><div style="font-size:22px;font-weight:900;color:#e74c3c">${ausentes}</div></div>
      </div>
    </div>`;
  }).join('');

  return `<div class="screen">
    ${buildEmailVerificationNotice()}
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px">
      <div>
        <div style="font-size:12px;color:#888;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px">${fmtFecha(hoy)}</div>
        <div style="font-size:26px;font-weight:900;color:var(--primary);letter-spacing:-.5px">PRECEPTOR<span style="color:var(--accent)">PRO</span></div>
        <div style="font-size:15px;color:#555;margin-top:4px">${saludo()}, <strong>${esc(getVisibleUserName())}</strong>! ${emoji}</div>
        <div style="font-size:12px;color:#888;margin-top:4px">${new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})} · ${state._online?'En línea':'Sin conexión'}</div>
        <div style="font-size:12px;color:#888;margin-top:4px">Sesión: ${esc(activeUser?.nombre||activeUser?.email||'')}</div>
      </div>
      <div style="display:flex;gap:8px;padding-top:4px">
        <button style="background:none;border:none;padding:4px" onclick="goScreen('config')">${ICONS.settings}</button>
        <button style="background:none;border:none;padding:4px" onclick="goScreen('perfil')">${ICONS.user}</button>
      </div>
    </div>
    <div style="margin-bottom:14px">
      <div style="font-weight:800;font-size:18px;color:var(--primary);margin-bottom:10px">Notificaciones importantes</div>
      ${notifs || `<div class="card" style="text-align:center;color:#999">No hay notificaciones importantes por hoy.</div>`}
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;margin-top:8px">
      <div><div style="font-weight:800;font-size:18px;color:var(--primary)">Mis Cursos</div><div style="font-size:12px;color:#888">Gestión de asistencia y novedades</div></div>
      <button style="background:none;border:none;color:var(--accent);font-weight:700;font-size:13px" onclick="openModal('curso')">+ Nuevo</button>
    </div>
    ${cursosHtml}
    <div style="font-weight:800;font-size:16px;color:var(--primary);margin-bottom:12px;margin-top:4px">Accesos Rápidos</div>
    <div style="display:flex;gap:12px">
      ${[['agenda','calendar','Agenda'],['notas','notes','Notas'],['horarios','clock','Horarios']].map(([t,i,l])=>`<button onclick="navTo('${t}')" style="flex:1;background:#fff;border:none;border-radius:14px;padding:14px 10px;box-shadow:0 1px 6px rgba(0,0,0,.07);display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--accent);font-size:12px;font-weight:600">${ICONS[i]}<span style="color:#555">${l}</span></button>`).join('')}
    </div>
  </div>`;
}

function buildCurso(){
  const c = state.cursos.find(x=>x.id===state.cursoActivo);
  if(!c) return '';
  let content = '';
  if(state.cursoTab==='asistencia') content = buildAsistencia(c);
  else if(state.cursoTab==='acap') content = buildAcap(c);
  else if(state.cursoTab==='listas') content = buildListas(c);
  else if(state.cursoTab==='editar') content = buildEditar(c);
  const extraToolbar = state.cursoTab==='acap' ? `
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;gap:8px;align-items:center">
        <input id="acapSearchInput" class="inp" value="${esc(state._acapSearch||'')}" placeholder="Buscar alumno por apellido o nombre" oninput="setAcapSearch(this.value)" style="flex:1"/>
        <button onclick="setAcapFecha('${todayISO()}')" style="background:#fff;border:1px solid #ddd;border-radius:10px;padding:10px 12px;color:#555;font-weight:700;font-size:12px;white-space:nowrap">Hoy</button>
      </div>
    </div>` : state.cursoTab==='asistencia' ? `
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px">
        <input id="asistSearchInput" class="inp" value="${esc(state._asistSearch||'')}" placeholder="Buscar alumno por apellido o nombre" oninput="setAsistSearch(this.value)" style="flex:1"/>
        <button onclick="setFechaAsist('${todayISO()}')" style="background:#fff;border:1px solid #ddd;border-radius:10px;padding:10px 12px;color:#555;font-weight:700;font-size:12px;white-space:nowrap">Hoy</button>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button onclick="setAsistInitial('')" style="background:${!state._asistInitial?'var(--accent)':'#f0f0f0'};color:${!state._asistInitial?'#fff':'#666'};border:none;border-radius:9px;padding:6px 10px;font-size:11px;font-weight:700">Todas</button>
        ${'ABCDEFGHIJKLMNÑOPQRSTUVWXYZ'.split('').map(l=>`<button onclick="setAsistInitial('${l}')" style="background:${state._asistInitial===l?'var(--accent)':'#f0f0f0'};color:${state._asistInitial===l?'#fff':'#666'};border:none;border-radius:9px;padding:6px 8px;font-size:11px;font-weight:700">${l}</button>`).join('')}
      </div>
    </div>` : '';

  return `<div>
    <div style="padding:16px 16px 0;position:sticky;top:0;background:var(--bg);z-index:10">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:12px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:1px">${fmtFecha(todayISO()).split(',')[0]}</span>
        <span style="font-weight:900;color:var(--accent);font-size:13px">PRECEPTOR<span style="color:var(--primary)">PRO</span></span>
      </div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
        <button class="back-btn" onclick="goHome()">${ICONS.back}</button>
        <div style="flex:1;min-width:0">
          <div style="font-weight:800;font-size:20px;color:var(--primary)">${esc(c.nombre)}</div>
          <div style="font-size:11px;color:#888;font-weight:700">${esc(c.orientacion||'')} · ${state.cursoTab.toUpperCase()}</div>
        </div>
      </div>
      <div class="tabs">
        ${['asistencia','acap','listas','editar'].map(t=>`<button class="tab-btn ${state.cursoTab===t?'active':''}" onclick="setCursoTab('${t}')">${t.toUpperCase()}</button>`).join('')}
      </div>
    </div>
    <div style="padding:0 16px 90px">${extraToolbar}${content}</div>
  </div>`;
}

// ---- ASISTENCIA ----
function buildAsistencia(c){
  const als = visibleAsistAlumnos(c.id, state.alumnos[c.id]||[]);
  const vista = state.vistaAsist;
  const fecha = state.fechaAsist;

  let vistaHtml = '';
  if(vista==='dia') vistaHtml = buildVistaDia(c, als, fecha);
  else if(vista==='semana') vistaHtml = buildVistaSemana(c, als, fecha);
  else vistaHtml = buildVistaMes(c, als, fecha);

  return `
    <div class="vista-sel">
      ${['dia','semana','mes'].map(v=>`<button class="vista-btn ${vista===v?'active':''}" onclick="setVista('${v}')">${v.toUpperCase()}</button>`).join('')}
    </div>
    ${vistaHtml}`;
}

function buildVistaDia(c, als, fecha){
  const alsOrd = [...als];
  const colores = {P:'#27ae60',A:'#e74c3c',J:'#2980b9',S:'#1a1a2e',T:'#8e44ad',AC:'#e67e22'};
  const labels = {P:'Presente',A:'Ausente',J:'Justificado',S:'Suspendido',T:'Tarde',AC:'ACAP'};
  const visible = alsOrd.slice(0, state._asistLimit||40);
  const selectedCount = selectedAsistCount(c.id, fecha);

  let rows = visible.map((a,i)=>{
    const acap = getAcap(c.id,a.id,fecha);
    const cur = getAsist(c.id,a.id,fecha);
    const bg = acap ? '#fff8e1' : '#fff';
    const border = acap ? '1px solid #f39c12' : '1px solid transparent';
    const col = cur ? colores[cur]||'#888' : '#ccc';
    const estadoLabel = cur ? labels[cur]||cur : '—';
    const rowId = `row_${c.id}_${a.id}`;
    const selectKey = `${c.id}_${fecha}_${a.id}`;
    const obs = getAsistObs(c.id,a.id,fecha);
    // Expandable buttons
    const btns = ['P','A','J','S','T','AC'].map(e=>{
      const isActive = cur===e;
      return `<button class="asist-btn ${isActive?'active-'+e:''}" onclick="toggleAsist('${c.id}','${a.id}','${fecha}','${e}');toggleAsistRow('${rowId}')" title="${labels[e]}">${e}</button>`;
    }).join('');
    return `<div id="${rowId}" style="background:${bg};border-radius:14px;padding:12px 14px;margin-bottom:10px;box-shadow:0 1px 5px rgba(0,0,0,.06);border:${border}">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="display:flex;align-items:flex-start;gap:8px;flex:1;min-width:0">
          <input type="checkbox" ${state._asistSelected?.[selectKey]?'checked':''} onchange="toggleAsistSelect('${selectKey}')" style="margin-top:2px"/>
          <span style="font-weight:700;font-size:13px;color:${acap?'#e67e22':'var(--primary)'}">${i+1}. ${esc(a.nombre)}</span>
          <div>
            ${acap?`<div style="font-size:11px;color:#e67e22">💼 ACAP: ${esc(acap.empresa||'')} ${esc(acap.horario||'')}</div>`:''}
            ${fecha===todayISO() && (cur==='AC' || acap)?`<div style="font-size:10px;color:#e67e22;font-weight:800;margin-top:2px">HOY</div>`:''}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          ${cur?`<span style="font-size:12px;font-weight:800;color:${col};background:${col}18;border-radius:8px;padding:4px 10px">${estadoLabel}</span>`:''}
          <button onclick="toggleAsistRow('${rowId}')" style="background:${cur?col:'#f0f0f0'};border:none;border-radius:10px;padding:6px 12px;font-weight:800;font-size:13px;color:${cur?'#fff':'#888'};min-width:44px">
            ${cur||'·'}
          </button>
        </div>
      </div>
      <div class="asist-expand" id="exp_${rowId}">
        ${btns}
        ${cur?`<button onclick="toggleAsist('${c.id}','${a.id}','${fecha}',null);toggleAsistRow('${rowId}')" style="padding:6px 12px;border-radius:9px;border:1.5px solid #e0e0e0;background:#fff;font-size:11px;font-weight:700;color:#999">Limpiar</button>`:''}
        <input class="inp" value="${esc(obs)}" placeholder="Observación" oninput="handleObsInput('${c.id}','${a.id}','${fecha}',this.value)" style="flex:1;min-width:180px;font-size:12px;padding:8px 10px"/>
        <button onclick="copiarObsASeleccionados('${c.id}','${a.id}','${fecha}')" style="padding:6px 12px;border-radius:9px;border:1.5px solid #cfe0ff;background:#eff3ff;font-size:11px;font-weight:700;color:var(--accent)">Copiar obs.</button>
      </div>
    </div>`;
  }).join('');

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-size:11px;color:#888;font-weight:600">Tocá el botón para marcar</div>
      <div style="display:flex;align-items:center;gap:6px">
        <button onclick="setFechaAsist('${addDays(fecha,-1)}')" style="background:#fff;border:none;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.1)">${ICONS.chevL}</button>
        <span style="font-size:13px;font-weight:700;color:var(--primary);min-width:90px;text-align:center">${p2(isoToDate(fecha).getDate())}/${p2(isoToDate(fecha).getMonth()+1)}/${isoToDate(fecha).getFullYear()}</span>
        <button onclick="setFechaAsist('${addDays(fecha,1)}')" style="background:#fff;border:none;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.1)">${ICONS.chevR}</button>
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
      <button onclick="confirmMarcarTodosPresentes('${c.id}','${fecha}')" style="background:#effaf3;border:1px solid #b9e3c6;border-radius:10px;padding:8px 12px;color:#1f7a3f;font-weight:700;font-size:12px">Marcar todos presentes</button>
      <button onclick="toggleSoloConAcap()" style="background:${state._asistOnlyAcap?'#fff8e1':'#f0f0f0'};border:1px solid ${state._asistOnlyAcap?'#f39c12':'#ddd'};border-radius:10px;padding:8px 12px;color:${state._asistOnlyAcap?'#e67e22':'#666'};font-weight:700;font-size:12px">Solo con ACAP</button>
      <span style="font-size:12px;color:#666;font-weight:700;align-self:center">Visibles: ${alsOrd.length}</span>
      <span style="font-size:12px;color:#666;font-weight:700;align-self:center">Seleccionados: ${selectedCount}</span>
      ${(state._asistSearch||state._asistInitial||state._asistOnlyAcap)?`<button onclick="limpiarFiltrosAsistencia()" style="background:#fff;border:1px solid #ddd;border-radius:10px;padding:8px 12px;color:#555;font-weight:700;font-size:12px">Limpiar filtros</button>`:''}
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">
      ${Object.entries(colores).map(([k,v])=>`<span style="font-size:11px;font-weight:700;color:${v};background:${v}18;border-radius:6px;padding:3px 8px">${k}=${labels[k]}</span>`).join('')}
    </div>
    ${rows || `<div class="card" style="text-align:center;color:#aaa">No hay alumnos para este filtro</div>`}
    ${alsOrd.length > visible.length ? `<button onclick="cargarMasAsistencia()" class="btn-ghost">Cargar más (${alsOrd.length-visible.length} restantes)</button>` : ''}`;
}

function buildVistaSemana(c, als, fecha){
  const lunes = startOfWeek(fecha);
  const dias = Array.from({length:5},(_,i)=>addDays(lunes,i));
  const colores = {P:'#27ae60',A:'#e74c3c',J:'#2980b9',S:'#1a1a2e',T:'#8e44ad',AC:'#e67e22'};
  const alsOrd = [...als].sort((a,b)=>a.nombre.localeCompare(b.nombre));
  const hoy = todayISO();

  const thead = `<tr style="background:#f4f6fb"><th style="text-align:left;font-size:11px;color:#888;padding:8px;min-width:120px">ALUMNO</th>${dias.map(d=>`<th style="font-size:11px;color:${d===hoy?'#fff':'#888'};background:${d===hoy?'var(--accent)':'transparent'};border-radius:6px;padding:6px 8px;min-width:44px">${p2(isoToDate(d).getDate())}/${p2(isoToDate(d).getMonth()+1)}</th>`).join('')}</tr>`;
  const tbody = alsOrd.map((a,i)=>{
    const celdas = dias.map(d=>{
      const est = getAsist(c.id,a.id,d);
      const col = est ? colores[est]||'#aaa' : '#ccc';
      return `<td style="padding:8px;text-align:center"><span style="font-weight:800;color:${col};font-size:14px">${est||'—'}</span></td>`;
    }).join('');
    return `<tr style="border-bottom:1px solid #f0f0f0"><td style="padding:8px 6px;font-size:11px;font-weight:600;color:var(--primary)">${i+1}. ${esc(a.nombre)}</td>${celdas}</tr>`;
  }).join('');

  const lunesD = isoToDate(lunes);
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <button onclick="setFechaAsist('${addDays(lunes,-7)}')" style="background:#fff;border:none;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.1)">${ICONS.chevL}</button>
      <span style="font-size:13px;font-weight:700;color:var(--primary)">Semana ${lunesD.getDate()}/${lunesD.getMonth()+1}</span>
      <button onclick="setFechaAsist('${addDays(lunes,7)}')" style="background:#fff;border:none;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.1)">${ICONS.chevR}</button>
    </div>
    <div class="tbl-wrap"><table>${thead}<tbody>${tbody}</tbody></table></div>`;
}

function buildVistaMes(c, als, fecha){
  const d = isoToDate(fecha);
  const y = d.getFullYear(), m = d.getMonth();
  const dias = daysInMonth(y,m);
  const colores = {P:'#27ae60',A:'#e74c3c',J:'#2980b9',S:'#1a1a2e',T:'#8e44ad',AC:'#e67e22'};
  const alsOrd = [...als].sort((a,b)=>a.nombre.localeCompare(b.nombre));
  const hoy = todayISO();

  const thead = `<tr style="background:#f4f6fb"><th style="text-align:left;font-size:10px;color:#888;padding:6px;min-width:90px">ALUMNO</th>${Array.from({length:dias},(_,i)=>`<th style="font-size:10px;padding:4px;min-width:22px;color:${`${y}-${p2(m+1)}-${p2(i+1)}`===hoy?'var(--accent)':'#888'};font-weight:${`${y}-${p2(m+1)}-${p2(i+1)}`===hoy?800:400}">${i+1}</th>`).join('')}</tr>`;
  const tbody = alsOrd.map((a,i)=>{
    const celdas = Array.from({length:dias},(_,j)=>{
      const iso=`${y}-${p2(m+1)}-${p2(j+1)}`;
      const est=getAsist(c.id,a.id,iso);
      const col=est?colores[est]:'#e0e0e0';
      return `<td style="padding:3px;text-align:center;background:${est==='A'?'#fff5f5':'transparent'}"><span style="font-weight:800;color:${col};font-size:11px">${est||'—'}</span></td>`;
    }).join('');
    return `<tr style="border-bottom:1px solid #f0f0f0"><td style="padding:6px;font-size:11px;font-weight:600;color:var(--primary);white-space:nowrap">${i+1}. ${esc(a.nombre.split(',')[0])}</td>${celdas}</tr>`;
  }).join('');

  const prev = m===0?`${y-1}-12-01`:`${y}-${p2(m)}-01`;
  const next = m===11?`${y+1}-01-01`:`${y}-${p2(m+2)}-01`;

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <button onclick="setFechaAsist('${prev}')" style="background:#fff;border:none;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.1)">${ICONS.chevL}</button>
      <span style="font-size:13px;font-weight:700;color:var(--primary)">${MESES[m]} ${y}</span>
      <button onclick="setFechaAsist('${next}')" style="background:#fff;border:none;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.1)">${ICONS.chevR}</button>
    </div>
    <div class="tbl-wrap"><table>${thead}<tbody>${tbody}</tbody></table></div>`;
}

function buildAcap(c){
  const als = (state.alumnos[c.id]||[]).filter(a=>normalizeDia(a.nombre).includes(normalizeDia(state._acapSearch||'')));
  const f = state._acapFecha||todayISO();
  if(!state._acapFecha) state._acapFecha = todayISO();
  const currentMonth = isoToDate(f);
  const monthDays = daysInMonth(currentMonth.getFullYear(), currentMonth.getMonth());
  const acapDaysThisMonth = new Set(
    getAcapRowsForCurso(c.id, {})
      .map(r=>r.fecha)
      .filter(fecha=>fecha.startsWith(`${currentMonth.getFullYear()}-${p2(currentMonth.getMonth()+1)}-`))
  );
  const totalConAcap = (state.alumnos[c.id]||[]).filter(a=>getAcapEntriesForAlumno(c.id,a.id,{desde:state._acapDesde,hasta:state._acapHasta}).length>0).length;

  const rows = als.map((a,i)=>{
    const acap = getAcap(c.id,a.id,f)||{};
    const tiene = !!(acap.empresa||acap.horario);
    const openKey = `${c.id}_${a.id}`;
    const isOpen = !!state._acapOpen?.[openKey];
    const entries = getAcapEntriesForAlumno(c.id, a.id, {desde:state._acapDesde, hasta:state._acapHasta});
    const totalDias = entries.length;
    const acapFechas = entries
      .map(({fecha,data:v})=>{
        return `<div style="background:#fff;border-radius:10px;padding:8px 10px;border:1px solid #f3d38a">
          <div style="font-size:11px;font-weight:800;color:#e67e22">${p2(isoToDate(fecha).getDate())}/${p2(isoToDate(fecha).getMonth()+1)}/${isoToDate(fecha).getFullYear()}</div>
          <div style="font-size:12px;color:var(--primary);margin-top:2px">${esc(v.empresa||'Sin empresa')}</div>
          <div style="font-size:11px;color:#777;margin-top:2px">${esc(v.horario||'Sin horario')}</div>
        </div>`;
      }).join('');
    return `<div style="background:${tiene?'#fff8e1':'#fff'};border-radius:14px;padding:12px 14px;margin-bottom:10px;box-shadow:0 1px 5px rgba(0,0,0,.06);border:${tiene?'1px solid #f39c12':'1px solid transparent'}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px">
        <button onclick="toggleAcapAlumno('${openKey}')" style="flex:1;background:none;border:none;padding:0;display:flex;align-items:center;justify-content:space-between;gap:10px;text-align:left;min-width:0">
          <span style="font-weight:700;font-size:13px;color:${tiene?'#e67e22':'var(--primary)'};min-width:0">${i+1}. ${esc(a.nombre)}</span>
          <span style="font-size:14px;color:${tiene?'#e67e22':'#888'};font-weight:800;flex-shrink:0">${isOpen?'▼':'▶'}</span>
        </button>
        <button onclick="exportarAcapAlumnoPDF('${c.id}','${a.id}')" style="background:#fff;border:1px solid #ddd;border-radius:10px;padding:8px 12px;color:#555;font-weight:700;font-size:12px;white-space:nowrap;flex-shrink:0">Exportar PDF</button>
      </div>
      <div style="font-size:11px;color:#888;font-weight:700;margin:-4px 0 10px">Total: ${totalDias} día${totalDias===1?'':'s'}</div>
      ${isOpen && acapFechas ? `<div style="margin-bottom:10px">
        <div style="font-size:11px;color:#888;font-weight:700;margin-bottom:6px">FECHAS CARGADAS</div>
        <div style="display:flex;flex-direction:column;gap:6px">${acapFechas}</div>
      </div>` : ''}
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <input id="acap_h_${a.id}" class="inp" placeholder="Horario (ej: 14 a 16)" value="${esc(acap.horario||'')}" style="flex:1;font-size:12px;padding:8px 10px"/>
        <input id="acap_e_${a.id}" class="inp" placeholder="Lugar / Empresa" value="${esc(acap.empresa||'')}" style="flex:1;font-size:12px;padding:8px 10px"/>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:stretch">
        <button onclick="saveAcap('${c.id}','${a.id}')" style="flex:1 1 140px;background:var(--accent);border:none;border-radius:10px;padding:8px;color:#fff;font-weight:700;font-size:12px">Guardar</button>
        <button onclick="openAcapFechasModal('${c.id}','${a.id}')" style="flex:1 1 110px;background:#eff3ff;border:1px solid #cfe0ff;border-radius:10px;padding:8px 12px;color:var(--accent);font-weight:700;font-size:12px">Fechas</button>
        <button onclick="openAcapCopyModal('${c.id}','${a.id}')" style="flex:1 1 130px;background:#f8f9fa;border:1px solid #dcdfe6;border-radius:10px;padding:8px 12px;color:#555;font-weight:700;font-size:12px">Copiar fechas</button>
        <button onclick="copiarAcapAlPortapapeles('${c.id}','${a.id}')" style="flex:1 1 100px;background:#f8f9fa;border:1px solid #dcdfe6;border-radius:10px;padding:8px 12px;color:#555;font-weight:700;font-size:12px">Copiar</button>
        <button onclick="pegarAcapDesdePortapapeles('${c.id}','${a.id}')" style="flex:1 1 100px;background:${state._acapClipboard?'#effaf3':'#f3f3f3'};border:1px solid ${state._acapClipboard?'#b9e3c6':'#ddd'};border-radius:10px;padding:8px 12px;color:${state._acapClipboard?'#1f7a3f':'#999'};font-weight:700;font-size:12px">Pegar</button>
        ${tiene?`<button onclick="clearAcap('${c.id}','${a.id}')" style="flex:1 1 100px;background:#fff0f0;border:1px solid #e74c3c;border-radius:10px;padding:8px 12px;color:#e74c3c;font-weight:700;font-size:12px">Borrar</button>`:''}

  return `

      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px">
        <div>
          <div style="font-weight:800;color:var(--primary);font-size:16px">ACAP del curso</div>
          <div style="font-size:12px;color:#555;margin-top:4px">Cargá empresa y horario por alumno. Al guardar se marca automáticamente como AC en asistencia.</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button onclick="openAcapPasteMultiModal('${c.id}')" style="flex:1 1 160px;background:#f8f9fa;border:1px solid #dcdfe6;border-radius:12px;padding:12px;color:#555;font-weight:700;font-size:13px">Pegar en varios alumnos</button>
        <button onclick="exportarAcapCursoExcel('${c.id}')" style="flex:1 1 140px;background:#eff3ff;border:1px solid #cfe0ff;border-radius:12px;padding:12px;color:var(--accent);font-weight:700;font-size:13px">Exportar Excel</button>
        <button onclick="crearBackupManualAcap()" style="flex:1 1 140px;background:#fff;border:1px solid #ddd;border-radius:12px;padding:12px;color:#555;font-weight:700;font-size:13px">Crear backup</button>
      </div>
    </div>
    <div class="card" style="margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;gap:10px">
      <div style="font-size:13px;color:#555;font-weight:700">Alumnos con ACAP: ${totalConAcap}</div>
      <div style="font-size:11px;color:#888;text-align:right">Última modificación: ${fmtDateTime(state._lastModified)}</div>
    </div>
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;gap:8px">
        <div style="flex:1">
          <label>FECHA DESDE</label>
          <input type="date" class="inp" value="${state._acapDesde||''}" onchange="setAcapRange(this.value,'${state._acapHasta||''}')"/>
        </div>
        <div style="flex:1">
          <label>FECHA HASTA</label>
          <input type="date" class="inp" value="${state._acapHasta||''}" onchange="setAcapRange('${state._acapDesde||''}',this.value)"/>

      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
      <button onclick="setAcapFecha('${addDays(f,-1)}')" style="background:#fff;border:none;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.1)">${ICONS.chevL}</button>
      <input type="date" value="${f}" class="inp" style="flex:1;font-weight:600" onchange="setAcapFecha(this.value)"/>
      <button onclick="setAcapFecha('${addDays(f,1)}')" style="background:#fff;border:none;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.1)">${ICONS.chevR}</button>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">
      ${Array.from({length:monthDays},(_,idx)=>{
        const iso = `${currentMonth.getFullYear()}-${p2(currentMonth.getMonth()+1)}-${p2(idx+1)}`;
        const hasAcap = acapDaysThisMonth.has(iso);
        const isSelected = iso===f;
        return `<button onclick="setAcapFecha('${iso}')" style="width:34px;height:34px;border-radius:8px;border:1px solid ${hasAcap?'#f39c12':'#ddd'};background:${isSelected?'#f39c12':hasAcap?'#fff8e1':'#fff'};color:${isSelected?'#fff':hasAcap?'#e67e22':'#888'};font-size:11px;font-weight:800">${idx+1}</button>`;
      }).join('')}
    </div>
    ${rows || `<div style="text-align:center;padding:30px 20px;color:#aaa"><div style="font-size:14px">No hay alumnos para este filtro</div></div>`}`;
}

function buildListas(c){
  // Fix: use undefined check properly
  if(state._listaActiva !== null && state._listaActiva !== undefined){
    return buildListaDetalle(c);
  }
  const lsts = state.listas[c.id]||[];
  const globalLists = state.listasGlobales||[];
  let html = `<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:16px">
    <span style="font-weight:700;font-size:15px;color:var(--primary)">Listas personalizadas</span>
    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end">
      <button style="background:#eff3ff;border:none;border-radius:10px;padding:8px 12px;color:var(--accent);font-weight:700;font-size:13px" onclick="${isPremiumPlan() ? `openModal('lista',{modo:'global'})` : `openModal('premiumPlan')`}">+ Global</button>
      <button style="background:var(--accent);border:none;border-radius:10px;padding:8px 14px;color:#fff;font-weight:700;font-size:13px" onclick="openModal('lista',{modo:'curso'})">+ Nueva</button>
    </div>
  </div>`;
  html += `<div style="font-size:12px;color:#888;font-weight:700;margin-bottom:10px">LISTAS DEL CURSO</div>`;
  if(!lsts.length) html+=`<div style="text-align:center;padding:24px 20px;color:#aaa"><div style="font-size:32px">📋</div><div style="margin-top:10px;font-size:14px">No hay listas de este curso</div></div>`;
  lsts.forEach((l,i)=>{
    const totalChecks = Object.values(l.checks||{}).filter(Boolean).length;
    const totalPosibles = (state.alumnos[c.id]||[]).length * (l.columnas||[]).length;
    html+=`<div class="card" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center" onclick="setListaActiva(${i})">
      <div style="flex:1">
        <div style="font-weight:700;color:var(--primary);font-size:14px">${esc(l.nombre)}</div>
        <div style="font-size:12px;color:#888;margin-top:2px">${(l.columnas||[]).join(' · ')}</div>
        <div style="font-size:11px;color:var(--accent);margin-top:4px;font-weight:600">${totalChecks} / ${totalPosibles} marcados</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button onclick="event.stopPropagation();borrarLista(${i})" style="background:none;border:none;color:#e74c3c;padding:6px">${ICONS.trash}</button>
        <span style="color:#ccc">${ICONS.chevR}</span>
      </div>
    </div>`;
  });
  html += `<div style="font-size:12px;color:#888;font-weight:700;margin:18px 0 10px">LISTAS GLOBALES</div>`;
  if(!globalLists.length) html+=`<div style="text-align:center;padding:24px 20px;color:#aaa"><div style="font-size:32px">🌐</div><div style="margin-top:10px;font-size:14px">No hay listas globales</div></div>`;
  globalLists.forEach((l,i)=>{
    const totalChecks = Object.values(l.checks||{}).filter(Boolean).length;
    const totalPosibles = (l.miembros||[]).length * (l.columnas||[]).length;
    html+=`<div class="card" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center" onclick="setListaActiva({modo:'global',index:${i}})">
      <div style="flex:1">
        <div style="font-weight:700;color:var(--primary);font-size:14px">${esc(l.nombre)}</div>
        <div style="font-size:12px;color:#888;margin-top:2px">${(l.columnas||[]).join(' · ')}</div>
        <div style="font-size:11px;color:var(--accent);margin-top:4px;font-weight:600">${(l.miembros||[]).length} alumnos · ${totalChecks} / ${totalPosibles} marcados</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button onclick="event.stopPropagation();borrarListaGlobal(${i})" style="background:none;border:none;color:#e74c3c;padding:6px">${ICONS.trash}</button>
        <span style="color:#ccc">${ICONS.chevR}</span>
      </div>
    </div>`;
  });
  return html;
}

function buildListaDetalle(c){
  const active = state._listaActiva;
  const isGlobal = typeof active === 'object' && active?.modo === 'global';
  const i = isGlobal ? active.index : active;
  const lista = isGlobal ? (state.listasGlobales||[])[i] : (state.listas[c.id]||[])[i];
  if(!lista) return '';
  const miembros = isGlobal
    ? (lista.miembros||[])
        .map(ref=>{
          const curso = state.cursos.find(x=>x.id===ref.cursoId);
          const alumno = (state.alumnos[ref.cursoId]||[]).find(a=>a.id===ref.alumnoId);
          return alumno && curso ? {curso, alumno} : null;
        })
        .filter(Boolean)
    : (state.alumnos[c.id]||[]).map(alumno=>({curso:c, alumno}));

function buildHorarioGrilla(){
  const c = state.cursos.find(x=>x.id===state._horCurso);

  const hor = state.horarios[c.id]||{};
  const horas = getHorasInstitucion();
  const thead = `<tr><th style="padding:8px 10px;background:#f4f6fb;font-size:12px;color:#888;font-weight:700;text-align:left;min-width:100px">HORA</th>${DIAS.map(d=>`<th style="padding:8px 6px;background:#f4f6fb;font-size:11px;color:#888;font-weight:700;min-width:80px">${d}</th>`).join('')}</tr>`;
  const tbody = horas.map((hora,hi)=>{
    const isContra = hora==='CONTRATURNO';

        ${cell.materia?`<div style="background:${isContra?'#fff0cc':'#f4f6fb'};border-radius:8px;padding:6px 4px;font-size:11px"><div style="font-weight:700;color:var(--primary)">${esc(cell.materia)}</div><div style="color:#888;font-size:10px">${esc(cell.profesor||'')}</div></div>`:`<div style="color:#ddd;font-size:18px;text-align:center">···</div>`}

      <td style="padding:8px 10px;font-size:${isContra?13:12}px;font-weight:${isContra?800:600};color:${isContra?'#e67e22':'var(--primary)'};white-space:nowrap">${hora}</td>

  return `<div class="screen">

    </div>
