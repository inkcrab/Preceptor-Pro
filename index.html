<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Preceptor Pro v31</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-active { background: white; color: #2563eb; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; }
    </style>
</head>
<body class="bg-[#f2f2f7] text-[#1c1c1e]">

    <div id="app" class="max-w-md mx-auto min-h-screen pb-32">
        <!-- Header -->
        <header class="p-6 pt-10">
            <p id="header-date" class="text-[10px] font-black text-blue-600 uppercase tracking-tighter mb-1"></p>
            <h1 class="text-3xl font-black italic uppercase tracking-tighter">PRECEPTOR <span class="text-blue-600">PRO</span></h1>
            <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest italic mt-1">Versión Local Estable</p>
        </header>

        <!-- Vistas -->
        <div id="view-home" class="px-4 space-y-4">
            <div class="flex justify-between items-center px-2">
                <p class="text-[10px] font-black text-gray-400 uppercase italic">Mis Cursos</p>
            </div>
            <div id="course-list" class="space-y-4"></div>
        </div>

        <div id="view-course" class="hidden px-4 space-y-4">
            <div class="flex items-center gap-4 mb-4">
                <button onclick="showView('home')" class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm text-blue-600 font-bold border border-gray-100">←</button>
                <h2 id="current-course-title" class="text-xl font-black italic uppercase"></h2>
            </div>
            
            <div class="flex bg-gray-200/50 p-1 rounded-2xl gap-1">
                <button onclick="setSubView('asis')" id="btn-sub-asis" class="flex-1 py-3 rounded-xl text-[9px] font-black uppercase transition-all tab-active">Asistencia</button>
                <button onclick="setSubView('edit')" id="btn-sub-edit" class="flex-1 py-3 rounded-xl text-[9px] font-black uppercase transition-all">Alumnos</button>
            </div>

            <div id="sub-asis" class="space-y-4">
                <div class="flex justify-center">
                    <input type="date" id="current-date" onchange="renderAsis()" class="text-[11px] font-black uppercase text-blue-600 bg-white px-6 py-2 rounded-full border shadow-sm outline-none">
                </div>
                <div id="students-container" class="space-y-3"></div>
            </div>

            <div id="sub-edit" class="hidden bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <p class="text-[10px] font-black text-gray-400 mb-4 uppercase italic text-center">Pegar lista de alumnos (uno por línea)</p>
                <textarea id="import-area" class="w-full bg-gray-50 p-4 rounded-xl text-xs font-bold border-none h-40 mb-4 outline-none focus:ring-2 ring-blue-100" placeholder="01 ALVAREZ..."></textarea>
                <button onclick="saveStudents()" class="w-full bg-blue-600 text-white py-4 rounded-xl text-[10px] font-black uppercase shadow-lg">Guardar Lista</button>
            </div>
        </div>

        <div id="view-schedule" class="hidden px-4 space-y-6">
            <h2 class="text-xl font-black italic uppercase px-2">Horarios</h2>
            <div class="bg-white rounded-2xl border overflow-x-auto shadow-sm">
                <table class="w-full text-[10px] text-center">
                    <thead class="bg-gray-50 font-black uppercase border-b text-gray-400">
                        <tr><th class="p-2 border-r">Hora</th><th>Lun</th><th>Mar</th><th>Mie</th><th>Jue</th><th>Vie</th></tr>
                    </thead>
                    <tbody id="schedule-body"></tbody>
                </table>
            </div>

            <h2 class="text-xl font-black italic uppercase px-2 text-blue-600">Contraturno</h2>
            <div class="bg-white rounded-2xl border overflow-x-auto shadow-sm mb-10">
                <table class="w-full text-[10px] text-center">
                    <thead class="bg-blue-50 font-black uppercase border-b text-blue-400">
                        <tr><th class="p-2 border-r">Hora</th><th>Lun</th><th>Mar</th><th>Mie</th><th>Jue</th><th>Vie</th></tr>
                    </thead>
                    <tbody id="contraturno-body"></tbody>
                </table>
            </div>
        </div>

        <div id="view-notes" class="hidden px-4 space-y-6">
            <h2 class="text-xl font-black italic uppercase px-2">Notas</h2>
            <div class="bg-white p-6 rounded-3xl shadow-sm border">
                <textarea id="note-input" class="w-full bg-gray-50 p-4 rounded-xl text-xs font-bold h-32 mb-3 outline-none" placeholder="Escribir nota..."></textarea>
                <button onclick="addNote()" class="w-full bg-blue-600 text-white py-3 rounded-xl text-[10px] font-black uppercase">Guardar Nota</button>
            </div>
            <div id="notes-list" class="space-y-4"></div>
        </div>

        <!-- Navegación -->
        <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] bg-white/90 backdrop-blur-md rounded-full p-2 flex justify-around shadow-2xl border border-gray-200 z-50">
            <button onclick="showView('home')" class="nav-btn p-3 text-blue-600 flex flex-col items-center">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
                <span class="text-[7px] font-black uppercase mt-1">Inicio</span>
            </button>
            <button onclick="showView('schedule')" class="nav-btn p-3 text-gray-400 flex flex-col items-center">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span class="text-[7px] font-black uppercase mt-1">Horarios</span>
            </button>
            <button onclick="showView('notes')" class="nav-btn p-3 text-gray-400 flex flex-col items-center">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                <span class="text-[7px] font-black uppercase mt-1">Notas</span>
            </button>
        </nav>
    </div>

    <script>
        // --- ESTADO ---
        let state = JSON.parse(localStorage.getItem('preceptor_pro_db')) || {
            courses: ["5° A BOEA", "5° B BOEA", "5° A BOI"],
            students: {
                "5° A BOEA": ["01 ALVAREZ, JUAN", "02 BENITEZ, LUZ"],
                "5° B BOEA": ["01 GOMEZ, MARCELO", "02 LOPEZ, FLOR"],
                "5° A BOI": ["01 SOSA, CRISTIAN", "02 VACA, SERGIO"]
            },
            attendance: {},
            schedule: {},
            contraturno: {},
            notes: []
        };

        let currentCourse = null;
        let currentView = 'home';

        // --- INICIO ---
        window.onload = () => {
            const now = new Date();
            document.getElementById('header-date').innerText = now.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' }).toUpperCase();
            document.getElementById('current-date').value = now.toISOString().split('T')[0];
            renderHome();
            renderSchedule();
            renderContraturno();
        };

        function save() {
            localStorage.setItem('preceptor_pro_db', JSON.stringify(state));
        }

        // --- NAVEGACION ---
        function showView(v) {
            document.querySelectorAll('#app > div[id^="view-"]').forEach(el => el.classList.add('hidden'));
            document.getElementById('view-' + v).classList.remove('hidden');
            currentView = v;
            if(v === 'home') renderHome();
            if(v === 'notes') renderNotes();
            
            // Actualizar iconos
            document.querySelectorAll('.nav-btn').forEach((btn, idx) => {
                btn.classList.remove('text-blue-600');
                btn.classList.add('text-gray-400');
            });
        }

        function setSubView(sv) {
            document.getElementById('sub-asis').classList.toggle('hidden', sv !== 'asis');
            document.getElementById('sub-edit').classList.toggle('hidden', sv !== 'edit');
            document.getElementById('btn-sub-asis').classList.toggle('tab-active', sv === 'asis');
            document.getElementById('btn-sub-edit').classList.toggle('tab-active', sv === 'edit');
        }

        // --- RENDERIZADO ---
        function renderHome() {
            const list = document.getElementById('course-list');
            list.innerHTML = state.courses.map(c => `
                <div onclick="openCourse('${c}')" class="p-8 rounded-3xl bg-white shadow-sm border-l-8 border-blue-500 flex justify-between items-center active:scale-95 transition-all">
                    <h2 class="text-xl font-black italic uppercase">${c}</h2>
                    <span class="text-blue-500 font-bold">→</span>
                </div>
            `).join('');
        }

        function openCourse(c) {
            currentCourse = c;
            document.getElementById('current-course-title').innerText = c;
            showView('course');
            setSubView('asis');
            renderAsis();
        }

        function renderAsis() {
            const date = document.getElementById('current-date').value;
            const container = document.getElementById('students-container');
            const students = state.students[currentCourse] || [];
            
            container.innerHTML = students.map(s => {
                const currentStatus = (state.attendance[date] && state.attendance[date][currentCourse]) ? state.attendance[date][currentCourse][s] : '';
                return `
                    <div class="bg-white p-4 rounded-2xl flex flex-col gap-3 shadow-sm border border-gray-50">
                        <div class="text-[10px] font-black uppercase italic text-gray-700">${s}</div>
                        <div class="flex gap-1 justify-end">
                            ${['P','A','J','ACAP','S'].map(opt => `
                                <button onclick="setAsis('${s}', '${opt}')" class="px-2 h-10 rounded-xl text-[9px] font-black border transition-all ${currentStatus === opt ? 'bg-blue-600 border-blue-600 text-white' : 'bg-gray-50 text-gray-300 border-gray-100'}">
                                    ${opt}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function setAsis(student, status) {
            const date = document.getElementById('current-date').value;
            if(!state.attendance[date]) state.attendance[date] = {};
            if(!state.attendance[date][currentCourse]) state.attendance[date][currentCourse] = {};
            
            state.attendance[date][currentCourse][student] = (state.attendance[date][currentCourse][student] === status) ? '' : status;
            save();
            renderAsis();
        }

        function saveStudents() {
            const val = document.getElementById('import-area').value;
            if(!val) return;
            state.students[currentCourse] = val.split('\n').map(x => x.trim()).filter(x => x.length > 0);
            save();
            setSubView('asis');
            renderAsis();
        }

        function renderSchedule() {
            const hours = ["12:30", "13:10", "13:50", "14:40", "15:20", "16:00", "16:50", "17:30"];
            const body = document.getElementById('schedule-body');
            body.innerHTML = hours.map((h, i) => `
                <tr class="border-b last:border-0">
                    <td class="p-2 bg-gray-50 font-black border-r">${h}</td>
                    ${[0,1,2,3,4].map(d => {
                        const key = `h_${d}_${i}`;
                        const val = state.schedule[key] || '';
                        return `<td class="p-1 border-r">
                            <input onchange="saveSch('${key}', this.value)" value="${val}" class="w-full text-center text-[9px] font-bold uppercase bg-transparent outline-none" placeholder="-">
                        </td>`;
                    }).join('')}
                </tr>
            `).join('');
        }

        function saveSch(key, val) {
            state.schedule[key] = val;
            save();
        }

        function renderContraturno() {
            const body = document.getElementById('contraturno-body');
            body.innerHTML = [0,1,2].map(i => `
                <tr class="border-b">
                    <td class="p-1 bg-blue-50 border-r">
                        <input onchange="saveCt('time_${i}', this.value)" value="${state.contraturno['time_'+i] || ''}" class="w-full text-center font-black text-gray-600 bg-transparent outline-none" placeholder="00:00">
                    </td>
                    ${[0,1,2,3,4].map(d => {
                        const key = `ct_${d}_${i}`;
                        const val = state.contraturno[key] || '';
                        return `<td class="p-1 border-r">
                            <input onchange="saveCt('${key}', this.value)" value="${val}" class="w-full text-center text-[9px] font-bold uppercase bg-transparent outline-none" placeholder="-">
                        </td>`;
                    }).join('')}
                </tr>
            `).join('');
        }

        function saveCt(key, val) {
            state.contraturno[key] = val;
            save();
        }

        function renderNotes() {
            const list = document.getElementById('notes-list');
            list.innerHTML = state.notes.slice().reverse().map(n => `
                <div class="bg-white p-6 rounded-3xl border shadow-sm">
                    <p class="text-xs font-bold text-gray-700 mb-3 whitespace-pre-wrap">${n.text}</p>
                    <div class="flex justify-between items-center text-[8px] font-black text-gray-400 italic">
                        <span>${n.date}</span>
                        <button onclick="deleteNote(${n.id})" class="text-red-300">BORRAR</button>
                    </div>
                </div>
            `).join('');
        }

        function addNote() {
            const input = document.getElementById('note-input');
            if(!input.value.trim()) return;
            state.notes.push({
                id: Date.now(),
                text: input.value,
                date: new Date().toLocaleString()
            });
            input.value = '';
            save();
            renderNotes();
        }

        function deleteNote(id) {
            if(!confirm("¿Borrar nota?")) return;
            state.notes = state.notes.filter(n => n.id !== id);
            save();
            renderNotes();
        }

    </script>
</body>
</html>

```
